<style>
/* ===== base.css ===== */
/* ============================================================
   AWALI HOME SPARE PARTS — base.css
   Shared design system + components used across every page.
   Theme: blue.
============================================================ */
:root{
  --ink:#0d1b2a;        /* deep navy ink */
  --steel:#12395f;      /* primary steel blue */
  --steel-2:#1c4f7f;
  --accent:#2f7ff0;     /* bright blue — offers & key CTA */
  --accent-dark:#1f63cc;
  --accent-soft:#eaf2fe;
  --accent-border:#c3dbff;
  --accent-light:#a9c9ff;
  --wa:#25d366;         /* whatsapp functional */
  --wa-dark:#1eb457;
  --paper:#f5f7fa;
  --card:#ffffff;
  --line:#e4e9f0;
  --line-2:#d3dbe6;
  --muted:#5b6b7f;
  --slate:#7c8a9c;
  --good:#0f9d58;
  --shadow:0 1px 2px rgba(13,27,42,.06),0 8px 24px rgba(13,27,42,.06);
  --shadow-lg:0 12px 40px rgba(13,27,42,.14);
  --radius:14px;
  --radius-sm:10px;
  --maxw:1180px;
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{margin:0;background:var(--paper);color:var(--ink);min-height:100dvh;display:flex;flex-direction:column;
  font-family:'Inter',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;font-size:16px;line-height:1.55;-webkit-font-smoothing:antialiased}
main#app{flex:1 0 auto}
h1,h2,h3,h4,.display{font-family:'Space Grotesk','Inter',sans-serif;line-height:1.12;letter-spacing:-.02em;margin:0}
a{color:inherit;text-decoration:none}
img{max-width:100%;display:block}
button{font-family:inherit;cursor:pointer}
.mono{font-family:'Space Mono',ui-monospace,monospace}
.wrap{max-width:var(--maxw);margin:0 auto;padding:0 20px}
.eyebrow{font-family:'Space Mono',monospace;font-size:12px;letter-spacing:.22em;text-transform:uppercase;color:var(--accent);font-weight:700;display:inline-flex;align-items:center;gap:8px}
.eyebrow svg{width:15px;height:15px}
.muted{color:var(--muted)}
.hidden{display:none !important}
section{padding:52px 0}

/* buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border:0;border-radius:11px;padding:12px 18px;
  font-weight:600;font-size:15px;transition:.18s transform,.18s box-shadow,.18s background;white-space:nowrap}
.btn:active{transform:translateY(1px)}
.btn svg{width:18px;height:18px}
.btn-primary{background:var(--steel);color:#fff}
.btn-primary:hover{background:var(--steel-2)}
.btn-accent{background:var(--accent);color:#fff;box-shadow:0 6px 18px rgba(47,127,240,.30)}
.btn-accent:hover{background:var(--accent-dark)}
.btn-wa{background:var(--wa);color:#053a1c}
.btn-wa:hover{background:var(--wa-dark);color:#fff}
.btn-outline{background:#fff;color:var(--steel);box-shadow:inset 0 0 0 1.6px var(--line-2)}
.btn-outline:hover{box-shadow:inset 0 0 0 1.6px var(--steel);color:var(--ink)}
.btn-ghost{background:transparent;color:var(--ink);padding:10px 12px}
.btn-ghost:hover{background:#eef2f7}
.btn-sm{padding:8px 12px;font-size:13.5px;border-radius:9px}
.btn-block{width:100%}
.btn-danger{background:#fff;color:#c1362b;box-shadow:inset 0 0 0 1.6px #f3c9c5}
.btn-danger:hover{background:#fdecea}

/* header */
header.site{position:sticky;top:0;z-index:50;background:rgba(255,255,255,.86);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
.topbar{background:var(--ink);color:#c8d4e2;font-size:12.5px}
.topbar .wrap{display:flex;gap:18px;align-items:center;justify-content:space-between;padding-top:7px;padding-bottom:7px}
.topbar a{color:#e6edf5;font-weight:500}
.topbar .tb-right{display:flex;gap:16px;align-items:center;flex-wrap:wrap}
.topbar .dot{width:5px;height:5px;border-radius:50%;background:var(--wa);display:inline-block;margin-right:6px;vertical-align:middle}
.nav{display:flex;align-items:center;gap:18px;padding-top:12px;padding-bottom:12px}
.brand{display:flex;align-items:center;gap:11px;flex-shrink:0}
.brand .mark{width:40px;height:40px;flex-shrink:0}
.brand .mark svg{width:100%;height:100%}
.mark img{width:100%;height:100%;object-fit:contain;display:block}
.brand .bt{display:flex;flex-direction:column;line-height:1}
.brand .bt b{font-family:'Space Grotesk';font-size:18px;letter-spacing:-.01em;font-weight:700}
.brand .bt span{font-family:'Space Mono';font-size:9.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--slate);margin-top:3px}
.nav-links{display:flex;align-items:center;gap:4px;margin-left:8px}
.nav-links a{padding:9px 12px;border-radius:9px;font-weight:600;font-size:14.5px;color:#2a3b4d}
.nav-links a:hover,.nav-links a.active{background:#eef2f7}
.nav-spacer{flex:1}
.nav-actions{display:flex;align-items:center;gap:8px}
.searchbox{display:flex;align-items:center;gap:8px;background:#eef2f7;border-radius:10px;padding:8px 12px;min-width:210px}
.searchbox input{border:0;background:transparent;outline:none;font-size:14px;width:100%;color:var(--ink)}
.searchbox svg{width:17px;height:17px;color:var(--slate);flex-shrink:0}
.icon-btn{position:relative;width:42px;height:42px;border-radius:10px;background:#eef2f7;display:inline-flex;align-items:center;justify-content:center;color:var(--ink)}
.icon-btn:hover{background:#e2e8f0}
.icon-btn svg{width:20px;height:20px}
.cart-count{position:absolute;top:-5px;right:-5px;background:var(--accent);color:#fff;font-size:11px;font-weight:700;min-width:18px;height:18px;border-radius:9px;display:flex;align-items:center;justify-content:center;padding:0 4px;font-family:'Space Mono'}
.menu-toggle{display:none}
.dd{position:relative}
.dd-panel{position:absolute;top:calc(100% + 8px);left:0;background:#fff;border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow-lg);padding:8px;min-width:250px;display:none;z-index:60}
.dd.open .dd-panel{display:block;animation:pop .16s ease}
.dd-panel a{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:10px;font-weight:600;font-size:14.5px}
.dd-panel a:hover{background:#f2f6fb}
.dd-panel a svg{width:22px;height:22px;color:var(--steel);flex-shrink:0}
.dd-panel a small{display:block;font-weight:400;color:var(--slate);font-size:12px;font-family:'Inter'}
.caret{width:14px;height:14px;transition:.2s}
.dd.open .caret{transform:rotate(180deg)}
@keyframes pop{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:none}}

/* mobile menu */
.mobile-menu{position:fixed;inset:0;z-index:80;background:rgba(13,27,42,.5);display:none}
.mobile-menu.open{display:block}
.mm-panel{position:absolute;top:0;right:0;width:min(320px,86vw);height:100%;background:#fff;padding:22px;overflow-y:auto;box-shadow:var(--shadow-lg);transform:translateX(100%);transition:.25s;display:flex;flex-direction:column;gap:6px}
.mobile-menu.open .mm-panel{transform:none}
.mm-panel .mm-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.mm-panel a{padding:13px 12px;border-radius:10px;font-weight:600;font-size:15.5px;color:#2a3b4d;display:flex;align-items:center;gap:12px}
.mm-panel a:hover{background:#f2f6fb}
.mm-panel a svg{width:22px;height:22px;color:var(--steel)}
.mm-panel .mm-sep{height:1px;background:var(--line);margin:10px 0}
.mm-search{display:flex;align-items:center;gap:8px;background:#eef2f7;border-radius:10px;padding:10px 12px;margin-bottom:8px}
.mm-search input{border:0;background:transparent;outline:none;width:100%;font-size:15px}
.mm-search svg{width:18px;height:18px;color:var(--slate)}

/* section head + links */
.sec-head{display:flex;align-items:flex-end;justify-content:space-between;gap:20px;margin-bottom:26px;flex-wrap:wrap}
.sec-head h2{font-size:clamp(24px,3.4vw,34px);font-weight:700}
.sec-head p{color:var(--muted);margin:8px 0 0;max-width:560px}
.linkmore{display:inline-flex;align-items:center;gap:6px;font-weight:700;color:var(--steel);font-size:14.5px}
.linkmore svg{width:16px;height:16px;transition:.18s}
.linkmore:hover svg{transform:translateX(3px)}
.crumbs{font-size:13.5px;color:var(--slate);margin-bottom:14px}
.crumbs a{color:var(--steel);font-weight:600}
.page{padding:36px 0 60px;min-height:60vh}
.shop-head{display:flex;justify-content:space-between;align-items:flex-end;gap:16px;flex-wrap:wrap;margin-bottom:22px}
.shop-head h1{font-size:clamp(24px,4vw,34px)}

/* category tiles */
.cats{display:grid;grid-template-columns:repeat(5,1fr);gap:14px}
.cat-tile{background:#fff;border:1px solid var(--line);border-radius:var(--radius);padding:20px 16px;text-align:center;transition:.18s;position:relative;overflow:hidden}
.cat-tile:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg);border-color:var(--line-2)}
.cat-tile .ci{width:56px;height:56px;margin:0 auto 12px;border-radius:14px;background:linear-gradient(160deg,#eef3f9,#e2ebf4);display:flex;align-items:center;justify-content:center;color:var(--steel)}
.cat-tile:hover .ci{background:linear-gradient(160deg,var(--steel),var(--ink));color:#fff}
.cat-tile .ci svg{width:30px;height:30px}
.cat-tile b{font-family:'Space Grotesk';font-size:15px;display:block}
.cat-tile small{color:var(--slate);font-size:12px}

/* product grid + cards */
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:18px}
.pcard{background:#fff;border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;display:flex;flex-direction:column;transition:.18s;position:relative}
.pcard:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg);border-color:var(--line-2)}
.pcard .imgwrap{position:relative;aspect-ratio:4/3;background:#f0f4f9;overflow:hidden;display:block}
.pcard .imgwrap img{width:100%;height:100%;object-fit:cover;transition:.3s}
.pcard:hover .imgwrap img{transform:scale(1.04)}
.vfcorner::before,.vfcorner::after{content:"";position:absolute;width:16px;height:16px;border:2px solid rgba(255,255,255,.85);z-index:2}
.vfcorner::before{top:8px;left:8px;border-right:0;border-bottom:0}
.vfcorner::after{bottom:8px;right:8px;border-left:0;border-top:0}
.badge-offer{position:absolute;top:9px;right:9px;background:var(--accent);color:#fff;font-family:'Space Mono';font-weight:700;font-size:12px;padding:5px 9px;border-radius:8px;z-index:3;box-shadow:0 4px 10px rgba(47,127,240,.35)}
.badge-oos{position:absolute;top:9px;left:9px;background:rgba(13,27,42,.82);color:#fff;font-size:11px;font-weight:600;padding:4px 9px;border-radius:7px;z-index:3}
.pcard .pbody{padding:14px 15px 16px;display:flex;flex-direction:column;flex:1}
.pcard .pcat{font-family:'Space Mono';font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--slate)}
.pcard h3{font-size:16px;font-weight:600;margin:5px 0 4px;font-family:'Space Grotesk'}
.pcard .ppart{font-family:'Space Mono';font-size:11.5px;color:var(--muted)}
.priceline{display:flex;align-items:baseline;gap:9px;margin:11px 0 13px;flex-wrap:wrap}
.price-now{font-family:'Space Grotesk';font-size:20px;font-weight:700;color:var(--ink)}
.price-was{font-size:13.5px;color:var(--slate);text-decoration:line-through}
.price-ask{font-size:14.5px;font-weight:600;color:var(--steel)}
.pcard .pacts{margin-top:auto;display:flex;gap:8px}
.pcard .pacts .btn{flex:1;padding:10px}
.iconbtn-add{width:44px;flex:0 0 auto !important}

/* tags */
.tag{font-family:'Space Mono';font-size:12px;background:#eef3f9;color:#33475b;padding:6px 11px;border-radius:8px;font-weight:700}
.tag.stock-in{background:#e7f6ee;color:#0b7a41}
.tag.stock-out{background:#fdecea;color:#c1362b}

/* how it works cards (home + maintenance) */
.how{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
.howcard{background:#fff;border:1px solid var(--line);border-radius:var(--radius);padding:26px 22px;position:relative}
.howcard .num{font-family:'Space Mono';font-size:13px;color:var(--accent);font-weight:700;letter-spacing:.1em}
.howcard .hi{width:50px;height:50px;border-radius:13px;background:linear-gradient(160deg,#eef3f9,#e2ebf4);color:var(--steel);display:flex;align-items:center;justify-content:center;margin:14px 0}
.howcard .hi svg{width:26px;height:26px}
.howcard h3{font-size:18px;margin-bottom:7px}
.howcard p{color:var(--muted);font-size:14.5px;margin:0}

/* maintenance card (home band + maintenance page) */
.maint-card{background:linear-gradient(160deg,var(--steel),var(--ink));border-radius:20px;padding:34px;color:#fff;box-shadow:var(--shadow-lg)}
.maint-card h3{font-size:24px;margin-bottom:8px}
.maint-card p{color:#c6d5e6;margin:0 0 22px}
.steps{display:flex;flex-direction:column;gap:14px;margin:22px 0}
.step{display:flex;gap:13px;align-items:center}
.step .n{font-family:'Space Mono';font-weight:700;width:30px;height:30px;border-radius:8px;background:rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center;color:#fff;flex-shrink:0;font-size:13px}

/* empty state */
.empty{text-align:center;padding:70px 20px;background:#fff;border:1px dashed var(--line-2);border-radius:var(--radius)}
.empty .ei{width:64px;height:64px;border-radius:16px;background:#eef3f9;color:var(--steel);display:flex;align-items:center;justify-content:center;margin:0 auto 16px}
.empty .ei svg{width:32px;height:32px}
.empty h3{font-size:20px;margin-bottom:8px}

/* footer */
footer.site{background:var(--ink);color:#b9c7d6;padding:56px 0 26px;margin-top:0}
.foot-grid{display:grid;grid-template-columns:1.4fr 1fr 1fr 1.2fr;gap:34px}
footer.site .brand .bt b{color:#fff}
footer.site .brand .bt span{color:#7f92a6}
.foot-about{margin:16px 0;font-size:14px;max-width:300px;color:#93a6ba}
.foot-social{display:flex;gap:10px}
.foot-social a{width:38px;height:38px;border-radius:10px;background:rgba(255,255,255,.07);display:flex;align-items:center;justify-content:center;color:#cdd9e6}
.foot-social a:hover{background:var(--steel)}
.foot-social svg{width:18px;height:18px}
footer.site h5{color:#fff;font-family:'Space Grotesk';font-size:14px;letter-spacing:.02em;margin:0 0 16px;text-transform:uppercase}
.foot-links{display:flex;flex-direction:column;gap:11px}
.foot-links a{font-size:14px;color:#a9bacb}
.foot-links a:hover{color:#fff}
.foot-contact{font-size:14px;display:flex;flex-direction:column;gap:20px}
.foot-contact #footPhones,.foot-contact #footBranches{display:flex;flex-direction:column;gap:12px}
.foot-contact svg{width:18px;height:18px;color:var(--accent);flex-shrink:0;margin-top:2px}
.foot-contact a{color:#cdd9e6}
.foot-bottom{border-top:1px solid rgba(255,255,255,.09);margin-top:40px;padding-top:22px;display:flex;justify-content:space-between;gap:14px;flex-wrap:wrap;font-size:12.5px;color:#7f92a6}
.foot-bottom a{color:#a9bacb}

/* toast */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:200;display:flex;flex-direction:column;gap:10px;align-items:center}
.toast{background:var(--ink);color:#fff;padding:13px 20px;border-radius:12px;font-size:14px;font-weight:500;box-shadow:var(--shadow-lg);display:flex;align-items:center;gap:10px;animation:toastin .3s;max-width:90vw}
.toast svg{width:18px;height:18px;color:var(--wa);flex-shrink:0}
.toast.err svg{color:#ff8a7a}
@keyframes toastin{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}

/* modal */
.modal-bg{position:fixed;inset:0;background:rgba(13,27,42,.55);backdrop-filter:blur(3px);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;animation:fade .2s}
@keyframes fade{from{opacity:0}to{opacity:1}}
.modal{background:#fff;border-radius:20px;max-width:420px;width:100%;padding:28px;box-shadow:var(--shadow-lg);animation:pop .2s;text-align:center}
.modal h3{font-size:20px;margin-bottom:6px}
.modal p{color:var(--muted);font-size:14px;margin-bottom:18px}
.modal .qrbox{background:#fff;border:1px solid var(--line);border-radius:14px;padding:16px;display:inline-block;margin:6px auto 16px}
.modal .qrbox canvas,.modal .qrbox img{display:block;width:220px;height:220px}
.modal-actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.qrlabel{font-family:'Space Mono';font-size:11px;color:var(--muted);margin-top:8px;word-break:break-all}

/* forms (shared basics) */
.field{margin-bottom:16px}
.field label{display:block;font-size:13px;font-weight:600;margin-bottom:7px;color:#33475b}
.field label .req{color:var(--accent)}
.field input,.field select,.field textarea{width:100%;border:1px solid var(--line-2);border-radius:10px;padding:11px 13px;font-size:14.5px;font-family:'Inter';outline:none;background:#fff;transition:.15s;color:var(--ink)}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--steel);box-shadow:0 0 0 3px rgba(18,57,95,.12)}
.field textarea{resize:vertical;min-height:90px;line-height:1.6}
.field .hint{font-size:12px;color:var(--slate);margin-top:6px}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.switch{display:inline-flex;align-items:center;gap:11px;cursor:pointer;user-select:none}
.switch input{display:none}
.switch .track{width:46px;height:26px;border-radius:99px;background:#cdd7e2;position:relative;transition:.2s;flex-shrink:0}
.switch .track::after{content:"";position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:#fff;transition:.2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.switch input:checked + .track{background:var(--good)}
.switch input:checked + .track::after{transform:translateX(20px)}
.switch b{font-size:14px}

/* reveal + a11y */
:focus-visible{outline:3px solid rgba(47,127,240,.55);outline-offset:2px;border-radius:6px}
.reveal{opacity:0;transform:translateY(18px)}
.reveal.in{opacity:1;transform:none;transition:opacity .6s ease,transform .6s ease}

/* shared responsive */
@media(max-width:1000px){
  .grid{grid-template-columns:repeat(3,1fr)}
  .foot-grid{grid-template-columns:1fr 1fr;gap:28px}
}
@media(max-width:860px){
  .nav-links,.searchbox,.dd{display:none}
  .menu-toggle{display:inline-flex}
  .cats{grid-template-columns:repeat(3,1fr)}
  .how{grid-template-columns:1fr}
}
@media(max-width:600px){
  .grid{grid-template-columns:repeat(2,1fr);gap:12px}
  .cats{grid-template-columns:repeat(2,1fr)}
  .foot-grid{grid-template-columns:1fr}
  section{padding:40px 0}
}
@media (prefers-reduced-motion: reduce){
  *{animation-duration:.001ms !important;transition-duration:.001ms !important;scroll-behavior:auto !important}
}

/* ===== number chooser modal + footer numbers (multi-number support) ===== */
.num-list{display:flex;flex-direction:column;gap:8px;margin:6px 0 14px;text-align:left}
.num-opt{display:flex;align-items:center;gap:12px;border:1px solid var(--line);border-radius:12px;padding:12px 14px;transition:.15s}
.num-opt:hover{border-color:var(--wa);background:#f2fbf5}
.num-opt svg{width:22px;height:22px;color:var(--wa);flex-shrink:0}
.num-opt b{font-family:'Space Grotesk';font-size:15px;display:block}
.num-opt small{color:var(--slate);font-size:12px}
.foot-num{display:flex;gap:11px;align-items:flex-start;margin-bottom:12px}
.foot-num > svg{width:18px;height:18px;color:var(--accent);flex-shrink:0;margin-top:2px}
.foot-num .fn-body{display:flex;flex-direction:column;gap:2px}
.foot-num .fn-body a{color:#cdd9e6;font-size:14px}
.foot-num .fn-body a:hover{color:#fff}
.foot-num .fn-body small{color:#7f92a6;font-size:12px}
.foot-num .fn-wa{display:inline-flex;align-items:center;gap:5px;color:var(--wa) !important;font-weight:600;font-size:12.5px;margin-top:3px}
.foot-num .fn-wa svg{width:14px;height:14px}

/* special-day announcement bar */
.special-bar{width:100%;font-size:13.5px;font-weight:600}
.special-bar .sd-inner{display:flex;align-items:center;justify-content:center;gap:10px;padding:9px 16px;flex-wrap:wrap;text-align:center}
.special-bar .sd-ic{display:inline-flex}
.special-bar .sd-ic svg{width:16px;height:16px;color:currentColor}
.special-bar b{font-weight:800}
.special-bar .sd-cta{display:inline-flex;align-items:center;gap:4px;font-weight:800;text-decoration:underline;white-space:nowrap;color:inherit}
.special-bar .sd-cta svg{width:14px;height:14px;color:currentColor}
.sd-bf{background:#0b0b0d;color:#f5c542}
.sd-sale{background:var(--accent);color:#fff}
.sd-offer{background:#0e7a4f;color:#fff}
.sd-off{background:#f4c552;color:#3a2c00}
.sd-custom{background:var(--ink);color:#fff}
/* footer social rows use the same .foot-num layout; icons already sized by .foot-num>svg */

/* header + greeting avatars */
.hdr-av{width:30px;height:30px;border-radius:50%;object-fit:cover;display:block}
.acct-av img{width:100%;height:100%;object-fit:cover;border-radius:inherit;display:block}

/* ============================================================
   PREFERENCE CONTROLS — theme toggle + language (header + menu)
============================================================ */
.nav-actions .lang-label{font-family:'Space Grotesk';font-weight:800;font-size:15px;line-height:1;letter-spacing:0}
.nav-actions .theme-ic{display:inline-flex}
.nav-actions .theme-ic svg{width:20px;height:20px}
.mm-item-btn{display:flex;align-items:center;gap:12px;width:100%;text-align:left;padding:13px 12px;border:0;background:transparent;border-radius:10px;font-weight:600;font-size:15.5px;color:#2a3b4d;cursor:pointer;font-family:inherit}
.mm-item-btn:hover{background:#f2f6fb}
.mm-item-btn .mm-ic{display:inline-flex;color:var(--steel)}
.mm-item-btn .mm-ic svg,.mm-lang .mm-ic svg{width:22px;height:22px}
.mm-lang{padding:8px 12px 2px}
.mm-lang-cap{display:flex;align-items:center;gap:12px;font-weight:600;font-size:14px;color:var(--muted);margin-bottom:10px}
.mm-lang-cap .mm-ic{color:var(--steel)}
.mm-lang-opts{display:flex;gap:8px}
.mm-lang-opt{flex:1;border:1.5px solid var(--line-2);background:#fff;border-radius:10px;padding:11px 8px;font-weight:700;font-size:14px;cursor:pointer;font-family:inherit;color:var(--muted)}
.mm-lang-opt.on{border-color:var(--accent);background:var(--accent-soft);color:var(--accent)}

/* ============================================================
   SMALL-PHONE RESPONSIVE FIXES
============================================================ */
@media(max-width:860px){ .nav-only{display:none !important} }
@media(max-width:600px){
  .nav{gap:10px}
  .nav-actions{gap:6px}
  .btn{padding:11px 15px;font-size:14.5px}
  .modal{padding:22px}
  .modal-actions{gap:8px}
}
@media(max-width:440px){
  .wrap{padding:0 14px}
  .icon-btn{width:38px;height:38px}
  .icon-btn svg{width:18px;height:18px}
  .brand .mark{width:34px;height:34px}
  .brand .bt b{font-size:16px}
  .brand .bt span{font-size:8.5px;letter-spacing:.14em}
  .cart-count{min-width:16px;height:16px;font-size:10px;top:-4px;right:-4px}
  .grid{grid-template-columns:repeat(2,1fr);gap:10px}
  .pcard h3{font-size:14.5px}
  .price-now{font-size:18px}
  .pcard .pbody{padding:12px 12px 14px}
  .pcard .pacts{gap:6px}
  .pcard .pacts .btn{padding:9px;font-size:12.5px}
  .iconbtn-add{width:40px}
  .cats{grid-template-columns:repeat(2,1fr);gap:10px}
  .cat-tile{padding:16px 12px}
  .cat-tile .ci{width:48px;height:48px}
  .cat-tile .ci svg{width:26px;height:26px}
  .sec-head h2{font-size:22px}
  .btn{padding:10px 13px;font-size:14px;gap:6px}
  .btn svg{width:16px;height:16px}
  .modal-actions{flex-direction:column}
  .modal-actions .btn{width:100%}
  .toast{font-size:13px;padding:12px 16px}
  .special-bar{font-size:12.5px}
  .special-bar .sd-inner{gap:6px;padding:8px 12px}
  .num-opt{padding:11px 12px}
}
@media(max-width:360px){
  .nav-actions{gap:4px}
  .icon-btn{width:36px;height:36px}
  .brand .bt span{display:none}
}

/* ============================================================
   RTL (Arabic)
============================================================ */
html[dir="rtl"] body{font-family:'Segoe UI',Tahoma,'Inter',system-ui,-apple-system,sans-serif}
html[dir="rtl"] .dd-panel{left:auto;right:0}
html[dir="rtl"] .cart-count{right:auto;left:-5px}
html[dir="rtl"] .badge-offer{right:auto;left:9px}
html[dir="rtl"] .badge-oos{left:auto;right:9px}
html[dir="rtl"] .mm-item-btn,html[dir="rtl"] .mm-panel a{text-align:right}
html[dir="rtl"] .linkmore svg,html[dir="rtl"] .sd-cta svg{transform:scaleX(-1)}
html[dir="rtl"] .eyebrow{letter-spacing:.08em}
html[dir="rtl"] .toast{direction:rtl}

/* ============================================================
   DARK MODE  (html[data-theme="dark"])
============================================================ */
html[data-theme="dark"]{
  --ink:#e8eef6;
  --steel:#5aa2f5; --steel-2:#7ab3f7;
  --accent:#4f9bff; --accent-dark:#3f83e6; --accent-soft:#152634; --accent-border:#274762; --accent-light:#8fb8ee;
  --paper:#0d141d; --card:#161f2b; --line:#26303d; --line-2:#33404f;
  --muted:#9fb0c3; --slate:#8393a6;
  --shadow:0 1px 2px rgba(0,0,0,.45),0 8px 24px rgba(0,0,0,.45);
  --shadow-lg:0 14px 44px rgba(0,0,0,.55);
  --surface-2:#0a1016; --input-bg:#0f1822;
}
html[data-theme="dark"] body{background:var(--paper);color:var(--ink)}
/* header + nav */
html[data-theme="dark"] header.site{background:rgba(13,20,29,.86);border-bottom-color:var(--line)}
html[data-theme="dark"] .topbar{background:var(--surface-2);color:#9fb0c3}
html[data-theme="dark"] .icon-btn{background:rgba(255,255,255,.06);color:var(--ink)}
html[data-theme="dark"] .icon-btn:hover{background:rgba(255,255,255,.12)}
html[data-theme="dark"] .nav-links a{color:#c4d2e2}
html[data-theme="dark"] .nav-links a:hover,html[data-theme="dark"] .nav-links a.active{background:rgba(255,255,255,.08)}
html[data-theme="dark"] .searchbox{background:rgba(255,255,255,.06)}
html[data-theme="dark"] .searchbox input{color:var(--ink)}
html[data-theme="dark"] .dd-panel{background:var(--card);border-color:var(--line)}
html[data-theme="dark"] .dd-panel a:hover{background:rgba(255,255,255,.06)}
/* mobile menu */
html[data-theme="dark"] .mobile-menu .mm-panel{background:var(--card)}
html[data-theme="dark"] .mm-panel a,html[data-theme="dark"] .mm-item-btn{color:#d3deea}
html[data-theme="dark"] .mm-panel a:hover,html[data-theme="dark"] .mm-item-btn:hover{background:rgba(255,255,255,.06)}
html[data-theme="dark"] .mm-search{background:rgba(255,255,255,.06)}
html[data-theme="dark"] .mm-search input{color:var(--ink)}
html[data-theme="dark"] .mm-lang-opt{background:rgba(255,255,255,.04);border-color:var(--line-2);color:var(--muted)}
html[data-theme="dark"] .mm-lang-opt.on{background:var(--accent-soft);border-color:var(--accent);color:var(--accent)}
/* buttons */
html[data-theme="dark"] .btn-primary{background:#2f6fd0;color:#fff}
html[data-theme="dark"] .btn-primary:hover{background:#3a7ce0}
html[data-theme="dark"] .btn-accent{background:#2f7ff0;color:#fff}
html[data-theme="dark"] .btn-accent:hover{background:#3f8cff}
html[data-theme="dark"] .btn-outline{background:transparent;color:var(--steel-2);box-shadow:inset 0 0 0 1.6px var(--line-2)}
html[data-theme="dark"] .btn-outline:hover{box-shadow:inset 0 0 0 1.6px var(--steel);color:var(--ink)}
html[data-theme="dark"] .btn-ghost{color:var(--ink)}
html[data-theme="dark"] .btn-ghost:hover{background:rgba(255,255,255,.08)}
html[data-theme="dark"] .btn-danger{background:rgba(255,90,80,.08);color:#ff8a7f;box-shadow:inset 0 0 0 1.6px rgba(255,120,110,.4)}
html[data-theme="dark"] .btn-danger:hover{background:rgba(255,90,80,.16)}
html[data-theme="dark"] .btn-wa{background:var(--wa);color:#04220f}
/* cards + tiles */
html[data-theme="dark"] .cat-tile{background:var(--card);border-color:var(--line)}
html[data-theme="dark"] .cat-tile .ci{background:linear-gradient(160deg,#1c2836,#141d28);color:var(--steel-2)}
html[data-theme="dark"] .cat-tile:hover .ci{background:linear-gradient(160deg,var(--steel),#0d141d);color:#fff}
html[data-theme="dark"] .pcard{background:var(--card);border-color:var(--line)}
html[data-theme="dark"] .pcard .imgwrap{background:#1b2430}
html[data-theme="dark"] .price-now{color:var(--ink)}
html[data-theme="dark"] .howcard{background:var(--card);border-color:var(--line)}
html[data-theme="dark"] .howcard .hi{background:linear-gradient(160deg,#1c2836,#141d28);color:var(--steel-2)}
html[data-theme="dark"] .empty{background:var(--card);border-color:var(--line-2)}
html[data-theme="dark"] .empty .ei{background:#1c2836;color:var(--steel-2)}
html[data-theme="dark"] .tag{background:rgba(255,255,255,.08);color:#c4d2e2}
html[data-theme="dark"] .tag.stock-in{background:rgba(15,157,88,.2);color:#5fd39b}
html[data-theme="dark"] .tag.stock-out{background:rgba(193,54,43,.22);color:#ff8a7f}
html[data-theme="dark"] .maint-card{background:linear-gradient(160deg,var(--steel),#0b1219)}
/* forms */
html[data-theme="dark"] .field input,html[data-theme="dark"] .field select,html[data-theme="dark"] .field textarea{background:var(--input-bg);border-color:var(--line-2);color:var(--ink)}
html[data-theme="dark"] .field input::placeholder,html[data-theme="dark"] .field textarea::placeholder{color:#6f8093}
html[data-theme="dark"] .field label{color:#c4d2e2}
html[data-theme="dark"] .field input:focus,html[data-theme="dark"] .field select:focus,html[data-theme="dark"] .field textarea:focus{border-color:var(--steel);box-shadow:0 0 0 3px rgba(90,162,245,.18)}
html[data-theme="dark"] .switch .track{background:#3a4757}
html[data-theme="dark"] select option{background:#161f2b;color:var(--ink)}
/* modal + toast + special bar */
html[data-theme="dark"] .modal{background:var(--card)}
html[data-theme="dark"] .modal .qrbox{background:#fff}
html[data-theme="dark"] .toast{background:#1c2836}
html[data-theme="dark"] .num-opt{border-color:var(--line)}
html[data-theme="dark"] .num-opt:hover{border-color:var(--wa);background:rgba(37,211,102,.1)}
html[data-theme="dark"] .special-bar .sd-custom{background:#1c2836;color:#e8eef6}
/* footer stays dark */
html[data-theme="dark"] footer.site{background:var(--surface-2)}
/* ---- home page ---- */
html[data-theme="dark"] .feat-product{background:linear-gradient(160deg,#18222f,#111a25);border-color:var(--line)}
html[data-theme="dark"] .feat-media{background:#1b2430}
html[data-theme="dark"] .feat-desc{color:#aab8c8}
html[data-theme="dark"] .feat-custom{background:linear-gradient(160deg,var(--steel),#0b1219)}
html[data-theme="dark"] .hero{background:radial-gradient(1200px 500px at 82% -10%,rgba(47,127,240,.10),transparent 60%),linear-gradient(180deg,#101a25,var(--paper))}
html[data-theme="dark"] .hero-search,html[data-theme="dark"] .searchband form{background:var(--card);border-color:var(--line-2)}
html[data-theme="dark"] .hero-search input,html[data-theme="dark"] .searchband input{color:var(--ink)}
html[data-theme="dark"] .chip{background:var(--card);border-color:var(--line);color:#c4d2e2}
html[data-theme="dark"] .scan-inner{background:linear-gradient(160deg,#0b1219,var(--steel))}
html[data-theme="dark"] .offers-band{background:linear-gradient(160deg,#0b1219,#132a44)}
html[data-theme="dark"] .maint{background:#111a25;border-color:var(--line)}
html[data-theme="dark"] .mrow .mi{background:#1c2836;color:var(--steel-2)}
html[data-theme="dark"] .fsoc-card{background:var(--card);border-color:var(--line);color:var(--ink)}
html[data-theme="dark"] .fsoc-media{background:#1c2836}
/* ---- shop / product / cart ---- */
html[data-theme="dark"] .fpill{background:var(--card);border-color:var(--line);color:var(--ink)}
html[data-theme="dark"] .pd-media{background:#1b2430}
html[data-theme="dark"] .pd-note{background:var(--card);border-color:var(--line)}
html[data-theme="dark"] .qty button,html[data-theme="dark"] .qty-sm button{background:var(--input-bg);color:var(--ink);border-color:var(--line-2)}
html[data-theme="dark"] .cart-items,html[data-theme="dark"] .cart-sum{background:var(--card);border-color:var(--line)}
html[data-theme="dark"] .citem .cimg{background:#1b2430}

/* custom category icon image (used anywhere iconFor() renders) */
.cat-ico-img{width:1.5em;height:1.5em;object-fit:contain;display:inline-block;vertical-align:middle}
.cat-tile .ci .cat-ico-img,.ct-ic .cat-ico-img{width:100%;height:100%}

/* ============================================================
   FIXES + ANIMATED NAV  (appended last so these win)
============================================================ */

/* 1. Buttons don't inherit colour — this made .cat-tile text black on the
      maintenance page in dark mode. Inherit everywhere. */
button{color:inherit}
.cat-tile,.cat-tile b{color:inherit}
html[data-theme="dark"] .cat-tile{color:var(--ink)}
html[data-theme="dark"] .cat-tile b{color:var(--ink)}
html[data-theme="dark"] .cat-tile small{color:var(--slate)}

/* 2. Selection states must be obvious — in dark mode the generic .fpill rule
      was overriding .fpill.active, so nothing looked selected. */
.fpill.active,html[data-theme="dark"] .fpill.active{
  background:linear-gradient(135deg,var(--accent),#1d5fc4);color:#fff;border-color:transparent;
  box-shadow:0 6px 16px rgba(47,127,240,.34);font-weight:700}
.fpill{transition:background .2s ease,color .2s ease,border-color .2s ease,transform .16s ease,box-shadow .2s ease}
.fpill:active{transform:scale(.97)}
html[data-theme="dark"] .fpill.active small,.fpill.active small{color:rgba(255,255,255,.85)}
/* selected category tile / any selectable card */
.cat-tile.active,.cat-tile[aria-current="page"]{
  border-color:var(--accent);box-shadow:0 0 0 3px rgba(47,127,240,.18),var(--shadow-lg)}
.cat-tile.active .ci{background:linear-gradient(160deg,var(--accent),#1d5fc4);color:#fff}
/* dropdown items */
.dd-panel a.active{background:rgba(47,127,240,.12);color:var(--accent);font-weight:700}
/* mobile menu current page */
.mm-panel a.active{background:rgba(47,127,240,.14);color:var(--accent);font-weight:700}

/* 3. ANIMATED NAV BAR ------------------------------------------------ */
header.site{transition:padding .3s ease,box-shadow .3s ease,background .3s ease}
header.site.scrolled{box-shadow:0 6px 26px rgba(13,27,42,.1);background:rgba(255,255,255,.94)}
html[data-theme="dark"] header.site.scrolled{background:rgba(13,20,29,.94);box-shadow:0 6px 26px rgba(0,0,0,.4)}
header.site.scrolled .nav-wrap,header.site.scrolled .wrap{padding-top:2px;padding-bottom:2px}

.nav-links{position:relative}
.nav-ind{position:absolute;top:50%;left:0;height:36px;width:var(--nw,0);
  transform:translate(var(--nx,0),-50%);border-radius:11px;opacity:0;pointer-events:none;z-index:0;
  background:linear-gradient(135deg,rgba(47,127,240,.16),rgba(47,127,240,.07));
  border:1px solid rgba(47,127,240,.3);box-shadow:0 4px 14px rgba(47,127,240,.14);
  transition:transform .42s cubic-bezier(.34,1.35,.5,1),width .42s cubic-bezier(.34,1.35,.5,1),opacity .24s ease}
.nav-ind.on{opacity:1}
html[data-theme="dark"] .nav-ind{background:linear-gradient(135deg,rgba(90,162,245,.22),rgba(90,162,245,.08));border-color:rgba(90,162,245,.38)}
.nav-links a{position:relative;z-index:1;background:none !important;transition:color .22s ease,transform .22s ease}
.nav-links a:hover{transform:translateY(-1px)}
.nav-links a.active{color:var(--accent);font-weight:700}
html[data-theme="dark"] .nav-links a.active{color:#8fc2ff}
/* underline sweep under the current item */
.nav-links a.active::after{content:"";position:absolute;left:12px;right:12px;bottom:2px;height:2px;border-radius:2px;
  background:var(--accent);box-shadow:0 0 10px rgba(47,127,240,.7);animation:navUnderline .42s cubic-bezier(.34,1.35,.5,1)}
@keyframes navUnderline{from{transform:scaleX(0);opacity:0}to{transform:scaleX(1);opacity:1}}
/* nav action buttons get a little life */
.nav-actions .icon-btn{transition:transform .2s cubic-bezier(.34,1.4,.5,1),background .2s ease}
.nav-actions .icon-btn:hover{transform:translateY(-2px) scale(1.06)}
.nav-actions .icon-btn:active{transform:scale(.94)}

/* animated hamburger → X */
.burger{position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0}
.burger .bl{position:absolute;left:50%;width:19px;height:2px;border-radius:2px;background:currentColor;
  transition:transform .38s cubic-bezier(.68,-.4,.27,1.4),opacity .22s ease;transform-origin:center}
.burger .b1{transform:translate(-50%,-6px)}
.burger .b2{transform:translate(-50%,0)}
.burger .b3{transform:translate(-50%,6px)}
.burger.open .b1{transform:translate(-50%,0) rotate(45deg)}
.burger.open .b2{opacity:0;transform:translate(-50%,0) scaleX(.2)}
.burger.open .b3{transform:translate(-50%,0) rotate(-45deg)}

/* mobile menu: backdrop blur + staggered items */
.mobile-menu{background:rgba(13,27,42,.55);backdrop-filter:blur(3px);transition:opacity .28s ease}
.mm-panel{transition:transform .4s cubic-bezier(.22,.61,.36,1)}
.mobile-menu.open .mm-panel > *{animation:mmIn .42s cubic-bezier(.22,.61,.36,1) both}
.mobile-menu.open .mm-panel > *:nth-child(1){animation-delay:.04s}
.mobile-menu.open .mm-panel > *:nth-child(2){animation-delay:.08s}
.mobile-menu.open .mm-panel > *:nth-child(3){animation-delay:.12s}
.mobile-menu.open .mm-panel > *:nth-child(4){animation-delay:.16s}
.mobile-menu.open .mm-panel > *:nth-child(5){animation-delay:.2s}
.mobile-menu.open .mm-panel > *:nth-child(6){animation-delay:.24s}
.mobile-menu.open .mm-panel > *:nth-child(n+7){animation-delay:.28s}
@keyframes mmIn{from{opacity:0;transform:translateX(22px)}to{opacity:1;transform:none}}
body.menu-open{overflow:hidden}
.mm-panel a{transition:background .2s ease,transform .2s ease,padding-left .2s ease}
.mm-panel a:hover,.mm-panel a:active{padding-left:18px}

/* 4. FOOTER — no gap below it, and the note line is styled */
#modalRoot:empty{display:none}
#siteFooter{margin-top:auto;background:var(--ink)}
html[data-theme="dark"] #siteFooter{background:var(--surface-2,#0a1017)}
footer.site{padding-bottom:26px}
.foot-note{opacity:.95}
html,body{overscroll-behavior-y:none}
@media(max-width:700px){
  footer.site{padding:38px 0 20px}
  .foot-bottom{margin-top:26px;padding-top:16px;flex-direction:column;gap:8px;text-align:center;justify-content:center}
}

@media(prefers-reduced-motion:reduce){
  .nav-ind,.mm-panel,.burger .bl,.nav-links a,.nav-actions .icon-btn{transition:none !important}
  .nav-links a.active::after,.mobile-menu.open .mm-panel > *{animation:none !important}
}

/* ===== home.css ===== */
/* ============================================================
   home.css — homepage-only styles
============================================================ */

/* featured banner (owner-controlled, first thing on the site) */
.feat{padding:34px 0 10px}
.feat-product{display:grid;grid-template-columns:1.05fr 1fr;gap:34px;align-items:center;background:linear-gradient(160deg,#fff,#eef3fb);

.feat-media{position:relative;aspect-ratio:4/3;border-radius:18px;overflow:hidden;background:#e7eef7}
.feat-media img{width:100%;height:100%;object-fit:cover}
.feat-media .vf span{position:absolute;width:34px;height:34px;border:3px solid var(--accent)}
.feat-media .vf span:nth-child(1){top:14px;left:14px;border-right:0;border-bottom:0}
.feat-media .vf span:nth-child(2){top:14px;right:14px;border-left:0;border-bottom:0}
.feat-media .vf span:nth-child(3){bottom:14px;left:14px;border-right:0;border-top:0}
.feat-media .vf span:nth-child(4){bottom:14px;right:14px;border-left:0;border-top:0}
.feat-badge{display:inline-flex;align-items:center;gap:7px;background:var(--accent);color:#fff;font-family:'Space Mono';font-weight:700;
  font-size:12px;letter-spacing:.08em;text-transform:uppercase;padding:7px 13px;border-radius:999px;box-shadow:0 6px 16px rgba(47,127,240,.3)}
.feat-badge svg{width:14px;height:14px}
.feat-body h1{font-size:clamp(26px,4vw,40px);font-weight:700;margin:16px 0 10px}
.feat-body .pcat{font-family:'Space Mono';font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--steel);font-weight:700}
.feat-price{display:flex;align-items:baseline;gap:12px;margin:14px 0;flex-wrap:wrap}
.feat-price .now{font-family:'Space Grotesk';font-size:34px;font-weight:700}
.feat-price .was{font-size:18px;color:var(--slate);text-decoration:line-through}
.feat-price .save{background:var(--accent);color:#fff;font-family:'Space Mono';font-weight:700;font-size:13px;padding:5px 10px;border-radius:8px}
.feat-price.ask .now{font-size:22px;color:var(--steel)}
.feat-desc{color:#3a4a5c;font-size:15.5px;margin:0 0 22px;max-width:520px}
.feat-cta{display:flex;gap:12px;flex-wrap:wrap}

/* featured custom banner (photo/promo the owner uploads) */
.feat-custom{position:relative;border-radius:24px;overflow:hidden;min-height:340px;display:flex;align-items:center;
  background:linear-gradient(160deg,var(--steel),var(--ink));box-shadow:var(--shadow-lg)}
.feat-custom .fc-img{position:absolute;inset:0}
.feat-custom .fc-img img{width:100%;height:100%;object-fit:cover}
.feat-custom .fc-ov{position:absolute;inset:0;background:linear-gradient(90deg,rgba(9,20,34,.82),rgba(9,20,34,.35))}
.feat-custom .fc-body{position:relative;padding:44px;max-width:620px;color:#fff}
.feat-custom.no-img .fc-body{color:#fff}
.feat-custom h1{font-size:clamp(28px,4.4vw,46px);font-weight:700;margin:14px 0 12px}
.feat-custom p{font-size:18px;color:#dfe9f4;margin:0 0 24px;max-width:520px}

/* default hero (scan/search) — shown when no featured item is set */
.hero{position:relative;overflow:hidden;background:radial-gradient(1200px 500px at 82% -10%,rgba(18,57,95,.10),transparent 60%),linear-gradient(180deg,#fff,var(--paper))}
.hero::before{content:"";position:absolute;inset:0;opacity:.5;pointer-events:none;background-image:linear-gradient(var(--line) 1px,transparent 1px),linear-gradient(90deg,var(--line) 1px,transparent 1px);background-size:34px 34px;mask:linear-gradient(180deg,#000,transparent 78%)}
.hero .wrap{position:relative;display:grid;grid-template-columns:1.15fr .85fr;gap:40px;align-items:center;padding-top:56px;padding-bottom:56px}
.hero h1{font-size:clamp(32px,5vw,54px);font-weight:700;margin:16px 0 14px}
.hero h1 .u{color:var(--steel)}
.hero p.lead{font-size:18px;color:var(--muted);max-width:540px;margin:0 0 26px}
.hero-search{display:flex;gap:10px;background:#fff;border:1px solid var(--line-2);border-radius:14px;padding:8px;box-shadow:var(--shadow);max-width:560px}
.hero-search input{flex:1;border:0;outline:none;padding:10px 14px;font-size:16px;background:transparent}
.trust{display:flex;flex-wrap:wrap;gap:8px;margin-top:22px}
.chip{display:inline-flex;align-items:center;gap:7px;background:#fff;border:1px solid var(--line);border-radius:999px;padding:7px 13px;font-size:13px;font-weight:600;color:#2c3e50}
.chip svg{width:15px;height:15px;color:var(--good)}
.scanart{position:relative;aspect-ratio:1/1;max-width:380px;margin-left:auto;width:100%}
.viewfinder{position:absolute;inset:0}
.viewfinder span{position:absolute;width:44px;height:44px;border:3px solid var(--accent);border-radius:4px}
.viewfinder span:nth-child(1){top:0;left:0;border-right:0;border-bottom:0}
.viewfinder span:nth-child(2){top:0;right:0;border-left:0;border-bottom:0}
.viewfinder span:nth-child(3){bottom:0;left:0;border-right:0;border-top:0}
.viewfinder span:nth-child(4){bottom:0;right:0;border-left:0;border-top:0}
.scan-inner{position:absolute;inset:30px;background:linear-gradient(160deg,var(--ink),var(--steel));border-radius:18px;box-shadow:var(--shadow-lg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;overflow:hidden}
.scan-inner::after{content:"";position:absolute;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,var(--accent),transparent);top:0;animation:scanline 2.6s ease-in-out infinite;box-shadow:0 0 18px 4px rgba(47,127,240,.5)}
@keyframes scanline{0%{top:14%}50%{top:86%}100%{top:14%}}
.qrgrid{width:132px;height:132px;display:grid;grid-template-columns:repeat(9,1fr);grid-template-rows:repeat(9,1fr);gap:3px;background:#fff;padding:12px;border-radius:12px}
.qrgrid i{background:#0d1b2a;border-radius:2px}
.qrgrid i.o{background:transparent}
.scan-cap{color:#cfe0f0;font-family:'Space Mono';font-size:12px;letter-spacing:.16em;text-transform:uppercase}
.scan-cap b{color:#fff}

/* slim search band (shown under a featured banner) */
.searchband{padding:26px 0 6px}
.searchband form{display:flex;gap:10px;background:#fff;border:1px solid var(--line-2);border-radius:14px;padding:8px;box-shadow:var(--shadow);max-width:620px;margin:0 auto}
.searchband input{flex:1;border:0;outline:none;padding:11px 14px;font-size:16px;background:transparent}

/* offers band */
.offers-band{background:linear-gradient(160deg,var(--ink),#132a44);color:#fff}
.offers-band .eyebrow{color:var(--accent-light)}
.offers-band .sec-head h2{color:#fff}
.offers-band .sec-head p{color:#b8c7d8}
.offers-band .pcard{background:#0f2136;border-color:#20334c;color:#fff}
.offers-band .pcard h3 a{color:#fff}
.offers-band .pcard .price-now{color:#fff}
.offers-band .linkmore{color:var(--accent-light)}

/* maintenance band */
.maint{background:#fff;border-top:1px solid var(--line);border-bottom:1px solid var(--line)}
.maint .wrap{display:grid;grid-template-columns:1fr 1fr;gap:44px;align-items:center}
.maint-list{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:22px}
.mrow{display:flex;gap:12px;align-items:flex-start}
.mrow .mi{width:38px;height:38px;border-radius:10px;background:#eef3f9;color:var(--steel);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.mrow .mi svg{width:20px;height:20px}
.mrow b{font-family:'Space Grotesk';font-size:15px;display:block}
.mrow small{color:var(--muted);font-size:13px}

@media(max-width:1000px){
  .hero .wrap{grid-template-columns:1fr;gap:30px}
  .scanart{max-width:300px;margin:0 auto}
  .feat-product{grid-template-columns:1fr;gap:22px}
  .maint .wrap{grid-template-columns:1fr;gap:30px}
}
@media(max-width:860px){ .maint-list{grid-template-columns:1fr} }
@media(max-width:600px){
  .hero .wrap{padding-top:40px;padding-bottom:40px}

  .feat-product{padding:18px}
}

/* featured social post card (under the main featured) */
.fsoc-sec{padding:4px 0 8px}
.fsoc-card{display:flex;gap:20px;align-items:center;background:#fff;border:1px solid var(--line);border-radius:18px;padding:18px;text-decoration:none;color:var(--ink);transition:box-shadow .22s,transform .22s;overflow:hidden}
.fsoc-card:hover{box-shadow:0 14px 34px rgba(13,27,42,.10);transform:translateY(-2px)}
.fsoc-media{width:124px;height:124px;border-radius:14px;overflow:hidden;flex-shrink:0;background:#eef3f9}
.fsoc-media img{width:100%;height:100%;object-fit:cover}
.fsoc-body{flex:1;min-width:0}
.fsoc-badge{display:inline-flex;align-items:center;gap:7px;font-size:11.5px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;padding:5px 11px;border-radius:999px;color:#fff}
.fsoc-card.ig .fsoc-badge{background:linear-gradient(45deg,#f9ce34,#ee2a7b,#6228d7)}
.fsoc-card.tt .fsoc-badge{background:#000}
.fsoc-badge svg{width:14px;height:14px}
.fsoc-body h3{font-family:'Space Grotesk';font-size:20px;margin:11px 0 4px;line-height:1.2}
.fsoc-body p{color:var(--slate);font-size:14px;margin:0}

@media(max-width:560px){.fsoc-card{flex-direction:column;align-items:flex-start}.fsoc-media{width:100%;height:180px}}

/* featured carousel */
.carousel{position:relative;border-radius:20px;overflow:hidden;background:#0d1b2a}
.car-track{display:flex;transition:transform .5s ease;will-change:transform}
.car-slide{flex:0 0 100%;position:relative;display:block;aspect-ratio:16/7;background:#0d1b2a;text-decoration:none}
.car-slide img{width:100%;height:100%;object-fit:cover;display:block}
.car-cap{position:absolute;left:0;right:0;bottom:0;padding:24px;background:linear-gradient(to top,rgba(0,0,0,.62),transparent);color:#fff;font-family:'Space Grotesk';font-size:23px;font-weight:600}
.car-nav{position:absolute;top:50%;transform:translateY(-50%);width:42px;height:42px;border-radius:50%;background:rgba(255,255,255,.9);border:none;font-size:24px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#0d1b2a;box-shadow:0 2px 10px rgba(0,0,0,.2)}
.car-nav.prev{left:14px}.car-nav.next{right:14px}
.car-dots{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);display:flex;gap:7px}
.car-dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.5);border:none;cursor:pointer;padding:0;transition:width .2s,background .2s}
.car-dot.on{background:#fff;width:22px;border-radius:4px}
@media(max-width:600px){.car-slide{aspect-ratio:4/3}.car-cap{font-size:17px;padding:16px}.car-nav{width:36px;height:36px;font-size:20px}}

/* ============================================================
   MODERN CAROUSEL — buttonless, Ken-Burns zoom, sleek caption + dots
============================================================ */
.carousel{border-radius:22px;box-shadow:0 20px 50px rgba(13,27,42,.28);position:relative;isolation:isolate}
.carousel::after{content:"";position:absolute;inset:0;border-radius:22px;pointer-events:none;box-shadow:inset 0 0 0 1px rgba(255,255,255,.08)}
.car-track{transition:transform .7s cubic-bezier(.22,.61,.36,1)}
.car-slide{overflow:hidden}
.car-slide img{animation:carZoom 16s ease-in-out infinite alternate}
@keyframes carZoom{from{transform:scale(1.02)}to{transform:scale(1.12)}}
.car-nav{display:none !important}
.car-cap{background:linear-gradient(to top,rgba(7,15,26,.9) 0%,rgba(7,15,26,.36) 55%,transparent 100%);padding:54px 26px 24px;font-size:clamp(18px,2.4vw,26px);font-weight:700;letter-spacing:-.01em;text-shadow:0 2px 14px rgba(0,0,0,.35)}
.car-cap::before{content:"";display:block;width:44px;height:4px;border-radius:3px;background:var(--accent);margin-bottom:12px;box-shadow:0 0 16px rgba(47,127,240,.6)}
.car-dots{bottom:18px;gap:8px}
.car-dot{width:8px;height:8px;background:rgba(255,255,255,.45);transition:width .32s cubic-bezier(.22,.61,.36,1),background .32s,box-shadow .32s}
.car-dot.on{width:26px;background:#fff;box-shadow:0 0 14px rgba(255,255,255,.55)}
@media(prefers-reduced-motion:reduce){ .car-slide img{animation:none} }
@media(max-width:600px){ .car-cap{padding:40px 16px 18px} .car-cap::before{width:34px;margin-bottom:8px} }

/* ============================================================
   FEATURED BLOCKS — themes, discount badge, countdown, bundle,
   marquee, social designs, carousel effects
============================================================ */
.fb{position:relative}
.fb+.fb{margin-top:6px}

/* ---- theme palettes (used by every block) ---- */
.thm-blaze   {--t1:#ff6a2b;--t2:#e01e5a;--tglow:255,106,43;--tink:#fff}
.thm-midnight{--t1:#2f7ff0;--t2:#12235a;--tglow:47,127,240;--tink:#fff}
.thm-mint    {--t1:#12d18e;--t2:#0a7d63;--tglow:18,209,142;--tink:#fff}
.thm-royal   {--t1:#8b5cf6;--t2:#f5b32a;--tglow:139,92,246;--tink:#fff}
.thm-ice     {--t1:#38d5f2;--t2:#1163b4;--tglow:56,213,242;--tink:#fff}
.thm-sunset  {--t1:#ff9a3c;--t2:#c31432;--tglow:255,154,60;--tink:#fff}

/* ============ DISCOUNT BLOCK ============ */
.fb-discount{padding:clamp(18px,3vw,34px) 0}
.dsc{position:relative;overflow:hidden;border-radius:26px;isolation:isolate;
  background:linear-gradient(125deg,var(--t2) 0%,#0b1524 55%,var(--t1) 160%);
  display:grid;grid-template-columns:1.05fr .95fr;gap:clamp(16px,3vw,40px);align-items:center;
  padding:clamp(24px,3.6vw,48px);color:#fff;
  box-shadow:0 26px 60px rgba(0,0,0,.35),inset 0 0 0 1px rgba(255,255,255,.09)}
.dsc-deco{position:absolute;inset:0;z-index:0;pointer-events:none;overflow:hidden;border-radius:26px}
.dsc-rays{position:absolute;top:50%;left:72%;width:150vmax;height:150vmax;transform:translate(-50%,-50%);
  background:repeating-conic-gradient(from 0deg,rgba(255,255,255,.07) 0deg 7deg,transparent 7deg 18deg);
  animation:dscSpin 44s linear infinite;opacity:.55}
@keyframes dscSpin{to{transform:translate(-50%,-50%) rotate(360deg)}}
.dsc-orb{position:absolute;border-radius:50%;filter:blur(56px);opacity:.6}
.dsc-orb.a{width:340px;height:340px;background:var(--t1);top:-120px;right:-60px}
.dsc-orb.b{width:280px;height:280px;background:var(--t2);bottom:-130px;left:-70px}
.dsc-grid{position:absolute;inset:0;opacity:.16;
  background-image:linear-gradient(rgba(255,255,255,.5) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.5) 1px,transparent 1px);
  background-size:44px 44px;
  -webkit-mask-image:radial-gradient(circle at 30% 50%,#000,transparent 72%);mask-image:radial-gradient(circle at 30% 50%,#000,transparent 72%)}
.dsc-body{position:relative;z-index:2;min-width:0}
.dsc-label{display:inline-flex;align-items:center;gap:7px;font-size:11.5px;font-weight:800;letter-spacing:.16em;
  text-transform:uppercase;padding:7px 14px;border-radius:999px;background:rgba(255,255,255,.14);
  border:1px solid rgba(255,255,255,.28);backdrop-filter:blur(6px);animation:dscLabel 2.6s ease-in-out infinite}
.dsc-label svg{width:14px;height:14px}
@keyframes dscLabel{0%,100%{box-shadow:0 0 0 0 rgba(var(--tglow),.55)}50%{box-shadow:0 0 0 10px rgba(var(--tglow),0)}}
.dsc-body h2{font-size:clamp(26px,4.2vw,46px);line-height:1.06;margin:16px 0 0;letter-spacing:-.02em;text-shadow:0 3px 20px rgba(0,0,0,.3)}
.dsc-body p{margin:12px 0 0;font-size:clamp(14px,1.5vw,17px);color:rgba(255,255,255,.82);max-width:46ch}
.dsc-cta{margin-top:22px}
.dsc-stage{position:relative;z-index:2;min-height:clamp(190px,26vw,300px);display:flex;align-items:center;justify-content:center}
.dsc-media{position:relative;width:100%;height:100%;display:flex;align-items:center;justify-content:center}
.dsc-media::after{content:"";position:absolute;bottom:6%;left:50%;transform:translateX(-50%);width:62%;height:16px;
  background:rgba(0,0,0,.45);filter:blur(16px);border-radius:50%;z-index:-1}
.dsc-media img{max-width:100%;max-height:clamp(190px,26vw,310px);object-fit:contain;
  filter:drop-shadow(0 26px 40px rgba(0,0,0,.5)) drop-shadow(0 0 34px rgba(var(--tglow),.45));animation:dscFloat 6s ease-in-out infinite}
@keyframes dscFloat{0%,100%{transform:translateY(0) rotate(-1deg)}50%{transform:translateY(-14px) rotate(1deg)}}
.dsc-media-empty{color:rgba(255,255,255,.35)}
.dsc-media-empty svg{width:96px;height:96px}
/* the badge */
.dsc-badge{position:absolute;top:-6px;right:-4px;width:clamp(112px,15vw,168px);height:clamp(112px,15vw,168px);
  display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;
  border-radius:50%;background:linear-gradient(150deg,var(--t1),var(--t2));color:var(--tink);
  box-shadow:0 16px 40px rgba(0,0,0,.42),0 0 0 6px rgba(255,255,255,.14),inset 0 -8px 22px rgba(0,0,0,.24);
  transform:rotate(-9deg);z-index:3}
.dsc-ring{position:absolute;inset:-14px;border-radius:50%;border:2px dashed rgba(255,255,255,.5);animation:dscSpin 18s linear infinite}
.dsc-pre{font-size:clamp(9px,1.05vw,12px);font-weight:700;letter-spacing:.14em;text-transform:uppercase;opacity:.95;line-height:1}
.dsc-num{font-family:'Space Grotesk',system-ui,sans-serif;font-size:clamp(34px,5.4vw,62px);font-weight:800;line-height:.94;
  letter-spacing:-.04em;display:flex;align-items:flex-start;text-shadow:0 3px 12px rgba(0,0,0,.28)}
.dsc-num em{font-style:normal;font-size:.44em;margin-top:.28em;margin-left:.06em;font-weight:700}
.dsc-suf{font-size:clamp(10px,1.2vw,14px);font-weight:800;letter-spacing:.2em;line-height:1;margin-top:2px}
/* per-effect flavour */
.fx-glow .dsc-badge{animation:dscPulse 2.8s ease-in-out infinite}
@keyframes dscPulse{0%,100%{box-shadow:0 16px 40px rgba(0,0,0,.42),0 0 0 6px rgba(255,255,255,.14),0 0 0 0 rgba(var(--tglow),.55),inset 0 -8px 22px rgba(0,0,0,.24)}
  50%{box-shadow:0 16px 40px rgba(0,0,0,.42),0 0 0 6px rgba(255,255,255,.14),0 0 0 22px rgba(var(--tglow),0),inset 0 -8px 22px rgba(0,0,0,.24)}}
.fx-shine .dsc::before{content:"";position:absolute;top:-60%;left:-30%;width:34%;height:220%;z-index:4;pointer-events:none;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.34),transparent);transform:rotate(18deg);animation:dscShine 4.6s ease-in-out infinite}
@keyframes dscShine{0%{left:-40%}55%,100%{left:130%}}

.cd-grid{display:flex;gap:clamp(8px,1.6vw,16px);justify-content:center;margin:24px 0 26px;flex-wrap:wrap}
.cd-cell{min-width:clamp(64px,9vw,96px);padding:14px 10px;border-radius:16px;background:rgba(255,255,255,.1);

/* ============ MARQUEE ============ */
.fb-marquee{overflow:hidden;padding:13px 0;background:linear-gradient(90deg,var(--t2),var(--t1));color:#fff}

  border:1px solid rgba(255,255,255,.18);backdrop-filter:blur(14px)}

  background:linear-gradient(135deg,rgba(var(--tglow,47,127,240),.22),transparent 60%)}

/* ============ CAROUSEL EFFECTS ============ */
.carousel{position:relative;border-radius:22px;overflow:hidden;box-shadow:0 22px 54px rgba(13,27,42,.3);isolation:isolate}
.carousel::after{content:"";position:absolute;inset:0;border-radius:22px;pointer-events:none;box-shadow:inset 0 0 0 1px rgba(255,255,255,.09)}
/* slide (classic) */
.car-fx-slide .car-track{display:flex;transition:transform .72s cubic-bezier(.22,.61,.36,1)}
.car-fx-slide .car-slide{flex:0 0 100%}
/* fade / zoom / stack share a stacked layout */
.car-fx-fade .car-track,.car-fx-zoom .car-track,.car-fx-stack .car-track{position:relative;display:block}
.car-fx-fade .car-slide,.car-fx-zoom .car-slide,.car-fx-stack .car-slide{position:absolute;inset:0;opacity:0;transition:opacity .8s ease,transform .9s cubic-bezier(.22,.61,.36,1)}
.car-fx-fade .car-slide:first-child,.car-fx-zoom .car-slide:first-child,.car-fx-stack .car-slide:first-child{position:relative}
.car-fx-fade .car-slide.on,.car-fx-zoom .car-slide.on,.car-fx-stack .car-slide.on{opacity:1;z-index:2}
.car-fx-zoom .car-slide{transform:scale(1.09)}
.car-fx-zoom .car-slide.on{transform:scale(1)}
.car-fx-stack{perspective:1400px}
.car-fx-stack .car-slide{transform:translateY(38px) scale(.9) rotateX(9deg);transform-origin:50% 100%}
.car-fx-stack .car-slide.on{transform:translateY(0) scale(1) rotateX(0)}
/* Ken-Burns on the active image */
.car-slide img{display:block;width:100%;height:100%;object-fit:cover}
.car-slide.on img{animation:carKen 13s ease-out forwards}
@keyframes carKen{from{transform:scale(1.02)}to{transform:scale(1.13)}}
/* caption with entrance */
.car-cap{position:absolute;left:0;right:0;bottom:0;padding:56px 26px 26px;
  background:linear-gradient(to top,rgba(7,15,26,.92),rgba(7,15,26,.35) 58%,transparent);
  font-size:clamp(17px,2.3vw,27px);font-weight:700;letter-spacing:-.01em;color:#fff}
.car-cap span{display:inline-block;transform:translateY(14px);opacity:0;transition:transform .7s cubic-bezier(.22,.61,.36,1) .16s,opacity .7s ease .16s}
.car-slide.on .car-cap span{transform:translateY(0);opacity:1}
.car-cap::before{content:"";display:block;width:46px;height:4px;border-radius:3px;background:var(--accent);margin-bottom:13px;box-shadow:0 0 16px rgba(47,127,240,.65)}
/* progress bar + counter */
.car-prog{position:absolute;left:0;right:0;top:0;height:3px;background:rgba(255,255,255,.2);z-index:5}
.car-prog i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--accent),#8fc2ff);box-shadow:0 0 12px rgba(47,127,240,.8)}
.car-prog i.run{animation:carProg 5.2s linear forwards}
@keyframes carProg{from{width:0}to{width:100%}}
.car-count{position:absolute;top:16px;right:18px;z-index:5;font-family:'Space Mono',monospace;font-size:12px;
  color:#fff;background:rgba(7,15,26,.55);border:1px solid rgba(255,255,255,.22);padding:5px 11px;border-radius:999px;backdrop-filter:blur(6px)}
.car-count b{font-size:14px}
.car-dots{position:absolute;left:0;right:0;bottom:16px;display:flex;justify-content:center;gap:8px;z-index:5}
.car-dot{width:8px;height:8px;padding:0;border:0;border-radius:999px;cursor:pointer;background:rgba(255,255,255,.45);
  transition:width .34s cubic-bezier(.22,.61,.36,1),background .34s,box-shadow .34s}
.car-dot.on{width:28px;background:#fff;box-shadow:0 0 14px rgba(255,255,255,.6)}
.car-nav{display:none !important}
@media(prefers-reduced-motion:reduce){
  .car-slide.on img,.dsc-media img,.dsc-rays,.dsc-ring,.mq-track,.dsc-badge,.dsc-label{animation:none !important}
  .car-cap span{transform:none;opacity:1}
}

/* ============================================================
   CONTROL PANEL — redesigned shell + motion
============================================================ */
.admin-wrap{position:relative}
.admin-head{position:relative;padding:22px 24px;border-radius:20px;overflow:hidden;color:#fff;margin-bottom:4px;
  background:linear-gradient(130deg,#12395f 0%,#0d1b2a 60%,#1d4f85 130%);
  box-shadow:0 16px 40px rgba(13,27,42,.22)}
.admin-head::after{content:"";position:absolute;top:-120px;right:-80px;width:300px;height:300px;border-radius:50%;
  background:var(--accent);filter:blur(90px);opacity:.4;pointer-events:none}
.admin-head > div{position:relative;z-index:2}
.admin-head h1{color:#fff}
.admin-head .eyebrow{color:var(--accent-light,#8fc2ff)}
.admin-head .muted{color:rgba(255,255,255,.7)}
.admin-head .btn-outline{border-color:rgba(255,255,255,.35);color:#fff}
.admin-head .btn-outline:hover{background:rgba(255,255,255,.12)}
.admin-head .btn-ghost{color:rgba(255,255,255,.85)}
.admin-head .btn-ghost:hover{background:rgba(255,255,255,.12)}
/* animated tab underline + content entrance */
.admin-tab{position:relative;transition:color .2s ease}
.admin-tab.active::after{content:"";position:absolute;left:12px;right:12px;bottom:-1px;height:2px;border-radius:2px;
  background:var(--accent);animation:tabIn .34s cubic-bezier(.22,.61,.36,1)}
@keyframes tabIn{from{transform:scaleX(.2);opacity:0}to{transform:scaleX(1);opacity:1}}
#adminBody{animation:panelIn .42s cubic-bezier(.22,.61,.36,1)}
@keyframes panelIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
#adminBody .form-card{animation:cardIn .5s cubic-bezier(.22,.61,.36,1) both}
@keyframes cardIn{from{opacity:0;transform:translateY(18px) scale(.985)}to{opacity:1;transform:none}}
#adminBody .blk-row,#adminBody .arow,#adminBody .cat-row{animation:rowIn .42s cubic-bezier(.22,.61,.36,1) both}

<script>
/* ============================================================
   db.js — data adapter.  Uses Supabase when configured
   (window.AWALI_CONFIG), otherwise falls back to this browser's
   localStorage so the site still works before you connect a database.
   Exposes window.AWDB.  All methods return Promises.
============================================================ */
window.AWDB=(function(){
  "use strict";
  var cfg=window.AWALI_CONFIG||{};
  var URL=String(cfg.supabaseUrl||'').trim();
  var KEY=String(cfg.supabaseAnonKey||'').trim();
  var sb=null, cloud=false;

  function init(){
    if(URL&&KEY&&window.supabase&&window.supabase.createClient){
      try{ sb=window.supabase.createClient(URL,KEY,{auth:{persistSession:true,autoRefreshToken:true}}); cloud=true; }
      catch(e){ cloud=false; }
    }
    return Promise.resolve(cloud);
  }
  function isCloud(){ return cloud; }

  /* ---------- local fallback helpers ---------- */
  var LS_P='awali_products_v2', LS_S='awali_settings_v2', LS_U='awali_users_v1', LS_SESS='awali_session_v1', CART='awali_cart_';
  function lget(k,d){ try{var v=JSON.parse(localStorage.getItem(k));return v==null?d:v;}catch(e){return d;} }
  function lset(k,v){ try{localStorage.setItem(k,JSON.stringify(v));}catch(e){} }
  function P(v){ return Promise.resolve(v); }
  function chk(r){ if(r&&r.error)throw r.error; return r; }

  /* ---------- row <-> app object mapping (cloud) ---------- */
  function rowToProduct(r){ return {id:r.id,name:r.name,category:r.category,brand:r.brand||'',partNumber:r.part_number||'',description:r.description||'',image:r.image||'',showPrice:r.show_price!==false,price:r.price==null?null:Number(r.price),offerPrice:r.offer_price==null?null:Number(r.offer_price),inStock:r.in_stock!==false,visible:r.visible!==false,createdAt:r.created_at?new Date(r.created_at).getTime():Date.now()}; }
  function productToRow(p){ return {id:p.id,name:p.name,category:p.category,brand:p.brand||'',part_number:p.partNumber||'',description:p.description||'',image:p.image||'',show_price:!!p.showPrice,price:p.price==null?null:p.price,offer_price:p.offerPrice==null?null:p.offerPrice,in_stock:p.inStock!==false,visible:p.visible!==false}; }

  return {
    init:init, isCloud:isCloud,
    localAuth:{  // used by core only in local (non-cloud) mode
      getUsers:function(){return lget(LS_U,[]);}, setUsers:function(a){lset(LS_U,a);},
      getSession:function(){return lget(LS_SESS,null);}, setSession:function(s){lset(LS_SESS,s);}
    },

    /* ---------------- SETTINGS ---------------- */
    getSettings:function(){
      if(cloud) return sb.from('app_settings').select('data').eq('id',1).maybeSingle().then(function(r){ if(r.error)throw r.error; return r.data?r.data.data:null; });
      return P(lget(LS_S,null));
    },
    saveSettings:function(s){
      if(cloud) return sb.from('app_settings').upsert({id:1,data:s}).then(chk);
      lset(LS_S,s); return P();
    },

    /* ---------------- PRODUCTS ---------------- */
    listProducts:function(){
      if(cloud) return sb.from('products').select('*').order('created_at',{ascending:true}).then(function(r){ if(r.error)throw r.error; return (r.data||[]).map(rowToProduct); });
      return P(lget(LS_P,null));
    },
    saveProduct:function(p){
      if(cloud) return sb.from('products').upsert(productToRow(p)).then(chk);
      var a=lget(LS_P,[]); var i=-1; a.forEach(function(x,idx){if(x.id===p.id)i=idx;}); if(i>=0)a[i]=p; else a.push(p); lset(LS_P,a); return P();
    },
    bulkSaveProducts:function(arr){
      if(cloud) return sb.from('products').upsert(arr.map(productToRow)).then(chk);
      lset(LS_P,arr.slice()); return P();
    },
    deleteProduct:function(id){
      if(cloud) return sb.from('products').delete().eq('id',id).then(chk);
      lset(LS_P,lget(LS_P,[]).filter(function(x){return x.id!==id;})); return P();
    },
    wipeProducts:function(){
      if(cloud) return sb.from('products').delete().neq('id','___never___').then(chk);
      lset(LS_P,[]); return P();
    },

    /* ---------------- CART (per user; guest cart stays local) ---------------- */
    getCart:function(userId){
      if(cloud&&userId) return sb.from('carts').select('items').eq('user_id',userId).maybeSingle().then(function(r){ if(r.error)throw r.error; return r.data?r.data.items:[]; });
      return P(lget(CART+(userId||'guest'),[]));
    },
    saveCart:function(userId,items){
      if(cloud&&userId) return sb.from('carts').upsert({user_id:userId,items:items,updated_at:new Date().toISOString()}).then(chk);
      lset(CART+(userId||'guest'),items); return P();
    },
    clearGuestCart:function(){ lset(CART+'guest',[]); return P(); },
    getGuestCart:function(){ return lget(CART+'guest',[]); },

    /* ---------------- CUSTOMERS (owner) ---------------- */
    listCustomers:function(){
      if(cloud) return sb.from('profiles').select('*').then(function(r){ if(r.error)throw r.error; return (r.data||[]).map(function(p){return {id:p.id,name:p.name,email:p.email,role:p.role,createdAt:p.created_at?new Date(p.created_at).getTime():Date.now()};}); });
      return P(lget(LS_U,[]));
    },
    setUserRole:function(id,role){
      if(cloud) return sb.from('profiles').update({role:role}).eq('id',id).then(chk);
      var us=lget(LS_U,[]); for(var i=0;i<us.length;i++)if(us[i].id===id)us[i].role=role; lset(LS_U,us); return P();
    },
    deleteCustomer:function(id){
      /* delete the LOGIN (auth.users), not just the profile row — otherwise the
         person disappears from the list but can still sign in. Cascades clean up. */
      if(cloud) return sb.rpc('delete_user_account',{uid:id}).then(function(r){
        if(r.error){
          if(/function .*delete_user_account.* does not exist|schema cache/i.test(r.error.message||''))
            throw new Error('Run supabase-auth-upgrade.sql in Supabase first — the delete function is missing.');
          throw r.error;
        }
        return true;
      });
      lset(LS_U,lget(LS_U,[]).filter(function(u){return u.id!==id;})); return P();
    },

    /* ---------------- AUTH (cloud only) ---------------- */
    signUp:function(name,email,pw,meta){
      var data={name:name}; if(meta){ for(var k in meta) if(Object.prototype.hasOwnProperty.call(meta,k)) data[k]=meta[k]; }
      return sb.auth.signUp({email:email,password:pw,options:{data:data}}).then(function(r){ if(r.error)return {ok:false,error:r.error.message}; return {ok:true,session:!!r.data.session}; });
    },
    /* email verification by 6-digit code (Supabase sends it via your SMTP) */
    /* Works whether "Confirm email" is ON or OFF in Supabase:
       - OFF -> signInWithOtp sends the Magic Link template
       - ON  -> resend sends the Confirm signup template
       Both carry {{ .Token }} if the template includes it. */
    sendEmailCode:function(email){
      return sb.auth.signInWithOtp({email:email,options:{shouldCreateUser:false}}).then(function(r){
        if(!r.error)return {ok:true,via:'magiclink'};
        var first=r.error.message||String(r.error);
        return sb.auth.resend({type:'signup',email:email}).then(function(r2){
          if(!r2.error)return {ok:true,via:'signup'};
          return {ok:false,error:first,error2:(r2.error.message||String(r2.error))};
        }).catch(function(){ return {ok:false,error:first}; });
      }).catch(function(e){ return {ok:false,error:(e&&e.message)||'Could not reach the mail service.'}; });
    },
    verifyEmailCode:function(email,token){
      var t=String(token||'').trim();
      return sb.auth.verifyOtp({email:email,token:t,type:'email'}).then(function(r){
        if(!r.error)return {ok:true};
        var first=r.error.message||String(r.error);
        return sb.auth.verifyOtp({email:email,token:t,type:'signup'}).then(function(r2){
          if(!r2.error)return {ok:true};
          return {ok:false,error:first};
        }).catch(function(){ return {ok:false,error:first}; });
      }).catch(function(e){ return {ok:false,error:(e&&e.message)||'Could not verify the code.'}; });
    },
    setProfileVerified:function(id){ return sb.from('profiles').update({email_verified:true}).eq('id',id).then(chk); },
    setProfileFields:function(id,fields){ return sb.from('profiles').update(fields).eq('id',id).then(chk); },
    usernameTaken:function(uname){
      /* RLS hides other people's profiles, so ask the security-definer function instead */
      return sb.rpc('username_exists',{u:String(uname||'').toLowerCase()})
        .then(function(r){ if(r.error)return false; return r.data===true; })
        .catch(function(){ return false; });
    },
    signIn:function(email,pw){
      return sb.auth.signInWithPassword({email:email,password:pw}).then(function(r){ if(r.error)return {ok:false,error:r.error.message}; return {ok:true}; });
    },
    signOut:function(){ return sb.auth.signOut().then(function(){return true;}); },
    getUser:function(){ return sb.auth.getUser().then(function(r){ return (r.data&&r.data.user)||null; }); },
    getProfile:function(id){ return sb.from('profiles').select('*').eq('id',id).maybeSingle().then(function(r){ return r.data||null; }); },
    updateProfileName:function(id,name){ return sb.from('profiles').update({name:name}).eq('id',id).then(chk); },
    updatePassword:function(pw){ return sb.auth.updateUser({password:pw}).then(chk); },
    updateAvatar:function(av){ return sb.auth.updateUser({data:{avatar:av}}).then(chk); },
    onAuth:function(cb){ if(cloud) sb.auth.onAuthStateChange(function(_e,session){ cb(session); }); }
  };
})();

    var name=(prof&&prof.name)||(u.user_metadata&&u.user_metadata.name)||(u.email||'').split('@')[0];

/* ============================================================ DISPLAY PREFERENCES — theme (dark mode) + language, stored per device */
var LS_THEME='awali_theme', LS_LANG='awali_lang';
function prefTheme(){ try{var v=localStorage.getItem(LS_THEME); if(v==='dark'||v==='light')return v;}catch(e){} try{ if(window.matchMedia&&matchMedia('(prefers-color-scheme: dark)').matches)return 'dark'; }catch(e){} return 'light'; }
function applyTheme(v){ v=v||prefTheme(); var de=document&&document.documentElement; if(!de)return; de.setAttribute('data-theme',v); try{var m=document.querySelector('meta[name="theme-color"]'); if(m)m.setAttribute('content', v==='dark'?'#0d141d':'#ffffff');}catch(e){} }
function setTheme(v){ v=(v==='dark')?'dark':'light'; try{localStorage.setItem(LS_THEME,v);}catch(e){} applyTheme(v); syncPrefControls(); }
function toggleTheme(){ var now=(prefTheme()==='dark')?'light':'dark'; setTheme(now); try{AW.toast(now==='dark'?t('Dark mode on'):t('Light mode on'));}catch(e){} }

function prefLang(){ try{var v=localStorage.getItem(LS_LANG); if(v==='ar'||v==='en')return v;}catch(e){} return 'en'; }
function applyLangAttr(v){ v=v||prefLang(); var de=document&&document.documentElement; if(!de)return; de.setAttribute('lang',v); de.setAttribute('dir', v==='ar'?'rtl':'ltr'); }
function setLang(v){ v=(v==='ar')?'ar':'en'; try{localStorage.setItem(LS_LANG,v);}catch(e){} applyLangAttr(v); rerenderAll(); }
function toggleLang(){ setLang(prefLang()==='ar'?'en':'ar'); }
var _arNorm=null;
function normKey(x){ return String(x||'').toLowerCase().replace(/[\u2018\u2019']/g,"'").replace(/\s+/g,' ').trim().replace(/[.:!?\u2026]+$/,''); }
function arLookup(raw){
  if(raw==null)return null;
  if(AR[raw]!=null)return AR[raw];
  if(!_arNorm){ _arNorm={}; for(var k in AR){ if(Object.prototype.hasOwnProperty.call(AR,k))_arNorm[normKey(k)]=AR[k]; } }
  var v=_arNorm[normKey(raw)];
  return (v==null)?null:v;
}
function t(s){ if(prefLang()!=='ar')return s; var v=arLookup(s); return (v==null)?s:v; }

function translateTree(root){ if(prefLang()!=='ar'||!root)return; try{
    var w=document.createTreeWalker(root,NodeFilter.SHOW_TEXT,null,false),node,arr=[]; while(node=w.nextNode())arr.push(node);
    for(var i=0;i<arr.length;i++){ var tn=arr[i], raw=tn.nodeValue||''; var lead=(raw.match(/^\s*/)||[''])[0], trail=(raw.match(/\s*$/)||[''])[0]; var key=raw.trim().replace(/\s+/g,' '); if(!key)continue; if(!/[A-Za-z]/.test(key))continue; var v=arLookup(key); if(v!=null){ var tail=(key.match(/[.:!?\u2026]+$/)||[''])[0]; if(tail&&v.slice(-tail.length)!==tail)v+=tail; tn.nodeValue=lead+v+trail; } }
    ['placeholder','title','aria-label'].forEach(function(at){ var els=root.querySelectorAll('['+at+']'),j; for(j=0;j<els.length;j++){ var kk=els[j].getAttribute(at); var av=arLookup(kk); if(av!=null)els[j].setAttribute(at,av); } });
  }catch(e){} }
function syncPrefControls(){ try{ var dark=prefTheme()==='dark', ar=prefLang()==='ar';
  document.querySelectorAll('[data-act="toggle-theme"]').forEach(function(b){ b.setAttribute('aria-label',dark?t('Light mode'):t('Dark mode')); b.setAttribute('title',dark?t('Light mode'):t('Dark mode')); var ic=b.querySelector('.theme-ic'); if(ic)ic.innerHTML=dark?I.sun:I.moon; var lb=b.querySelector('.theme-label'); if(lb)lb.textContent=dark?t('Light mode'):t('Dark mode'); });
  document.querySelectorAll('[data-act="toggle-lang"]').forEach(function(b){ b.setAttribute('title',ar?'English':'العربية'); b.setAttribute('aria-label',ar?'English':'العربية'); var lb=b.querySelector('.lang-label'); if(lb)lb.textContent=ar?'EN':'ع'; });
  document.querySelectorAll('.mm-lang-opt').forEach(function(b){ b.classList.toggle('on', b.getAttribute('data-lang')===prefLang()); });
  document.querySelectorAll('input[data-act="theme-switch"]').forEach(function(c){ c.checked=dark; });
  document.querySelectorAll('select[data-act="set-lang"]').forEach(function(s){ s.value=prefLang(); });
  }catch(e){} }

/* ============================================================ TOAST + MODAL */
function toast(msg,isErr){
  var root=$('#toast'); if(!root){root=document.createElement('div');root.id='toast';document.body.appendChild(root);}
  var el=document.createElement('div');
  el.className='toast'+(isErr?' err':'');
  el.innerHTML=(isErr?I.info:I.check)+'<span>'+esc(t(msg))+'</span>';
  root.appendChild(el);
  setTimeout(function(){el.style.opacity='0';el.style.transform='translateY(10px)';setTimeout(function(){el.remove();},300);},2800);
}

function addToCart(id,qty){
  var p=getProduct(id); if(!p)return; qty=qty||1;
  var it=findCart(id); if(it)it.qty+=qty; else cart.push({id:id,qty:qty});
  updateCartCount(); saveCartNow(); toast(p.name+' added to cart');
}
function setQty(id,qty){ var it=findCart(id); if(it)it.qty=Math.max(1,qty); updateCartCount(); saveCartNow(); }
function removeFromCart(id){ cart=cart.filter(function(i){return i.id!==id;}); updateCartCount(); saveCartNow(); }
function clearCart(){ cart=[]; updateCartCount(); saveCartNow(); }
function updateCartCount(){
  var n=cartQty(), el=$('#cartCount');
  if(el){ if(n>0){el.textContent=n;el.classList.remove('hidden');}else{el.classList.add('hidden');} }
  if(typeof AW.onCartChange==='function')AW.onCartChange();
}

/* ============================================================ WHATSAPP */
function singleMessage(p,qty){
  qty=qty||1;
  var L=['Hello '+settings.shopName+'! 👋','','I would like to order this item:','','• '+p.name+(p.brand?' — '+p.brand:'')];
  if(p.partNumber)L.push('  Part #: '+p.partNumber);
  L.push('  Qty: '+qty);
  var e=effPrice(p);
  if(p.showPrice&&e!=null)L.push('  Price: '+fmt(e)+(qty>1?' each  (= '+fmt(e*qty)+')':'')); else L.push('  Price: on request');
  L.push('  Link: '+productUrl(p.id));
  L.push('','Is it available? Thank you.');
  return L.join('\n');
}
function cartMessage(){
  var L=['Hello '+settings.shopName+'! 👋','','I would like to order the following:',''];
  var total=0,hasAsk=false,n=0;
  cart.forEach(function(it){
    var p=getProduct(it.id); if(!p)return; n++;
    L.push(n+'. '+p.name+(p.brand?' — '+p.brand:''));
    if(p.partNumber)L.push('   Part #: '+p.partNumber);
    L.push('   Qty: '+it.qty);
    var e=effPrice(p);
    if(p.showPrice&&e!=null){var lt=e*it.qty;total+=lt;L.push('   Price: '+fmt(e)+' each  (= '+fmt(lt)+')');}
    else{hasAsk=true;L.push('   Price: on request');}
    L.push('   Link: '+productUrl(p.id)); L.push('');
  });
  if(total>0)L.push('Estimated total: '+fmt(total)+(hasAsk?'  (+ items priced on request)':''));
  L.push('','Please confirm availability and the final price. Thank you!');
  return L.join('\n');
}

/* which nav item is current — works for both the hash-routed single file and the multi-page build */
function currentNavKey(){
  var path='', qs='';
  var h=String((typeof location!=='undefined'&&location.hash)||'');
  if(h.indexOf('#/')===0){
    var b=h.slice(2); qs=b.split('?')[1]||''; path=b.split('?')[0].replace(/\/+$/,'');
  } else {
    var f=((typeof location!=='undefined'&&location.pathname)||'').split('/').pop()||'';
    path=f.replace(/\.htm[l]?$/,'');
    qs=String((typeof location!=='undefined'&&AW._routeQuery())||'').replace(/^\?/,'');
  }
  if(!path||path==='index')return 'home';
  if(path==='shop')return /(^|&)offers=1/.test(qs)?'offers':'parts';
  return path;
}
function markActiveNav(){
  try{
    var key=currentNavKey();
    document.querySelectorAll('[data-nav]').forEach(function(a){
      var on=a.getAttribute('data-nav')===key;
      a.classList.toggle('active',on);
      if(on)a.setAttribute('aria-current','page'); else a.removeAttribute('aria-current');
    });
    initNavFx(); initHeaderScroll();
    moveNavInd(null);
    if(typeof requestAnimationFrame==='function')requestAnimationFrame(function(){ moveNavInd(null); });
  }catch(e){}
}

function verifyCode(code){
