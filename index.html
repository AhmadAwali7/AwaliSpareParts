/* ============================================================
   IDENTITY — an account is either a real email (verified by code)
   or a username (mapped to an internal address that never receives mail)
============================================================ */
var pendingVerify=null;
function looksLikeEmail(v){ return /^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(String(v||'').trim()); }
function normUsername(v){ return String(v||'').trim().toLowerCase(); }
function usernameError(u){
  if(!u)return 'Please choose a username.';
  if(u.length<3)return 'Username must be at least 3 characters.';
  if(u.length>20)return 'Username must be 20 characters or fewer.';
  if(!/^[a-z0-9._-]+$/.test(u))return 'Use only letters, numbers, dots, dashes or underscores.';
  if(!/^[a-z0-9]/.test(u))return 'Username must start with a letter or number.';
  return null;
}
function userDomain(){ return String(settings.usernameDomain||'users.awalispareparts.com').toLowerCase(); }
function synthEmail(u){ return normUsername(u)+'@'+userDomain(); }
function isSynth(email){ return String(email||'').toLowerCase().indexOf('@'+userDomain())>0; }
/* display name for an account: username accounts should never show the fake address */
function accountLabel(u){
  if(!u)return '';
  if(u.username)return '@'+u.username;
  return u.email||'';
}
/* turn whatever the person typed into the address Supabase expects */
function resolveIdentifier(id){
  id=String(id||'').trim();
  if(looksLikeEmail(id))return {email:normEmail(id),kind:'email'};
  var u=normUsername(id);
  return {email:synthEmail(u),kind:'username',username:u};
}
function needsVerify(){
  if(!AWDB)return false;
  var u=cachedUser;
  if(!u||u.role==='owner'||u.role==='admin')return false;
  if(u.kind!=='email')return false;
  return settings.requireEmailVerify!==false && !u.emailVerified;
}
function signup(name,identifier,pw,mode){
  name=String(name||'').trim();
  mode = mode || (looksLikeEmail(identifier)?'email':'username');
  if(!name)return Promise.resolve({ok:false,error:'Please enter your name.'});
  if(String(pw||'').length<6)return Promise.resolve({ok:false,error:'Password must be at least 6 characters.'});

  var email, username=null;
  if(mode==='email'){
    email=normEmail(identifier);
    if(!looksLikeEmail(email))return Promise.resolve({ok:false,error:'Please enter a valid email address.'});
    if(isSynth(email))return Promise.resolve({ok:false,error:'That email address is not allowed.'});
  } else {
    username=normUsername(identifier);
    var ue=usernameError(username);
    if(ue)return Promise.resolve({ok:false,error:ue});
    email=synthEmail(username);
  }

  if(AWDB.isCloud()){
    var meta={kind:mode}; if(username)meta.username=username;
    var pre = username ? AWDB.usernameTaken(username) : Promise.resolve(false);
    return pre.then(function(taken){
      if(taken)return {ok:false,error:'That username is already taken.'};
      return AWDB.signUp(name,email,pw,meta).then(function(r){
        if(!r.ok)return {ok:false,error:friendlyAuthError(r.error,mode)};
        /* username accounts are usable immediately; email accounts must confirm by code */
        if(mode==='username'){
          if(!r.session)return {ok:true,needsConfirm:true};
          return afterAuthCloud().then(function(){return {ok:true,role:cachedUser?cachedUser.role:'customer'};});
        }
        pendingVerify=email;
        return afterAuthCloud().catch(function(){}).then(function(){
          return AWDB.sendEmailCode(email).then(function(sent){
            return {ok:true,verify:true,email:email,sent:sent.ok,sendError:sent.ok?null:(sent.error2?(sent.error+' / '+sent.error2):sent.error)};
          });
        });
      });
    });
  }

  /* ---- local / demo mode ---- */
  if(mode==='email'&&email===normEmail(settings.ownerEmail))return Promise.resolve({ok:false,error:'That email is reserved. Please use another.'});
  var us=localUsers(),i;
  for(i=0;i<us.length;i++){
    if(normEmail(us[i].email)===email)return Promise.resolve({ok:false,error:mode==='email'?'An account with that email already exists.':'That username is already taken.'});
    if(username&&normUsername(us[i].username||'')===username)return Promise.resolve({ok:false,error:'That username is already taken.'});
  }
  var nu={id:'u'+Date.now().toString(36)+Math.random().toString(36).slice(2,6),name:name,email:email,username:username,
          kind:mode,emailVerified:(mode!=='email'),password:String(pw),role:'customer',createdAt:Date.now()};
  if(mode==='email')nu.pendingCode=localMakeCode();
  us.push(nu); AWDB.localAuth.setUsers(us); AWDB.localAuth.setSession({id:nu.id}); computeLocalUser();
  return afterAuthLocal().then(function(){
    if(mode==='email')return {ok:true,verify:true,email:email,sent:true,localCode:nu.pendingCode};
    return {ok:true,role:'customer'};
  });
}
function localMakeCode(){ return String(Math.floor(100000+Math.random()*900000)); }
function friendlyAuthError(msg,mode){
  var m=String(msg||'');
  if(/already registered|already exists|duplicate/i.test(m))return mode==='username'?'That username is already taken.':'An account with that email already exists.';
  if(/rate limit|too many/i.test(m))return 'Too many attempts. Please wait a minute and try again.';
  if(/password/i.test(m)&&/short|least/i.test(m))return 'Password must be at least 6 characters.';
  return m||'Could not create the account.';
}

   CAROUSELS — multiple independent instances, several effects
============================================================ */
var _cars={};
function carEl(id){ try{ return document.getElementById(id); }catch(e){ return null; } }
function carRenderOne(c){
  var tr=carEl(c.trackId); if(!tr)return;
  if(c.effect==='slide'&&tr.style)tr.style.transform='translateX(-'+(c.idx*100)+'%)';
  var kids=tr.children||[];
  for(var i=0;i<kids.length;i++){ if(kids[i]&&kids[i].classList)kids[i].classList.toggle('on', i===c.idx); }
  var root=carEl(c.id); if(!root||!root.querySelectorAll)return;
  var dots=root.querySelectorAll('.car-dot');
  for(var j=0;j<dots.length;j++)dots[j].classList.toggle('on',j===c.idx);
  try{ var pb=root.querySelector('.car-prog i'); if(pb){ pb.classList.remove('run'); void pb.offsetWidth; pb.classList.add('run'); } }catch(e){}
  try{ var cn=root.querySelector('.car-count b'); if(cn)cn.textContent=String(c.idx+1); }catch(e){}
}
function carGoId(id,d){ var c=_cars[id]; if(!c||c.n<2)return; c.idx=((c.idx+d)%c.n+c.n)%c.n; carRenderOne(c); }
function carToId(id,i){ var c=_cars[id]; if(!c)return; c.idx=Math.max(0,Math.min(c.n-1,i)); carRenderOne(c); }
function carInitOne(id,n,effect){
  var prev=_cars[id]; if(prev&&prev.timer)clearInterval(prev.timer);
  var c={id:id,trackId:id+'_track',n:n,idx:0,effect:effect||'slide',timer:null};
  _cars[id]=c; carRenderOne(c);
  var root=carEl(id);
  if(root&&n>1&&!root._swipe&&root.addEventListener){ root._swipe=true; var x0=null,y0=null;
    root.addEventListener('touchstart',function(e){ x0=e.touches[0].clientX; y0=e.touches[0].clientY; },{passive:true});
    root.addEventListener('touchend',function(e){ if(x0==null)return; var dx=e.changedTouches[0].clientX-x0, dy=e.changedTouches[0].clientY-y0; if(Math.abs(dx)>40&&Math.abs(dx)>Math.abs(dy))carGoId(id,dx<0?1:-1); x0=null; },{passive:true});
  }
  if(n>1){ c.timer=setInterval(function(){ if(carEl(c.trackId))carGoId(id,1); else { clearInterval(c.timer); c.timer=null; delete _cars[id]; } },5200); }
}

function cdCell(v,l){ return '<div class="cd-cell"><b>'+(v<10?'0':'')+v+'</b><small>'+esc(t(l))+'</small></div>'; }
function startCountdowns(){
  if(_cdTimer){ clearInterval(_cdTimer); _cdTimer=null; }
  function tick(){
    var els; try{ els=document.querySelectorAll('[data-until]'); }catch(e){ return; }
    if(!els||!els.length){ if(_cdTimer){clearInterval(_cdTimer);_cdTimer=null;} return; }
    for(var i=0;i<els.length;i++){
      var el=els[i], until=Date.parse(el.getAttribute('data-until')||'');
      if(isNaN(until)){ el.innerHTML='<span class="cd-over">'+esc(t('Set an end date'))+'</span>'; continue; }
      var d=until-Date.now();
      if(d<=0){ el.innerHTML='<span class="cd-over">'+esc(t('Offer ended'))+'</span>'; continue; }
      el.innerHTML=cdCell(Math.floor(d/86400000),'Days')+cdCell(Math.floor(d/3600000)%24,'Hours')+cdCell(Math.floor(d/60000)%60,'Min')+cdCell(Math.floor(d/1000)%60,'Sec');
    }
  }
  tick(); _cdTimer=setInterval(tick,1000);

/* image resize/upload */
function handleImagePick(file,cb,opts){
  if(!file)return; opts=opts||{};
  var max=opts.max||900;
  var reader=new FileReader();
  reader.onload=function(ev){
    var img=new Image();
    img.onload=function(){
      var w=img.width,h=img.height;
      if(w>max||h>max){if(w>h){h=Math.round(h*max/w);w=max;}else{w=Math.round(w*max/h);h=max;}}
      var c=document.createElement('canvas');c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);
      cb(opts.png?c.toDataURL('image/png'):c.toDataURL('image/jpeg',0.82));
    };
    img.src=ev.target.result;
  };
  reader.readAsDataURL(file);
}

AW.pages['shop']=function(){
  var I=AW.I, app=AW.$('#app'); if(!app)return;
  var params=new URLSearchParams(AW._routeQuery());
  var cat=params.get('cat')||'', q=(params.get('q')||'').trim(), offersOnly=params.get('offers')==='1';

  var list=AW.listedProducts();
  if(offersOnly)list=list.filter(AW.isOffer);
  if(cat)list=list.filter(function(p){return p.category===cat;});
  if(q){var ql=q.toLowerCase();list=list.filter(function(p){
    return (p.name||'').toLowerCase().indexOf(ql)>=0||(p.partNumber||'').toLowerCase().indexOf(ql)>=0||(p.brand||'').toLowerCase().indexOf(ql)>=0||AW.catLabel(p.category).toLowerCase().indexOf(ql)>=0;
  });}
  list.sort(function(a,b){return (b.createdAt||0)-(a.createdAt||0);});

  var title=offersOnly?'Current offers':cat?AW.catLabel(cat):q?('Results for “'+q+'”'):'All spare parts';

  var vis=AW.visibleCategories();
  var pills='<a class="fpill'+(!cat&&!offersOnly?' active':'')+'" href="#/shop'+(q?('?q='+encodeURIComponent(q)):'')+'">All</a>'
    +'<a class="fpill'+(offersOnly?' active':'')+'" href="#/shop?offers=1">🔥 Offers</a>'
    +vis.map(function(c){return '<a class="fpill'+(cat===c.key?' active':'')+'" href="#/shop?cat='+c.key+(q?('&q='+encodeURIComponent(q)):'')+'">'+c.label+'</a>';}).join('');

  var body=list.length
    ? '<div class="grid">'+list.map(AW.productCard).join('')+'</div>'
    : '<div class="empty"><div class="ei">'+I.search+'</div><h3>No parts found</h3><p class="muted">We couldn’t find a match'+(q?(' for “'+AW.esc(q)+'”'):'')+'. Try another search, or ask us directly on WhatsApp — we may have it in stock.</p><div style="margin-top:18px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap"><a class="btn btn-outline" href="#/shop">View all parts</a><button class="btn btn-wa" data-act="contact-wa">'+I.wa+'Ask on WhatsApp</button></div></div>';

  app.innerHTML='<div class="page"><div class="wrap">'
    +'<div class="crumbs"><a href="#/">Home</a> / '+AW.esc(title)+'</div>'
    +'<div class="shop-head"><h1>'+AW.esc(title)+'</h1><span class="shop-count">'+list.length+' item'+(list.length===1?'':'s')+'</span></div>'
    +'<div class="filters">'+pills+'</div>'+body
  +'</div></div>';
};

/* quantity + order actions for this page */
document.addEventListener('click',function(e){
  var t=e.target.closest?e.target.closest('[data-act]'):null; if(!t)return;
  var act=t.getAttribute('data-act'), id=t.getAttribute('data-id'), q=AW.$('#pdQty');
  if(act==='pd-inc'&&q)q.value=Math.max(1,(parseInt(q.value,10)||1)+1);
  else if(act==='pd-dec'&&q)q.value=Math.max(1,(parseInt(q.value,10)||1)-1);
  else if(act==='pd-add')AW.addToCart(id,Math.max(1,parseInt((q||{}).value,10)||1));
  else if(act==='pd-order')AW.orderSingle(id,Math.max(1,parseInt((q||{}).value,10)||1));
  else if(act==='pd-qr')AW.showQR(id);
});

/* cart actions */
document.addEventListener('click',function(e){
  var t=e.target.closest?e.target.closest('[data-act]'):null; if(!t)return;
  var act=t.getAttribute('data-act'), id=t.getAttribute('data-id');
  if(act==='cart-inc'){var it=AW.findCart(id);if(it)AW.setQty(id,it.qty+1);}
  else if(act==='cart-dec'){var it2=AW.findCart(id);if(it2)AW.setQty(id,it2.qty-1);}
  else if(act==='cart-remove')AW.removeFromCart(id);
  else if(act==='cart-clear')AW.clearCart();
  else if(act==='cart-checkout')AW.orderCart();
});
document.addEventListener('change',function(e){
  var t=e.target.closest?e.target.closest('[data-act]'):null; if(!t)return;
  if(t.getAttribute('data-act')==='cart-qty'){var q=parseInt(t.value,10);if(isNaN(q)||q<1)q=1;AW.setQty(t.getAttribute('data-id'),q);}
});

    var _cu=AW.currentUser();

  function blocksNow(){ return (AW.settings.featuredBlocks||[]).slice(); }

  function blockSummary(b){
    switch(b.type){
      case 'discount':  return (b.prefix?b.prefix+' ':'')+b.pct+'% '+(b.suffix||'')+(b.label?' · '+b.label:'');
      case 'product':   { var p=AW.getProduct(b.productId); return p?p.name:'No product chosen yet'; }
      case 'promo':     return b.title||'Untitled promo';
      case 'carousel':  return (b.slides||[]).length+' image'+((b.slides||[]).length===1?'':'s')+' · '+(b.effect||'slide');
      case 'countdown': return b.until?('Ends '+new Date(b.until).toLocaleString()):'No end date set';
      case 'bundle':    return (b.lines||[]).length+' line'+((b.lines||[]).length===1?'':'s')+' · '+(b.title||'');
      case 'social':    return (b.platform||'instagram')+' · '+(b.design||'card')+(b.url?'':' · no link yet');
      case 'marquee':   return b.text||'';

    return '';

  function toLocalInput(iso){
    if(!iso)return '';
    var d=new Date(iso); if(isNaN(d.getTime()))return '';
    function z(n){return (n<10?'0':'')+n;}
    return d.getFullYear()+'-'+z(d.getMonth()+1)+'-'+z(d.getDate())+'T'+z(d.getHours())+':'+z(d.getMinutes());
  }

  function customersView(){
    var all=AW.listCustomers().slice();
    var ownerEmail=(AW.settings.ownerEmail||'').toLowerCase();
    var canManage=AW.isPrimaryOwner();
    var isAdminRole=function(r){return r==='owner'||r==='admin';};
    var admins=all.filter(function(u){return isAdminRole(u.role);});
    var customers=all.filter(function(u){return !isAdminRole(u.role);});
    if(!admins.some(function(u){return u.role==='owner'||(u.email||'').toLowerCase()===ownerEmail;}))
      admins.unshift({id:'__owner__',name:AW.settings.ownerName||'Owner',email:AW.settings.ownerEmail,role:'owner',primary:true});

ue="'+AW.esc(s.ownerAvatar||'')+'"/></div></div>'):'')

  /* ============================ EVENTS ============================ */
  document.addEventListener('click',function(e){
    var t=e.target.closest?e.target.closest('[data-act]'):null; if(!t)return;
    var act=t.getAttribute('data-act'), id=t.getAttribute('data-id'), cat=t.getAttribute('data-cat');
    switch(act){
      case 'auth-tab': state.authTab=t.getAttribute('data-tab'); state.verifyEmail=null; render(); break;
      case 'signup-mode': state.signupMode=t.getAttribute('data-mode')||'email'; render(); break;
      case 'verify-logout': state.verifyEmail=null; state.verifyLocalCode=null; state.verifyError=null;
        AW.logout().then(function(){ state.authTab='login'; render(); AW.toast('Signed out'); }); break;
      case 'resend-code': {
        if(Date.now()<state.resendAt){ AW.toast('Please wait a moment before asking again',true); break; }
        AW.sendVerifyCode().then(function(r){
          if(r.ok){ state.resendAt=Date.now()+60000; state.verifyLocalCode=r.localCode||null; state.verifyError=null; render(); AW.toast('New code sent'); }
          else { state.verifyError=r.error||'Unknown mail error'; render(); AW.toast('Could not send the code',true); }
        });
        break; }
      case 'mail-test': {
        var out=AW.$('#mailTestOut'); if(out)out.innerHTML='<span class="muted">Sending…</span>';
        AW.testEmailDelivery().then(function(r){
          if(!out)return;
          out.innerHTML = r.ok
            ? '<div class="mt-ok">Sent. Check the inbox for <b>'+AW.esc(r.email)+'</b> (and the spam folder).</div>'
            : '<div class="mt-bad"><b>Failed:</b> '+AW.esc(r.error||'unknown')+'</div>';
        });
        break; }
      case 'verify-banner-send': {
        AW.sendVerifyCode().then(function(r){
          if(r.ok){ state.verifyEmail=(AW.currentUser()||{}).email; state.verifyLocalCode=r.localCode||null; state.resendAt=Date.now()+60000; render(); AW.toast('We sent you a 6-digit code'); }
          else AW.toast(r.error||'Could not send the code',true);
        });
        break; }
      case 'acct-logout': AW.logout().then(function(){ state.tab='products'; state.editId=null; state.authTab='login'; render(); AW.toast('Logged out'); }); break;
      case 'acct-order': AW.orderCart(); break;
      case 'admin-tab': state.tab=t.getAttribute('data-tab'); if(state.tab!=='add')state.editId=null; if(state.tab!=='categories')state.catEdit=null; if(state.tab!=='featured'){state.featSlides=null;state.blockEdit=null;state.blkSlides=null;} render(); if(state.tab==='customers')AW.refreshCustomers().then(function(){ if(state.tab==='customers')render(); }); break;
      case 'admin-edit': state.editId=id; state.tab='add'; render(); break;
      case 'admin-toggle-visible': { var p=AW.getProduct(id); if(p){AW.setProductVisible(id,p.visible===false); AW.toast(p.visible===false?'Item hidden from shop':'Item shown in shop'); render();} break; }
      case 'admin-qr': AW.showQR(id); break;
      case 'admin-delete': confirmDelete(id); break;
      case 'confirm-delete-yes': AW.deleteProductById(t.getAttribute('data-id')); AW.closeModal(); render(); AW.toast('Product deleted'); break;
      case 'delete-customer': confirmDeleteCustomer(id); break;
      case 'make-admin': AW.makeAdmin(id).then(function(){ render(); AW.toast('Now an admin'); }).catch(function(e){ AW.toast(adminErr(e),true); }); break;
      case 'remove-admin': AW.removeAdmin(id).then(function(){ render(); AW.toast('Admin removed'); }).catch(function(e){ AW.toast(adminErr(e),true); }); break;
      case 'toggle-pw': { var pin=AW.$('#'+t.getAttribute('data-for')); if(pin){ pin.type=(pin.type==='password'?'text':'password'); t.textContent=(pin.type==='password'?'Show':'Hide'); } break; }
      case 'car-del-slide': { var ci=parseInt(t.getAttribute('data-i'),10); if(state.featSlides&&ci>=0){ state.featSlides.splice(ci,1); render(); } break; }
      case 'confirm-delcust-yes': AW.deleteUser(t.getAttribute('data-id')).then(function(){ AW.closeModal(); render(); AW.toast('Account removed'); }); break;
      case 'cat-visible': AW.toggleCategoryVisible(cat); render(); break;
      case 'cat-edit': state.catEdit=cat; render(); break;
      case 'cat-edit-cancel': state.catEdit=null; render(); break;
      case 'cat-delete': confirmDeleteCategory(cat); break;
      case 'confirm-delcat-yes': AW.deleteCategory(t.getAttribute('data-cat')); AW.closeModal(); state.catEdit=null; render(); AW.toast('Category deleted'); break;
      case 'blk-add': { var nb=AW.normBlock({type:t.getAttribute('data-type')}); var L=blocksNow(); L.push(nb); AW.setFeaturedBlocks(L); state.blockEdit=nb.id; state.blkSlides=null; render(); break; }
      case 'blk-edit': state.blockEdit=t.getAttribute('data-id'); state.blkSlides=null; render(); break;
      case 'blk-back': state.blockEdit=null; state.blkSlides=null; render(); break;
      case 'blk-del': { var did=t.getAttribute('data-id'); commitBlocks(blocksNow().filter(function(x){return x.id!==did;}),'Block removed'); break; }
      case 'blk-toggle': { var tid=t.getAttribute('data-id'); commitBlocks(blocksNow().map(function(x){ if(x.id===tid)x.enabled=!x.enabled; return x; })); break; }
      case 'blk-up': case 'blk-down': {
        var mid=t.getAttribute('data-id'), L2=blocksNow(), ix=-1, k;
        for(k=0;k<L2.length;k++)if(L2[k].id===mid)ix=k;
        var to=ix+(t.getAttribute('data-act')==='blk-up'?-1:1);
        if(ix>=0&&to>=0&&to<L2.length){ var tmp=L2[ix]; L2[ix]=L2[to]; L2[to]=tmp; commitBlocks(L2); }
        break; }
      case 'blk-del-slide': { var si=parseInt(t.getAttribute('data-i'),10); if(state.blkSlides&&si>=0){ state.blkSlides.splice(si,1); render(); } break; }
      case 'blk-slide-up': case 'blk-slide-down': {
        var qi=parseInt(t.getAttribute('data-i'),10), qto=qi+(t.getAttribute('data-act')==='blk-slide-up'?-1:1);
        if(state.blkSlides&&qi>=0&&qto>=0&&qto<state.blkSlides.length){ var sw=state.blkSlides[qi]; state.blkSlides[qi]=state.blkSlides[qto]; state.blkSlides[qto]=sw; render(); }
        break; }
      case 'feat-mode': setFeatMode(t.getAttribute('data-mode')); break;
      case 'img-clear': { var h=AW.$('#imageData'); if(h)h.value=''; var w=AW.$('#imgPreviewWrap'); if(w)w.innerHTML=''; var fi=AW.$('#imgInput'); if(fi)fi.value=''; break; }
      case 'logo-clear': { var lh=AW.$('#logoData'); if(lh)lh.value=''; var lw=AW.$('#logoPreviewWrap'); if(lw)lw.innerHTML=''; var lfi=AW.$('#logoInput'); if(lfi)lfi.value=''; break; }
      case 'fsoc-img-clear': { var fh=AW.$('#fsocImageData'); if(fh)fh.value=''; var fw=AW.$('#fsocImgPreviewWrap'); if(fw)fw.innerHTML=''; var ffi=AW.$('#fsocImgInput'); if(ffi)ffi.value=''; break; }
      case 'cat-icon-clear': { var csx=t.getAttribute('data-suffix')||''; var chd=AW.$('#catIconData'+csx); if(chd)chd.value=''; var cpv=AW.$('#cipPrev'+csx); if(cpv){ var selEl=document.querySelector('#catIconData'+csx) && t.closest('form') ? t.closest('form').querySelector('select[name="icon"]') : null; cpv.innerHTML=AW.catIconSvg((selEl&&selEl.value)||'parts'); } t.style.display='none'; break; }
      case 'prof-avatar-clear': { var ph=AW.$('#profAvData'); if(ph)ph.value=''; var pw=AW.$('#profAvWrap'); if(pw)pw.innerHTML='<span>'+AW.esc(((AW.currentUser()||{}).name||'?').charAt(0).toUpperCase())+'</span>'; t.style.display='none'; break; }
      case 'owner-avatar-clear': { var oh=AW.$('#ownerAvData'); if(oh)oh.value=''; var ow=AW.$('#ownerAvWrap'); if(ow)ow.innerHTML='<span>'+AW.esc((AW.settings.ownerName||'?').charAt(0).toUpperCase())+'</span>'; t.style.display='none'; break; }
      case 'feat-img-clear': { var h2=AW.$('#featImageData'); if(h2)h2.value=''; var w2=AW.$('#featImgPreviewWrap'); if(w2)w2.innerHTML=''; var fi2=AW.$('#featImgInput'); if(fi2)fi2.value=''; break; }
      case 'export-data': AW.exportData(); break;
      case 'print-all-qr': AW.printAllLabels(); break;
      case 'wipe-data': confirmWipe(); break;
      case 'confirm-wipe-yes': AW.wipeProducts(); AW.closeModal(); render(); AW.toast('All products deleted'); break;
    }
  });
  document.addEventListener('submit',function(e){
    var f=e.target.closest?e.target.closest('[data-act]'):null; if(!f||f.tagName!=='FORM')return;
    var act=f.getAttribute('data-act');
    if(act==='auth-login'){ e.preventDefault(); var d=new FormData(f); AW.login(d.get('email'),d.get('password')).then(function(r){ if(r.ok){render();AW.toast(r.role==='owner'?'Welcome back':'Logged in');}else AW.toast(r.error||'Login failed',true); }); }
    else if(act==='auth-signup'){ e.preventDefault(); var d2=new FormData(f);
      AW.signup(d2.get('name'),d2.get('identifier'),d2.get('password'),d2.get('mode')).then(function(r){
        if(!r.ok){ AW.toast(r.error||'Could not sign up',true); return; }
        if(r.verify){
          state.verifyEmail=r.email; state.verifyLocalCode=r.localCode||null;
          state.resendAt=Date.now()+60000; render();
          state.verifyError=r.sent?null:(r.sendError||'Unknown mail error');
          render();
          if(r.sent)AW.toast('We sent you a 6-digit code');
          else AW.toast('Account created, but the code could not be sent',true);
          return;
        }
        if(r.needsConfirm){ state.authTab='login'; render(); AW.toast('Check your email to confirm, then log in.'); return; }
        render(); AW.toast('Account created — welcome!');
      }); }
    else if(act==='verify-code'){ e.preventDefault(); var d9=new FormData(f);
      AW.verifyCode(d9.get('code')).then(function(r){
        if(!r.ok){ AW.toast(r.error||'Could not verify',true); return; }
        state.verifyEmail=null; state.verifyLocalCode=null; render(); AW.toast('Email verified — welcome!');
      }); }
    else if(act==='save-profile'){ e.preventDefault(); var d3=new FormData(f); AW.updateProfile({name:d3.get('name'),password:d3.get('password'),avatar:d3.get('avatar')}).then(function(r){ if(r.ok){render(true);AW.toast('Details saved');}else AW.toast(r.error||'Could not save',true); }); }
    else if(act==='admin-save'){ e.preventDefault(); saveProduct(f); }
    else if(act==='save-settings'){ e.preventDefault(); saveSettings(f); }
    else if(act==='save-block'){ e.preventDefault(); saveBlock(f); }
    else if(act==='save-featured'){ e.preventDefault(); saveFeatured(f); }
    else if(act==='add-category'){ e.preventDefault(); var dc=new FormData(f); var key=AW.addCategory(dc.get('label'),dc.get('blurb'),dc.get('icon'),dc.get('iconImg')); if(key){render();AW.toast('Category added');}else AW.toast('Please enter a category name',true); }
    else if(act==='save-category'){ e.preventDefault(); var de=new FormData(f); AW.updateCategory(de.get('key'),de.get('label'),de.get('blurb'),de.get('icon'),de.get('iconImg')); state.catEdit=null; render(); AW.toast('Category updated'); }
  });
  document.addEventListener('change',function(e){
    var t=e.target.closest?e.target.closest('[data-act]'):null; if(!t)return;
    var act=t.getAttribute('data-act');
    if(act==='img-pick'){ AW.handleImagePick(t.files&&t.files[0],function(data){ var h=AW.$('#imageData'); if(h)h.value=data; var w=AW.$('#imgPreviewWrap'); if(w)w.innerHTML=imgPreview(data,false); }); }
    else if(act==='logo-pick'){ AW.handleImagePick(t.files&&t.files[0],function(data){ var h=AW.$('#logoData'); if(h)h.value=data; var w=AW.$('#logoPreviewWrap'); if(w)w.innerHTML=logoPreview(data); },{png:true,max:420}); }
    else if(act==='fsoc-img-pick'){ AW.handleImagePick(t.files&&t.files[0],function(data){ var h=AW.$('#fsocImageData'); if(h)h.value=data; var w=AW.$('#fsocImgPreviewWrap'); if(w)w.innerHTML=socImgPreview(data); }); }
    else if(act==='prof-avatar-pick'){ AW.handleImagePick(t.files&&t.files[0],function(data){ var h=AW.$('#profAvData'); if(h)h.value=data; var w=AW.$('#profAvWrap'); if(w)w.innerHTML='<img src="'+data+'" alt=""/>'; var rb=document.querySelector('[data-act="prof-avatar-clear"]'); if(rb)rb.style.display=''; },{png:true,max:256}); }
    else if(act==='owner-avatar-pick'){ AW.handleImagePick(t.files&&t.files[0],function(data){ var h=AW.$('#ownerAvData'); if(h)h.value=data; var w=AW.$('#ownerAvWrap'); if(w)w.innerHTML='<img src="'+data+'" alt=""/>'; var rb=document.querySelector('[data-act="owner-avatar-clear"]'); if(rb)rb.style.display=''; },{png:true,max:256}); }
    else if(act==='blk-img-pick'){ AW.handleImagePick(t.files&&t.files[0],function(data){ var h=AW.$('#blkImageData'); if(h)h.value=data; var w=AW.$('#blkImgPreviewWrap'); if(w)w.innerHTML=imgPreview(data,true); },{png:true,max:1000}); }
    else if(act==='blk-add-slide'){ AW.handleImagePick(t.files&&t.files[0],function(data){ if(!state.blkSlides)state.blkSlides=[]; state.blkSlides.push({image:data,title:'',link:''}); render(); }); }
    else if(act==='car-add-slide'){ AW.handleImagePick(t.files&&t.files[0],function(data){ if(!state.featSlides)state.featSlides=[]; state.featSlides.push({image:data,title:'',link:''}); render(); }); }
    else if(act==='cat-icon-pick'){ var sfx=t.getAttribute('data-suffix')||''; AW.handleImagePick(t.files&&t.files[0],function(data){ var hd=AW.$('#catIconData'+sfx); if(hd)hd.value=data; var pv=AW.$('#cipPrev'+sfx); if(pv)pv.innerHTML='<img src="'+AW.esc(data)+'" alt=""/>'; var cl=document.querySelector('[data-act="cat-icon-clear"][data-suffix="'+sfx+'"]'); if(cl)cl.style.display=''; },{max:160,png:true}); }
    else if(act==='feat-img-pick'){ AW.handleImagePick(t.files&&t.files[0],function(data){ var h=AW.$('#featImageData'); if(h)h.value=data; var w=AW.$('#featImgPreviewWrap'); if(w)w.innerHTML=imgPreview(data,true); }); }
    else if(act==='import-data'){ AW.importData(t.files&&t.files[0],function(ok){ if(ok){state.tab='products';state.editId=null;render();} }); }
    else if(act==='toggle-price'){ var pf=AW.$('#priceFields'); if(pf)pf.classList.toggle('hidden',!t.checked); }
  });
  document.addEventListener('input',function(e){
    var t=e.target.closest?e.target.closest('[data-act]'):null; if(!t)return;
    var a=t.getAttribute('data-act');
    if(a==='calc-discount')updateDiscountPreview();
    else if(a==='blk-slide-title'){ var bi=parseInt(t.getAttribute('data-i'),10); if(state.blkSlides&&state.blkSlides[bi])state.blkSlides[bi].title=t.value; }
    else if(a==='blk-slide-link'){ var bj=parseInt(t.getAttribute('data-i'),10); if(state.blkSlides&&state.blkSlides[bj])state.blkSlides[bj].link=t.value; }
    else if(a==='car-slide-title'){ var i=parseInt(t.getAttribute('data-i'),10); if(state.featSlides&&state.featSlides[i])state.featSlides[i].title=t.value; }
    else if(a==='car-slide-link'){ var j=parseInt(t.getAttribute('data-i'),10); if(state.featSlides&&state.featSlides[j])state.featSlides[j].link=t.value; }
  });

  function setFeatMode(mode){
    var hid=AW.$('#featMode'); if(hid)hid.value=mode;
    var pg=AW.$('#featProductGroup'), cg=AW.$('#featCustomGroup'), rg=AW.$('#featCarouselGroup');
    if(pg)pg.classList.toggle('hidden',mode!=='product');
    if(cg)cg.classList.toggle('hidden',mode!=='custom');
    if(rg)rg.classList.toggle('hidden',mode!=='carousel');
    document.querySelectorAll('.mode-opt').forEach(function(o){o.classList.toggle('active',o.getAttribute('data-mode')===mode);});
  }

  /* save handlers */
  function saveProduct(form){
    var fd=new FormData(form);
    var name=String(fd.get('name')||'').trim(); if(!name){AW.toast('Please enter a product name',true);return;}
    var showPrice=fd.get('showPrice')==='on';
    var price=fd.get('price'); price=(price===''||price==null)?null:parseFloat(price);
    var offer=fd.get('offerPrice'); offer=(offer===''||offer==null)?null:parseFloat(offer);
    if(!showPrice){price=null;offer=null;}
    if(showPrice&&offer!=null&&price!=null&&offer>=price){AW.toast('Offer price must be lower than the price',true);return;}
    var obj={name:name,category:fd.get('category'),brand:String(fd.get('brand')||'').trim(),partNumber:String(fd.get('partNumber')||'').trim(),description:String(fd.get('description')||'').trim(),image:fd.get('image')||'',showPrice:showPrice,price:isNaN(price)?null:price,offerPrice:isNaN(offer)?null:offer,inStock:fd.get('inStock')==='on',visible:fd.get('visible')==='on'};
    var editId=fd.get('id'); AW.saveProductObj(obj,editId); AW.toast(editId?'Product updated':'Product added');
    state.tab='products'; state.editId=null; render();
  }
  function saveSettings(form){
    var fd=new FormData(form), patch={};
    var cloud = AW.isCloud && AW.isCloud();
    ['shopName','siteUrl','about','address','currency','email','instagram','tiktok'].forEach(function(k){patch[k]=String(fd.get(k)||'').trim();});
    if(AW.isPrimaryOwner()){
      ['ownerName','ownerAvatar'].forEach(function(k){patch[k]=String(fd.get(k)||'').trim();});
      if(cloud){
        var np=String(fd.get('newOwnerPw')||'');
        if(np){ if(np.length<6){ AW.toast('New password must be at least 6 characters',true); return; } AW.changeOwnerPassword(np).then(function(r){ AW.toast(r.ok?'Login password updated — use it next time you sign in':(r.error||'Could not change password'),!r.ok); }); }
        patch.adminPassword=''; // never store a plaintext owner password in the shared database
      } else {
        patch.adminPassword=String(fd.get('adminPassword')||'').trim()||'awali-admin';
        patch.ownerEmail=String(fd.get('ownerEmail')||'').trim()||'owner@awalispareparts.com';
      }
    }
    patch.featuredSocial={ enabled:fd.get('fsoc_enabled')==='on', platform:(fd.get('fsoc_platform')||'instagram'), url:String(fd.get('fsoc_url')||'').trim(), title:String(fd.get('fsoc_title')||'').trim(), subtitle:String(fd.get('fsoc_subtitle')||'').trim(), image:fd.get('fsoc_image')||'' };
    patch.specialDay={ enabled:fd.get('sd_enabled')==='on', type:(fd.get('sd_type')||'custom'), message:String(fd.get('sd_message')||'').trim(), ctaText:String(fd.get('sd_ctaText')||'').trim(), ctaLink:String(fd.get('sd_ctaLink')||'').trim() };
    var phones=[];
    String(fd.get('phones')||'').split('\n').forEach(function(line){ line=line.trim(); if(!line)return; var label='',number=line, i=line.indexOf('|'); if(i>=0){label=line.slice(0,i).trim();number=line.slice(i+1).trim();} if(number)phones.push({label:label,number:number}); });
    patch.phones=phones.length?phones:AW.settings.phones;
    var branches=[];
    String(fd.get('branches')||'').split('\n').forEach(function(line){ line=line.trim(); if(!line)return;
      var parts=line.split('|'), nm='', addr='', url='';
      function isLink(x){ return /^(https?:\/\/|www\.|maps\.|goo\.gl)/i.test(String(x||'').trim()); }
      if(parts.length>=3){ nm=parts[0].trim(); addr=parts[1].trim(); url=parts.slice(2).join('|').trim(); }
      else if(parts.length===2){ if(isLink(parts[1])){ nm=parts[0].trim(); url=parts[1].trim(); } else { nm=parts[0].trim(); addr=parts[1].trim(); } }
      else { if(isLink(parts[0]))url=parts[0].trim(); else addr=parts[0].trim(); }
      if(nm||addr||url)branches.push({name:nm,address:addr,url:url}); });
    patch.branches=branches;
    patch.requireEmailVerify=fd.get('requireEmailVerify')==='on';
    patch.footerNote=String(fd.get('footerNote')||'').trim();
    patch.footerNoteFirst=String(fd.get('footerNoteFirst')||'0')==='1';
    patch.logo=String(fd.get('logo')||'');
    var dec=parseInt(fd.get('decimals'),10); patch.decimals=isNaN(dec)?2:Math.max(0,Math.min(3,dec));
    AW.saveSettingsObj(patch); AW.toast('Settings saved');
    if(AW.isPrimaryOwner() && patch.ownerName && (AW.currentUser()||{}).name!==patch.ownerName){
      AW.updateProfile({name:patch.ownerName}).then(function(){ render(true); }).catch(function(){});
    }
    render(true);
  }
  function saveBlock(form){
    var fd=new FormData(form), id=String(fd.get('id')||'');
    var L=blocksNow(), idx=-1, i;
    for(i=0;i<L.length;i++)if(L[i].id===id)idx=i;
    if(idx<0){ AW.toast('Block not found',true); return; }
    var b=Object.assign({},L[idx]);
    function g(k){ var v=fd.get(k); return v==null?undefined:String(v); }
    ['prefix','pct','suffix','label','title','subtitle','ctaText','ctaLink','badge','productId',
     'theme','effect','platform','design','url','image','text','speed'].forEach(function(k){
      var v=g(k); if(v!==undefined)b[k]=v.trim();
    });
    if(b.type==='bundle'){ b.lines=String(fd.get('lines')||'').split('\n').map(function(x){return x.trim();}).filter(Boolean); }
    if(b.type==='countdown'){ var u=String(fd.get('until')||'').trim(); b.until=u?new Date(u).toISOString():''; }
    if(b.type==='carousel'){
      var sl=(state.blkSlides||[]).filter(function(x){return x.image;}).map(function(x){return {image:x.image,title:String(x.title||'').trim(),link:String(x.link||'').trim()};});
      b.slides=sl;
      if(!sl.length){ AW.toast('Add at least one image first',true); return; }
    }
    L[idx]=AW.normBlock(b);
    state.blkSlides=null; state.blockEdit=null;
    commitBlocks(L,'Block saved');
  }
  function saveFeatured(form){
    var fd=new FormData(form); var mode=fd.get('mode')||'product';
    var badge = mode==='custom' ? String(fd.get('badgeCustom')||'').trim() : String(fd.get('badge')||'').trim();
    var slides=(state.featSlides||[]).filter(function(sl){return sl.image;}).map(function(sl){return {image:sl.image,title:String(sl.title||'').trim(),link:String(sl.link||'').trim()};});
    var f={enabled:fd.get('enabled')==='on',mode:mode,productId:fd.get('productId')||AW.settings.featured.productId,image:fd.get('image')||'',title:String(fd.get('title')||'').trim(),subtitle:String(fd.get('subtitle')||'').trim(),badge:badge,ctaText:String(fd.get('ctaText')||'').trim()||'Shop now',ctaLink:String(fd.get('ctaLink')||'').trim()||'#/shop?offers=1',slides:slides};
    if(mode==='carousel'&&!slides.length){ AW.toast('Add at least one image, or pick another mode',true); return; }
    AW.setFeatured(f); state.featSlides=null; AW.toast('Featured banner saved'); render();
  }
  function confirmDeleteCategory(key){
    var c=AW.catByKey(key); if(!c)return;
    var count=AW.products.filter(function(p){return p.category===key;}).length;
    var warn=count?('<p style="color:#c1362b"><b>'+count+' product'+(count===1?' is':'s are')+'</b> in this category. They won’t be deleted, but they’ll be uncategorised until you assign them elsewhere.</p>'):'';
    AW.openModal('<h3>Delete “'+AW.esc(c.label)+'”?</h3>'+warn+'<p>This removes the category from your menus and filters.</p><div class="modal-actions"><button class="btn btn-ghost btn-sm" data-act="modal-close">Cancel</button><button class="btn btn-danger btn-sm" data-act="confirm-delcat-yes" data-cat="'+key+'">'+I.trash+' Delete category</button></div>');
  }

  function confirmDelete(id){ var p=AW.getProduct(id); if(!p)return; AW.openModal('<h3>Delete product?</h3><p>“'+AW.esc(p.name)+'” will be permanently removed. To keep it but remove it from the shop, hide it instead.</p><div class="modal-actions"><button class="btn btn-ghost btn-sm" data-act="modal-close">Cancel</button><button class="btn btn-danger btn-sm" data-act="confirm-delete-yes" data-id="'+id+'">'+I.trash+' Delete</button></div>'); }
  function confirmWipe(){ AW.openModal('<h3>Delete all products?</h3><p>This removes every product from your shop. Export a backup first if you might need them.</p><div class="modal-actions"><button class="btn btn-ghost btn-sm" data-act="modal-close">Cancel</button><button class="btn btn-danger btn-sm" data-act="confirm-wipe-yes">Delete all</button></div>'); }
  function confirmDeleteCustomer(id){ AW.openModal('<h3>Remove account?</h3><p>This deletes the customer account and its saved cart. This can’t be undone.</p><div class="modal-actions"><button class="btn btn-ghost btn-sm" data-act="modal-close">Cancel</button><button class="btn btn-danger btn-sm" data-act="confirm-delcust-yes" data-id="'+id+'">'+I.trash+' Remove</button></div>'); }
})();


/* ===== single-file router ===== */
;(function(){
  var AW=window.AW;
  AW._routeQuery=function(){var h=String(location.hash||'').slice(1);var i=h.indexOf('?');return i>=0?h.slice(i):'';};
  var MAP={'/':'home','':'home','/shop':'shop','/product':'product','/cart':'cart','/maintenance':'maintenance','/account':'account','/admin':'account'};
  function routeName(){var h=String(location.hash||'').slice(1)||'/';var path=h.split('?')[0]||'/';return MAP[path]||'home';}
  function renderRoute(){AW.onCartChange=null;var fn=(AW.pages&&AW.pages[routeName()])||(AW.pages&&AW.pages.home);try{fn&&fn();}catch(e){if(window.console)console.error(e);}try{AW.applyI18n&&AW.applyI18n();}catch(_i){}try{AW.reveal();}catch(_){}try{window.scrollTo(0,0);}catch(__){}}
  window.AW_PAGE=renderRoute;
  window.addEventListener('hashchange',renderRoute);
})();
</script>
