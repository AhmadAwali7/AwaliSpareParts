<style>
/* ===== base.css ===== */
/* ============================================================
   AWALI HOME SPARE PARTS — base.css
   Shared design system + components used across every page.
   Theme: blue.
============================================================ */
:root{
  --ink:#0d1b2a;        /* deep navy ink */
  --steel:#12395f;      /* primary steel blue */
  --steel-2:#1c4f7f;
  --accent:#2f7ff0;     /* bright blue — offers & key CTA */
  --accent-dark:#1f63cc;
  --accent-soft:#eaf2fe;
  --accent-border:#c3dbff;
  --accent-light:#a9c9ff;
  --wa:#25d366;         /* whatsapp functional */
  --wa-dark:#1eb457;
  --paper:#f5f7fa;
  --card:#ffffff;
  --line:#e4e9f0;
  --line-2:#d3dbe6;
  --muted:#5b6b7f;
  --slate:#7c8a9c;
  --good:#0f9d58;
  --shadow:0 1px 2px rgba(13,27,42,.06),0 8px 24px rgba(13,27,42,.06);
  --shadow-lg:0 12px 40px rgba(13,27,42,.14);
  --radius:14px;
  --radius-sm:10px;
  --maxw:1180px;
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{margin:0;background:var(--paper);color:var(--ink);
  font-family:'Inter',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;font-size:16px;line-height:1.55;-webkit-font-smoothing:antialiased}
h1,h2,h3,h4,.display{font-family:'Space Grotesk','Inter',sans-serif;line-height:1.12;letter-spacing:-.02em;margin:0}
a{color:inherit;text-decoration:none}
img{max-width:100%;display:block}
button{font-family:inherit;cursor:pointer}
.mono{font-family:'Space Mono',ui-monospace,monospace}
.wrap{max-width:var(--maxw);margin:0 auto;padding:0 20px}
.eyebrow{font-family:'Space Mono',monospace;font-size:12px;letter-spacing:.22em;text-transform:uppercase;color:var(--accent);font-weight:700;display:inline-flex;align-items:center;gap:8px}
.eyebrow svg{width:15px;height:15px}
.muted{color:var(--muted)}
.hidden{display:none !important}
section{padding:52px 0}

/* buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border:0;border-radius:11px;padding:12px 18px;
  font-weight:600;font-size:15px;transition:.18s transform,.18s box-shadow,.18s background;white-space:nowrap}
.btn:active{transform:translateY(1px)}
.btn svg{width:18px;height:18px}
.btn-primary{background:var(--steel);color:#fff}
.btn-primary:hover{background:var(--steel-2)}
.btn-accent{background:var(--accent);color:#fff;box-shadow:0 6px 18px rgba(47,127,240,.30)}
.btn-accent:hover{background:var(--accent-dark)}
.btn-wa{background:var(--wa);color:#053a1c}
.btn-wa:hover{background:var(--wa-dark);color:#fff}
.btn-outline{background:#fff;color:var(--steel);box-shadow:inset 0 0 0 1.6px var(--line-2)}
.btn-outline:hover{box-shadow:inset 0 0 0 1.6px var(--steel);color:var(--ink)}
.btn-ghost{background:transparent;color:var(--ink);padding:10px 12px}
.btn-ghost:hover{background:#eef2f7}
.btn-sm{padding:8px 12px;font-size:13.5px;border-radius:9px}
.btn-block{width:100%}
.btn-danger{background:#fff;color:#c1362b;box-shadow:inset 0 0 0 1.6px #f3c9c5}
.btn-danger:hover{background:#fdecea}

/* header */
header.site{position:sticky;top:0;z-index:50;background:rgba(255,255,255,.86);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
.topbar{background:var(--ink);color:#c8d4e2;font-size:12.5px}
.topbar .wrap{display:flex;gap:18px;align-items:center;justify-content:space-between;padding-top:7px;padding-bottom:7px}
.topbar a{color:#e6edf5;font-weight:500}
.topbar .tb-right{display:flex;gap:16px;align-items:center;flex-wrap:wrap}
.topbar .dot{width:5px;height:5px;border-radius:50%;background:var(--wa);display:inline-block;margin-right:6px;vertical-align:middle}
.nav{display:flex;align-items:center;gap:18px;padding-top:12px;padding-bottom:12px}
.brand{display:flex;align-items:center;gap:11px;flex-shrink:0}
.brand .mark{width:40px;height:40px;flex-shrink:0}
.brand .mark svg{width:100%;height:100%}
.brand .bt{display:flex;flex-direction:column;line-height:1}
.brand .bt b{font-family:'Space Grotesk';font-size:18px;letter-spacing:-.01em;font-weight:700}
.brand .bt span{font-family:'Space Mono';font-size:9.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--slate);margin-top:3px}
.nav-links{display:flex;align-items:center;gap:4px;margin-left:8px}
.nav-links a{padding:9px 12px;border-radius:9px;font-weight:600;font-size:14.5px;color:#2a3b4d}
.nav-links a:hover,.nav-links a.active{background:#eef2f7}
.nav-spacer{flex:1}
.nav-actions{display:flex;align-items:center;gap:8px}
.searchbox{display:flex;align-items:center;gap:8px;background:#eef2f7;border-radius:10px;padding:8px 12px;min-width:210px}
.searchbox input{border:0;background:transparent;outline:none;font-size:14px;width:100%;color:var(--ink)}
.searchbox svg{width:17px;height:17px;color:var(--slate);flex-shrink:0}
.icon-btn{position:relative;width:42px;height:42px;border-radius:10px;background:#eef2f7;display:inline-flex;align-items:center;justify-content:center;color:var(--ink)}
.icon-btn:hover{background:#e2e8f0}
.icon-btn svg{width:20px;height:20px}
.cart-count{position:absolute;top:-5px;right:-5px;background:var(--accent);color:#fff;font-size:11px;font-weight:700;min-width:18px;height:18px;border-radius:9px;display:flex;align-items:center;justify-content:center;padding:0 4px;font-family:'Space Mono'}
.menu-toggle{display:none}
.dd{position:relative}
.dd-panel{position:absolute;top:calc(100% + 8px);left:0;background:#fff;border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow-lg);padding:8px;min-width:250px;display:none;z-index:60}
.dd.open .dd-panel{display:block;animation:pop .16s ease}
.dd-panel a{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:10px;font-weight:600;font-size:14.5px}
.dd-panel a:hover{background:#f2f6fb}
.dd-panel a svg{width:22px;height:22px;color:var(--steel);flex-shrink:0}
.dd-panel a small{display:block;font-weight:400;color:var(--slate);font-size:12px;font-family:'Inter'}
.caret{width:14px;height:14px;transition:.2s}
.dd.open .caret{transform:rotate(180deg)}
@keyframes pop{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:none}}

/* mobile menu */
.mobile-menu{position:fixed;inset:0;z-index:80;background:rgba(13,27,42,.5);display:none}
.mobile-menu.open{display:block}
.mm-panel{position:absolute;top:0;right:0;width:min(320px,86vw);height:100%;background:#fff;padding:22px;overflow-y:auto;box-shadow:var(--shadow-lg);transform:translateX(100%);transition:.25s;display:flex;flex-direction:column;gap:6px}
.mobile-menu.open .mm-panel{transform:none}
.mm-panel .mm-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.mm-panel a{padding:13px 12px;border-radius:10px;font-weight:600;font-size:15.5px;color:#2a3b4d;display:flex;align-items:center;gap:12px}
.mm-panel a:hover{background:#f2f6fb}
.mm-panel a svg{width:22px;height:22px;color:var(--steel)}
.mm-panel .mm-sep{height:1px;background:var(--line);margin:10px 0}
.mm-search{display:flex;align-items:center;gap:8px;background:#eef2f7;border-radius:10px;padding:10px 12px;margin-bottom:8px}
.mm-search input{border:0;background:transparent;outline:none;width:100%;font-size:15px}
.mm-search svg{width:18px;height:18px;color:var(--slate)}

/* section head + links */
.sec-head{display:flex;align-items:flex-end;justify-content:space-between;gap:20px;margin-bottom:26px;flex-wrap:wrap}
.sec-head h2{font-size:clamp(24px,3.4vw,34px);font-weight:700}
.sec-head p{color:var(--muted);margin:8px 0 0;max-width:560px}
.linkmore{display:inline-flex;align-items:center;gap:6px;font-weight:700;color:var(--steel);font-size:14.5px}
.linkmore svg{width:16px;height:16px;transition:.18s}
.linkmore:hover svg{transform:translateX(3px)}
.crumbs{font-size:13.5px;color:var(--slate);margin-bottom:14px}
.crumbs a{color:var(--steel);font-weight:600}
.page{padding:36px 0 60px;min-height:60vh}
.shop-head{display:flex;justify-content:space-between;align-items:flex-end;gap:16px;flex-wrap:wrap;margin-bottom:22px}
.shop-head h1{font-size:clamp(24px,4vw,34px)}

/* category tiles */
.cats{display:grid;grid-template-columns:repeat(5,1fr);gap:14px}
.cat-tile{background:#fff;border:1px solid var(--line);border-radius:var(--radius);padding:20px 16px;text-align:center;transition:.18s;position:relative;overflow:hidden}
.cat-tile:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg);border-color:var(--line-2)}
.cat-tile .ci{width:56px;height:56px;margin:0 auto 12px;border-radius:14px;background:linear-gradient(160deg,#eef3f9,#e2ebf4);display:flex;align-items:center;justify-content:center;color:var(--steel)}
.cat-tile:hover .ci{background:linear-gradient(160deg,var(--steel),var(--ink));color:#fff}
.cat-tile .ci svg{width:30px;height:30px}
.cat-tile b{font-family:'Space Grotesk';font-size:15px;display:block}
.cat-tile small{color:var(--slate);font-size:12px}

/* product grid + cards */
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:18px}
.pcard{background:#fff;border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;display:flex;flex-direction:column;transition:.18s;position:relative}
.pcard:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg);border-color:var(--line-2)}
.pcard .imgwrap{position:relative;aspect-ratio:4/3;background:#f0f4f9;overflow:hidden;display:block}
.pcard .imgwrap img{width:100%;height:100%;object-fit:cover;transition:.3s}
.pcard:hover .imgwrap img{transform:scale(1.04)}
.vfcorner::before,.vfcorner::after{content:"";position:absolute;width:16px;height:16px;border:2px solid rgba(255,255,255,.85);z-index:2}
.vfcorner::before{top:8px;left:8px;border-right:0;border-bottom:0}
.vfcorner::after{bottom:8px;right:8px;border-left:0;border-top:0}
.badge-offer{position:absolute;top:9px;right:9px;background:var(--accent);color:#fff;font-family:'Space Mono';font-weight:700;font-size:12px;padding:5px 9px;border-radius:8px;z-index:3;box-shadow:0 4px 10px rgba(47,127,240,.35)}
.badge-oos{position:absolute;top:9px;left:9px;background:rgba(13,27,42,.82);color:#fff;font-size:11px;font-weight:600;padding:4px 9px;border-radius:7px;z-index:3}
.pcard .pbody{padding:14px 15px 16px;display:flex;flex-direction:column;flex:1}
.pcard .pcat{font-family:'Space Mono';font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--slate)}
.pcard h3{font-size:16px;font-weight:600;margin:5px 0 4px;font-family:'Space Grotesk'}
.pcard .ppart{font-family:'Space Mono';font-size:11.5px;color:var(--muted)}
.priceline{display:flex;align-items:baseline;gap:9px;margin:11px 0 13px;flex-wrap:wrap}
.price-now{font-family:'Space Grotesk';font-size:20px;font-weight:700;color:var(--ink)}
.price-was{font-size:13.5px;color:var(--slate);text-decoration:line-through}
.price-ask{font-size:14.5px;font-weight:600;color:var(--steel)}
.pcard .pacts{margin-top:auto;display:flex;gap:8px}
.pcard .pacts .btn{flex:1;padding:10px}
.iconbtn-add{width:44px;flex:0 0 auto !important}

/* tags */
.tag{font-family:'Space Mono';font-size:12px;background:#eef3f9;color:#33475b;padding:6px 11px;border-radius:8px;font-weight:700}
.tag.stock-in{background:#e7f6ee;color:#0b7a41}
.tag.stock-out{background:#fdecea;color:#c1362b}

/* how it works cards (home + maintenance) */
.how{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
.howcard{background:#fff;border:1px solid var(--line);border-radius:var(--radius);padding:26px 22px;position:relative}
.howcard .num{font-family:'Space Mono';font-size:13px;color:var(--accent);font-weight:700;letter-spacing:.1em}
.howcard .hi{width:50px;height:50px;border-radius:13px;background:linear-gradient(160deg,#eef3f9,#e2ebf4);color:var(--steel);display:flex;align-items:center;justify-content:center;margin:14px 0}
.howcard .hi svg{width:26px;height:26px}
.howcard h3{font-size:18px;margin-bottom:7px}
.howcard p{color:var(--muted);font-size:14.5px;margin:0}

/* maintenance card (home band + maintenance page) */
.maint-card{background:linear-gradient(160deg,var(--steel),var(--ink));border-radius:20px;padding:34px;color:#fff;box-shadow:var(--shadow-lg)}
.maint-card h3{font-size:24px;margin-bottom:8px}
.maint-card p{color:#c6d5e6;margin:0 0 22px}
.steps{display:flex;flex-direction:column;gap:14px;margin:22px 0}
.step{display:flex;gap:13px;align-items:center}
.step .n{font-family:'Space Mono';font-weight:700;width:30px;height:30px;border-radius:8px;background:rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center;color:#fff;flex-shrink:0;font-size:13px}

/* empty state */
.empty{text-align:center;padding:70px 20px;background:#fff;border:1px dashed var(--line-2);border-radius:var(--radius)}
.empty .ei{width:64px;height:64px;border-radius:16px;background:#eef3f9;color:var(--steel);display:flex;align-items:center;justify-content:center;margin:0 auto 16px}
.empty .ei svg{width:32px;height:32px}
.empty h3{font-size:20px;margin-bottom:8px}

/* footer */
footer.site{background:var(--ink);color:#b9c7d6;padding:56px 0 26px;margin-top:20px}
.foot-grid{display:grid;grid-template-columns:1.4fr 1fr 1fr 1.2fr;gap:34px}
footer.site .brand .bt b{color:#fff}
footer.site .brand .bt span{color:#7f92a6}
.foot-about{margin:16px 0;font-size:14px;max-width:300px;color:#93a6ba}
.foot-social{display:flex;gap:10px}
.foot-social a{width:38px;height:38px;border-radius:10px;background:rgba(255,255,255,.07);display:flex;align-items:center;justify-content:center;color:#cdd9e6}
.foot-social a:hover{background:var(--steel)}
.foot-social svg{width:18px;height:18px}
footer.site h5{color:#fff;font-family:'Space Grotesk';font-size:14px;letter-spacing:.02em;margin:0 0 16px;text-transform:uppercase}
.foot-links{display:flex;flex-direction:column;gap:11px}
.foot-links a{font-size:14px;color:#a9bacb}
.foot-links a:hover{color:#fff}
.foot-contact{font-size:14px;display:flex;flex-direction:column;gap:12px}
.foot-contact div{display:flex;gap:11px;align-items:flex-start}
.foot-contact svg{width:18px;height:18px;color:var(--accent);flex-shrink:0;margin-top:2px}
.foot-contact a{color:#cdd9e6}
.foot-bottom{border-top:1px solid rgba(255,255,255,.09);margin-top:40px;padding-top:22px;display:flex;justify-content:space-between;gap:14px;flex-wrap:wrap;font-size:12.5px;color:#7f92a6}
.foot-bottom a{color:#a9bacb}

/* toast */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:200;display:flex;flex-direction:column;gap:10px;align-items:center}
.toast{background:var(--ink);color:#fff;padding:13px 20px;border-radius:12px;font-size:14px;font-weight:500;box-shadow:var(--shadow-lg);display:flex;align-items:center;gap:10px;animation:toastin .3s;max-width:90vw}
.toast svg{width:18px;height:18px;color:var(--wa);flex-shrink:0}
.toast.err svg{color:#ff8a7a}
@keyframes toastin{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}

/* modal */
.modal-bg{position:fixed;inset:0;background:rgba(13,27,42,.55);backdrop-filter:blur(3px);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;animation:fade .2s}
@keyframes fade{from{opacity:0}to{opacity:1}}
.modal{background:#fff;border-radius:20px;max-width:420px;width:100%;padding:28px;box-shadow:var(--shadow-lg);animation:pop .2s;text-align:center}
.modal h3{font-size:20px;margin-bottom:6px}
.modal p{color:var(--muted);font-size:14px;margin-bottom:18px}
.modal .qrbox{background:#fff;border:1px solid var(--line);border-radius:14px;padding:16px;display:inline-block;margin:6px auto 16px}
.modal .qrbox canvas,.modal .qrbox img{display:block;width:220px;height:220px}
.modal-actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.qrlabel{font-family:'Space Mono';font-size:11px;color:var(--muted);margin-top:8px;word-break:break-all}

/* forms (shared basics) */
.field{margin-bottom:16px}
.field label{display:block;font-size:13px;font-weight:600;margin-bottom:7px;color:#33475b}
.field label .req{color:var(--accent)}
.field input,.field select,.field textarea{width:100%;border:1px solid var(--line-2);border-radius:10px;padding:11px 13px;font-size:14.5px;font-family:'Inter';outline:none;background:#fff;transition:.15s;color:var(--ink)}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--steel);box-shadow:0 0 0 3px rgba(18,57,95,.12)}
.field textarea{resize:vertical;min-height:90px;line-height:1.6}
.field .hint{font-size:12px;color:var(--slate);margin-top:6px}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.switch{display:inline-flex;align-items:center;gap:11px;cursor:pointer;user-select:none}
.switch input{display:none}
.switch .track{width:46px;height:26px;border-radius:99px;background:#cdd7e2;position:relative;transition:.2s;flex-shrink:0}
.switch .track::after{content:"";position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:#fff;transition:.2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.switch input:checked + .track{background:var(--good)}
.switch input:checked + .track::after{transform:translateX(20px)}
.switch b{font-size:14px}

/* reveal + a11y */
:focus-visible{outline:3px solid rgba(47,127,240,.55);outline-offset:2px;border-radius:6px}
.reveal{opacity:0;transform:translateY(18px)}
.reveal.in{opacity:1;transform:none;transition:opacity .6s ease,transform .6s ease}

/* shared responsive */
@media(max-width:1000px){
  .grid{grid-template-columns:repeat(3,1fr)}
  .foot-grid{grid-template-columns:1fr 1fr;gap:28px}
}
@media(max-width:860px){
  .nav-links,.searchbox,.dd{display:none}
  .menu-toggle{display:inline-flex}
  .cats{grid-template-columns:repeat(3,1fr)}
  .how{grid-template-columns:1fr}
}
@media(max-width:600px){
  .grid{grid-template-columns:repeat(2,1fr);gap:12px}
  .cats{grid-template-columns:repeat(2,1fr)}
  .foot-grid{grid-template-columns:1fr}
  section{padding:40px 0}
}
@media (prefers-reduced-motion: reduce){
  *{animation-duration:.001ms !important;transition-duration:.001ms !important;scroll-behavior:auto !important}
}

/* ===== number chooser modal + footer numbers (multi-number support) ===== */
.num-list{display:flex;flex-direction:column;gap:8px;margin:6px 0 14px;text-align:left}
.num-opt{display:flex;align-items:center;gap:12px;border:1px solid var(--line);border-radius:12px;padding:12px 14px;transition:.15s}
.num-opt:hover{border-color:var(--wa);background:#f2fbf5}
.num-opt svg{width:22px;height:22px;color:var(--wa);flex-shrink:0}
.num-opt b{font-family:'Space Grotesk';font-size:15px;display:block}
.num-opt small{color:var(--slate);font-size:12px}
.foot-num{display:flex;gap:11px;align-items:flex-start;margin-bottom:12px}
.foot-num > svg{width:18px;height:18px;color:var(--accent);flex-shrink:0;margin-top:2px}
.foot-num .fn-body{display:flex;flex-direction:column;gap:2px}
.foot-num .fn-body a{color:#cdd9e6;font-size:14px}
.foot-num .fn-body a:hover{color:#fff}
.foot-num .fn-body small{color:#7f92a6;font-size:12px}
.foot-num .fn-wa{display:inline-flex;align-items:center;gap:5px;color:var(--wa) !important;font-weight:600;font-size:12.5px;margin-top:3px}
.foot-num .fn-wa svg{width:14px;height:14px}

/* ===== home.css ===== */
/* ============================================================
   home.css — homepage-only styles
============================================================ */

/* featured banner (owner-controlled, first thing on the site) */
.feat{padding:34px 0 10px}
.feat-product{display:grid;grid-template-columns:1.05fr 1fr;gap:34px;align-items:center;background:linear-gradient(160deg,#fff,#eef3fb);
  border:1px solid var(--line);border-radius:24px;padding:26px;box-shadow:var(--shadow);overflow:hidden}
.feat-media{position:relative;aspect-ratio:4/3;border-radius:18px;overflow:hidden;background:#e7eef7}
.feat-media img{width:100%;height:100%;object-fit:cover}
.feat-media .vf span{position:absolute;width:34px;height:34px;border:3px solid var(--accent)}
.feat-media .vf span:nth-child(1){top:14px;left:14px;border-right:0;border-bottom:0}
.feat-media .vf span:nth-child(2){top:14px;right:14px;border-left:0;border-bottom:0}
.feat-media .vf span:nth-child(3){bottom:14px;left:14px;border-right:0;border-top:0}
.feat-media .vf span:nth-child(4){bottom:14px;right:14px;border-left:0;border-top:0}
.feat-badge{display:inline-flex;align-items:center;gap:7px;background:var(--accent);color:#fff;font-family:'Space Mono';font-weight:700;
  font-size:12px;letter-spacing:.08em;text-transform:uppercase;padding:7px 13px;border-radius:999px;box-shadow:0 6px 16px rgba(47,127,240,.3)}
.feat-badge svg{width:14px;height:14px}
.feat-body h1{font-size:clamp(26px,4vw,40px);font-weight:700;margin:16px 0 10px}
.feat-body .pcat{font-family:'Space Mono';font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--steel);font-weight:700}
.feat-price{display:flex;align-items:baseline;gap:12px;margin:14px 0;flex-wrap:wrap}
.feat-price .now{font-family:'Space Grotesk';font-size:34px;font-weight:700}
.feat-price .was{font-size:18px;color:var(--slate);text-decoration:line-through}
.feat-price .save{background:var(--accent);color:#fff;font-family:'Space Mono';font-weight:700;font-size:13px;padding:5px 10px;border-radius:8px}
.feat-price.ask .now{font-size:22px;color:var(--steel)}
.feat-desc{color:#3a4a5c;font-size:15.5px;margin:0 0 22px;max-width:520px}
.feat-cta{display:flex;gap:12px;flex-wrap:wrap}

/* featured custom banner (photo/promo the owner uploads) */
.feat-custom{position:relative;border-radius:24px;overflow:hidden;min-height:340px;display:flex;align-items:center;
  background:linear-gradient(160deg,var(--steel),var(--ink));box-shadow:var(--shadow-lg)}
.feat-custom .fc-img{position:absolute;inset:0}
.feat-custom .fc-img img{width:100%;height:100%;object-fit:cover}
.feat-custom .fc-ov{position:absolute;inset:0;background:linear-gradient(90deg,rgba(9,20,34,.82),rgba(9,20,34,.35))}
.feat-custom .fc-body{position:relative;padding:44px;max-width:620px;color:#fff}
.feat-custom.no-img .fc-body{color:#fff}
.feat-custom h1{font-size:clamp(28px,4.4vw,46px);font-weight:700;margin:14px 0 12px}
.feat-custom p{font-size:18px;color:#dfe9f4;margin:0 0 24px;max-width:520px}

/* default hero (scan/search) — shown when no featured item is set */
.hero{position:relative;overflow:hidden;background:radial-gradient(1200px 500px at 82% -10%,rgba(18,57,95,.10),transparent 60%),linear-gradient(180deg,#fff,var(--paper))}
.hero::before{content:"";position:absolute;inset:0;opacity:.5;pointer-events:none;background-image:linear-gradient(var(--line) 1px,transparent 1px),linear-gradient(90deg,var(--line) 1px,transparent 1px);background-size:34px 34px;mask:linear-gradient(180deg,#000,transparent 78%)}
.hero .wrap{position:relative;display:grid;grid-template-columns:1.15fr .85fr;gap:40px;align-items:center;padding-top:56px;padding-bottom:56px}
.hero h1{font-size:clamp(32px,5vw,54px);font-weight:700;margin:16px 0 14px}
.hero h1 .u{color:var(--steel)}
.hero p.lead{font-size:18px;color:var(--muted);max-width:540px;margin:0 0 26px}
.hero-search{display:flex;gap:10px;background:#fff;border:1px solid var(--line-2);border-radius:14px;padding:8px;box-shadow:var(--shadow);max-width:560px}
.hero-search input{flex:1;border:0;outline:none;padding:10px 14px;font-size:16px;background:transparent}
.trust{display:flex;flex-wrap:wrap;gap:8px;margin-top:22px}
.chip{display:inline-flex;align-items:center;gap:7px;background:#fff;border:1px solid var(--line);border-radius:999px;padding:7px 13px;font-size:13px;font-weight:600;color:#2c3e50}
.chip svg{width:15px;height:15px;color:var(--good)}
.scanart{position:relative;aspect-ratio:1/1;max-width:380px;margin-left:auto;width:100%}
.viewfinder{position:absolute;inset:0}
.viewfinder span{position:absolute;width:44px;height:44px;border:3px solid var(--accent);border-radius:4px}
.viewfinder span:nth-child(1){top:0;left:0;border-right:0;border-bottom:0}
.viewfinder span:nth-child(2){top:0;right:0;border-left:0;border-bottom:0}
.viewfinder span:nth-child(3){bottom:0;left:0;border-right:0;border-top:0}
.viewfinder span:nth-child(4){bottom:0;right:0;border-left:0;border-top:0}
.scan-inner{position:absolute;inset:30px;background:linear-gradient(160deg,var(--ink),var(--steel));border-radius:18px;box-shadow:var(--shadow-lg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;overflow:hidden}
.scan-inner::after{content:"";position:absolute;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,var(--accent),transparent);top:0;animation:scanline 2.6s ease-in-out infinite;box-shadow:0 0 18px 4px rgba(47,127,240,.5)}
@keyframes scanline{0%{top:14%}50%{top:86%}100%{top:14%}}
.qrgrid{width:132px;height:132px;display:grid;grid-template-columns:repeat(9,1fr);grid-template-rows:repeat(9,1fr);gap:3px;background:#fff;padding:12px;border-radius:12px}
.qrgrid i{background:#0d1b2a;border-radius:2px}
.qrgrid i.o{background:transparent}
.scan-cap{color:#cfe0f0;font-family:'Space Mono';font-size:12px;letter-spacing:.16em;text-transform:uppercase}
.scan-cap b{color:#fff}

/* slim search band (shown under a featured banner) */
.searchband{padding:26px 0 6px}
.searchband form{display:flex;gap:10px;background:#fff;border:1px solid var(--line-2);border-radius:14px;padding:8px;box-shadow:var(--shadow);max-width:620px;margin:0 auto}
.searchband input{flex:1;border:0;outline:none;padding:11px 14px;font-size:16px;background:transparent}

/* offers band */
.offers-band{background:linear-gradient(160deg,var(--ink),#132a44);color:#fff}
.offers-band .eyebrow{color:var(--accent-light)}
.offers-band .sec-head h2{color:#fff}
.offers-band .sec-head p{color:#b8c7d8}
.offers-band .pcard{background:#0f2136;border-color:#20334c;color:#fff}
.offers-band .pcard h3 a{color:#fff}
.offers-band .pcard .price-now{color:#fff}
.offers-band .linkmore{color:var(--accent-light)}

/* maintenance band */
.maint{background:#fff;border-top:1px solid var(--line);border-bottom:1px solid var(--line)}
.maint .wrap{display:grid;grid-template-columns:1fr 1fr;gap:44px;align-items:center}
.maint-list{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:22px}
.mrow{display:flex;gap:12px;align-items:flex-start}
.mrow .mi{width:38px;height:38px;border-radius:10px;background:#eef3f9;color:var(--steel);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.mrow .mi svg{width:20px;height:20px}
.mrow b{font-family:'Space Grotesk';font-size:15px;display:block}
.mrow small{color:var(--muted);font-size:13px}

@media(max-width:1000px){
  .hero .wrap{grid-template-columns:1fr;gap:30px}
  .scanart{max-width:300px;margin:0 auto}
  .feat-product{grid-template-columns:1fr;gap:22px}
  .maint .wrap{grid-template-columns:1fr;gap:30px}
}
@media(max-width:860px){ .maint-list{grid-template-columns:1fr} }
@media(max-width:600px){
  .hero .wrap{padding-top:40px;padding-bottom:40px}
  .feat-custom .fc-body{padding:28px}
  .feat-product{padding:18px}
}

/* ===== shop.css ===== */
/* ============================================================
   shop.css — listing page
============================================================ */
.filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:24px}
.fpill{border:1px solid var(--line-2);background:#fff;border-radius:999px;padding:8px 15px;font-weight:600;font-size:13.5px;color:#33475b}
.fpill:hover{border-color:var(--steel)}
.fpill.active{background:var(--steel);color:#fff;border-color:var(--steel)}
.shop-count{font-family:'Space Mono';font-size:13px;color:var(--slate)}

/* ===== product.css ===== */
/* ============================================================
   product.css — product detail page
============================================================ */
.pd{display:grid;grid-template-columns:1fr 1fr;gap:44px;align-items:start}
.pd-media{position:relative;background:#f0f4f9;border:1px solid var(--line);border-radius:20px;overflow:hidden;aspect-ratio:1/1}
.pd-media img{width:100%;height:100%;object-fit:cover}
.pd-media .vf-lg span{position:absolute;width:32px;height:32px;border:3px solid var(--accent)}
.pd-media .vf-lg span:nth-child(1){top:14px;left:14px;border-right:0;border-bottom:0}
.pd-media .vf-lg span:nth-child(2){top:14px;right:14px;border-left:0;border-bottom:0}
.pd-media .vf-lg span:nth-child(3){bottom:14px;left:14px;border-right:0;border-top:0}
.pd-media .vf-lg span:nth-child(4){bottom:14px;right:14px;border-left:0;border-top:0}
.pd-info .pcat{font-family:'Space Mono';font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);font-weight:700}
.pd-info h1{font-size:clamp(26px,4vw,38px);margin:10px 0 12px;font-weight:700}
.pd-meta{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px}
.pd-price{display:flex;align-items:baseline;gap:12px;margin:20px 0;flex-wrap:wrap}
.pd-price .now{font-family:'Space Grotesk';font-size:34px;font-weight:700}
.pd-price .was{font-size:18px;color:var(--slate);text-decoration:line-through}
.pd-price .save{background:var(--accent);color:#fff;font-family:'Space Mono';font-weight:700;font-size:13px;padding:5px 10px;border-radius:8px}
.pd-price.ask .now{font-size:22px;color:var(--steel)}
.pd-desc{color:#3a4a5c;font-size:15.5px;line-height:1.7;margin:18px 0;white-space:pre-wrap}
.qtybar{display:flex;align-items:center;gap:16px;margin:22px 0}
.qty{display:flex;align-items:center;border:1px solid var(--line-2);border-radius:11px;overflow:hidden}
.qty button{width:44px;height:46px;border:0;background:#f2f6fb;font-size:20px;color:var(--steel);font-weight:700}
.qty button:hover{background:#e6eef6}
.qty input{width:54px;height:46px;border:0;text-align:center;font-size:16px;font-weight:600;font-family:'Space Mono';outline:none}
.pd-cta{display:flex;gap:12px;flex-wrap:wrap}
.pd-cta .btn{padding:14px 22px;font-size:15.5px}
.pd-note{margin-top:22px;background:#f2f6fb;border:1px solid var(--line);border-radius:12px;padding:14px 16px;display:flex;gap:12px;align-items:flex-start;font-size:13.5px;color:var(--muted)}
.pd-note svg{width:20px;height:20px;color:var(--steel);flex-shrink:0;margin-top:1px}
.specs{margin-top:30px;border-top:1px solid var(--line);padding-top:22px}
.specs h4{font-size:15px;margin-bottom:12px;font-family:'Space Grotesk'}
.spec-row{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px dashed var(--line);font-size:14px}
.spec-row span:first-child{color:var(--muted)}
.spec-row span:last-child{font-weight:600;font-family:'Space Mono';font-size:13px}
@media(max-width:1000px){ .pd{grid-template-columns:1fr;gap:26px} }

/* ===== cart.css ===== */
/* ============================================================
   cart.css — cart page
============================================================ */
.cart-grid{display:grid;grid-template-columns:1fr 360px;gap:30px;align-items:start}
.cart-items{background:#fff;border:1px solid var(--line);border-radius:var(--radius);overflow:hidden}
.citem{display:grid;grid-template-columns:88px 1fr auto;gap:14px;padding:16px;border-bottom:1px solid var(--line);align-items:center}
.citem:last-child{border-bottom:0}
.citem .cimg{width:88px;height:88px;border-radius:11px;overflow:hidden;background:#f0f4f9}
.citem .cimg img{width:100%;height:100%;object-fit:cover}
.citem h4{font-size:15.5px;font-family:'Space Grotesk';margin-bottom:3px}
.citem .cpart{font-family:'Space Mono';font-size:11px;color:var(--slate)}
.citem .cprice{font-weight:700;font-family:'Space Grotesk';margin-top:6px}
.citem .cprice small{font-weight:400;color:var(--slate);font-family:'Inter';font-size:12px}
.citem .cctl{display:flex;flex-direction:column;align-items:flex-end;gap:8px}
.qty-sm{display:flex;align-items:center;border:1px solid var(--line-2);border-radius:9px;overflow:hidden}
.qty-sm button{width:32px;height:34px;border:0;background:#f2f6fb;font-size:16px;color:var(--steel);font-weight:700}
.qty-sm input{width:38px;height:34px;border:0;text-align:center;font-family:'Space Mono';font-weight:700;outline:none;font-size:14px}
.remove-x{background:transparent;border:0;color:var(--slate);font-size:12.5px;display:flex;align-items:center;gap:5px;font-weight:600}
.remove-x:hover{color:#c1362b}
.remove-x svg{width:14px;height:14px}
.cart-sum{background:#fff;border:1px solid var(--line);border-radius:var(--radius);padding:22px;position:sticky;top:100px}
.cart-sum h3{font-size:18px;margin-bottom:16px;font-family:'Space Grotesk'}
.sumrow{display:flex;justify-content:space-between;padding:9px 0;font-size:14.5px;color:#33475b}
.sumrow.total{border-top:1px solid var(--line);margin-top:8px;padding-top:14px;font-weight:700;font-size:19px;color:var(--ink);font-family:'Space Grotesk'}
.sum-note{font-size:12.5px;color:var(--slate);margin:10px 0 18px;display:flex;gap:8px;align-items:flex-start}
.sum-note svg{width:16px;height:16px;flex-shrink:0;color:var(--steel);margin-top:1px}
@media(max-width:1000px){ .cart-grid{grid-template-columns:1fr} .cart-sum{position:static} }
@media(max-width:600px){
  .citem{grid-template-columns:64px 1fr;gap:12px}
  .citem .cctl{grid-column:1/-1;flex-direction:row;justify-content:space-between;align-items:center}
  .citem .cimg{width:64px;height:64px}
}

/* ===== maintenance.css ===== */
/* ============================================================
   maintenance.css — maintenance / repairs page
============================================================ */
.maint-cats{margin-bottom:30px}
.maint-cats .cat-tile{cursor:pointer}
.maint-hero p{max-width:620px}

/* ===== account.css ===== */
/* ============================================================
   admin.css — owner panel
============================================================ */
.admin-wrap{padding:34px 0 70px;min-height:70vh}
.login-card{max-width:420px;margin:40px auto;background:#fff;border:1px solid var(--line);border-radius:20px;padding:34px;box-shadow:var(--shadow)}
.login-card .mark{width:52px;height:52px;margin-bottom:16px}
.login-card .mark svg{width:100%;height:100%}
.login-card h2{font-size:24px;margin-bottom:6px}
.login-card p{color:var(--muted);font-size:14px;margin-bottom:22px}

.admin-head{display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap;margin-bottom:8px}
.admin-head h1{font-size:28px}
.admin-tabs{display:flex;gap:4px;border-bottom:1px solid var(--line);margin:22px 0 26px;flex-wrap:wrap}
.admin-tab{padding:11px 15px;font-weight:600;font-size:14.5px;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-1px;background:none;border-top:0;border-left:0;border-right:0;cursor:pointer}
.admin-tab.active{color:var(--ink);border-bottom-color:var(--accent)}
.admin-tab:hover{color:var(--ink)}

.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:26px}
.stat{background:#fff;border:1px solid var(--line);border-radius:var(--radius);padding:18px}
.stat .sv{font-family:'Space Grotesk';font-size:28px;font-weight:700}
.stat .sl{font-size:12.5px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.stat.a .sv{color:var(--accent)}

.atable{background:#fff;border:1px solid var(--line);border-radius:var(--radius);overflow:hidden}
.atable .arow{display:grid;grid-template-columns:56px 2.2fr 1.1fr 1fr auto;gap:14px;align-items:center;padding:12px 16px;border-bottom:1px solid var(--line)}
.atable .arow:last-child{border-bottom:0}
.atable .arow.is-hidden{background:#fbfcfe;opacity:.72}
.atable .ahdr{background:#f7f9fc;font-size:12px;text-transform:uppercase;letter-spacing:.05em;color:var(--slate);font-weight:700}
.atable .aimg{width:56px;height:56px;border-radius:10px;overflow:hidden;background:#f0f4f9;position:relative}
.atable .aimg img{width:100%;height:100%;object-fit:cover}
.atable .aname b{font-family:'Space Grotesk';font-size:14.5px;display:block}
.atable .aname small{font-family:'Space Mono';font-size:11px;color:var(--slate)}
.hidden-badge{display:inline-block;background:#eef2f7;color:#5b6b7f;font-size:10.5px;font-weight:700;padding:2px 7px;border-radius:6px;margin-left:6px;text-transform:uppercase;letter-spacing:.04em;font-family:'Space Mono'}
.aprice b{font-family:'Space Grotesk'}
.aprice .off{color:var(--accent);font-size:12px;font-family:'Space Mono';font-weight:700}
.arow-acts{display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end}

.form-card{background:#fff;border:1px solid var(--line);border-radius:18px;padding:28px;max-width:760px}
.form-card h2{font-size:22px;margin-bottom:4px}
.section-block{margin-bottom:32px}
.section-block h3{font-size:16px;margin-bottom:4px;font-family:'Space Grotesk'}
.section-block > p{color:var(--muted);font-size:13.5px;margin:0 0 16px}
.form-actions{display:flex;gap:12px;margin-top:26px;flex-wrap:wrap}
.io-btns{display:flex;gap:12px;flex-wrap:wrap}
.soft-box{padding:18px;background:#f7f9fc;border-radius:14px;border:1px solid var(--line)}

.img-upload{border:2px dashed var(--line-2);border-radius:14px;padding:18px;text-align:center;cursor:pointer;transition:.15s;background:#fafcfe;display:block}
.img-upload:hover{border-color:var(--steel);background:#f5f9fd}
.img-upload svg{width:30px;height:30px;color:var(--slate);margin-bottom:8px}
.img-upload b{font-size:14px}
.img-upload small{display:block;color:var(--slate);font-size:12px;margin-top:3px}
.img-preview{position:relative;width:150px;height:150px;border-radius:12px;overflow:hidden;border:1px solid var(--line-2);margin-top:12px}
.img-preview.wide{width:100%;max-width:420px;height:180px}
.img-preview img{width:100%;height:100%;object-fit:cover}
.img-preview button{position:absolute;top:6px;right:6px;width:26px;height:26px;border-radius:7px;background:rgba(13,27,42,.75);color:#fff;border:0;font-size:14px}

.discount-preview{background:var(--accent-soft);border:1px solid var(--accent-border);border-radius:11px;padding:12px 14px;margin-top:6px;display:flex;align-items:center;gap:10px;font-size:13.5px;color:var(--accent-dark);font-weight:600}
.discount-preview svg{width:18px;height:18px;flex-shrink:0}

/* category toggle list */
.cat-toggle-list{display:flex;flex-direction:column;gap:10px}
.cat-toggle{display:flex;align-items:center;justify-content:space-between;gap:14px;background:#fff;border:1px solid var(--line);border-radius:12px;padding:14px 16px}
.cat-toggle .ct-l{display:flex;align-items:center;gap:12px}

.cat-toggle b{font-family:'Space Grotesk';font-size:15px;display:block}
.cat-toggle small{color:var(--slate);font-size:12.5px}

/* featured mode selector */
.mode-select{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.mode-opt{border:1.6px solid var(--line-2);border-radius:12px;padding:16px;cursor:pointer;transition:.15s;background:#fff}
.mode-opt:hover{border-color:var(--steel)}
.mode-opt.active{border-color:var(--accent);background:var(--accent-soft)}
.mode-opt b{font-family:'Space Grotesk';font-size:15px;display:block;margin-bottom:3px}
.mode-opt small{color:var(--muted);font-size:12.5px}

@media(max-width:860px){
  .stat-grid{grid-template-columns:repeat(2,1fr)}

@media(max-width:600px){
  .stat-grid{grid-template-columns:1fr 1fr}
  .form-actions{flex-direction:column}
  .form-actions .btn{width:100%}
}

/* ============================================================
   account.css additions — auth + customer dashboard
============================================================ */
.auth-wrap{padding:40px 0 70px;min-height:70vh}
.auth-card{max-width:440px;margin:20px auto;background:#fff;border:1px solid var(--line);border-radius:20px;padding:30px;box-shadow:var(--shadow)}
.auth-card .mark{width:48px;height:48px;margin-bottom:14px}

<script>
/* ============================================================
   db.js — data adapter.  Uses Supabase when configured
   (window.AWALI_CONFIG), otherwise falls back to this browser's
   localStorage so the site still works before you connect a database.
   Exposes window.AWDB.  All methods return Promises.
============================================================ */
window.AWDB=(function(){
  "use strict";
  var cfg=window.AWALI_CONFIG||{};
  var URL=String(cfg.supabaseUrl||'').trim();
  var KEY=String(cfg.supabaseAnonKey||'').trim();
  var sb=null, cloud=false;

  function init(){
    if(URL&&KEY&&window.supabase&&window.supabase.createClient){
      try{ sb=window.supabase.createClient(URL,KEY,{auth:{persistSession:true,autoRefreshToken:true}}); cloud=true; }
      catch(e){ cloud=false; }
    }
    return Promise.resolve(cloud);
  }
  function isCloud(){ return cloud; }

  /* ---------- local fallback helpers ---------- */
  var LS_P='awali_products_v2', LS_S='awali_settings_v2', LS_U='awali_users_v1', LS_SESS='awali_session_v1', CART='awali_cart_';
  function lget(k,d){ try{var v=JSON.parse(localStorage.getItem(k));return v==null?d:v;}catch(e){return d;} }
  function lset(k,v){ try{localStorage.setItem(k,JSON.stringify(v));}catch(e){} }
  function P(v){ return Promise.resolve(v); }
  function chk(r){ if(r&&r.error)throw r.error; return r; }

  /* ---------- row <-> app object mapping (cloud) ---------- */
  function rowToProduct(r){ return {id:r.id,name:r.name,category:r.category,brand:r.brand||'',partNumber:r.part_number||'',description:r.description||'',image:r.image||'',showPrice:r.show_price!==false,price:r.price==null?null:Number(r.price),offerPrice:r.offer_price==null?null:Number(r.offer_price),inStock:r.in_stock!==false,visible:r.visible!==false,createdAt:r.created_at?new Date(r.created_at).getTime():Date.now()}; }
  function productToRow(p){ return {id:p.id,name:p.name,category:p.category,brand:p.brand||'',part_number:p.partNumber||'',description:p.description||'',image:p.image||'',show_price:!!p.showPrice,price:p.price==null?null:p.price,offer_price:p.offerPrice==null?null:p.offerPrice,in_stock:p.inStock!==false,visible:p.visible!==false}; }

  return {
    init:init, isCloud:isCloud,
    localAuth:{  // used by core only in local (non-cloud) mode
      getUsers:function(){return lget(LS_U,[]);}, setUsers:function(a){lset(LS_U,a);},
      getSession:function(){return lget(LS_SESS,null);}, setSession:function(s){lset(LS_SESS,s);}
    },

    /* ---------------- SETTINGS ---------------- */
    getSettings:function(){
      if(cloud) return sb.from('app_settings').select('data').eq('id',1).maybeSingle().then(function(r){ if(r.error)throw r.error; return r.data?r.data.data:null; });
      return P(lget(LS_S,null));
    },
    saveSettings:function(s){
      if(cloud) return sb.from('app_settings').upsert({id:1,data:s}).then(chk);
      lset(LS_S,s); return P();
    },

    /* ---------------- PRODUCTS ---------------- */
    listProducts:function(){
      if(cloud) return sb.from('products').select('*').order('created_at',{ascending:true}).then(function(r){ if(r.error)throw r.error; return (r.data||[]).map(rowToProduct); });
      return P(lget(LS_P,null));
    },
    saveProduct:function(p){
      if(cloud) return sb.from('products').upsert(productToRow(p)).then(chk);
      var a=lget(LS_P,[]); var i=-1; a.forEach(function(x,idx){if(x.id===p.id)i=idx;}); if(i>=0)a[i]=p; else a.push(p); lset(LS_P,a); return P();
    },
    bulkSaveProducts:function(arr){
      if(cloud) return sb.from('products').upsert(arr.map(productToRow)).then(chk);
      lset(LS_P,arr.slice()); return P();
    },
    deleteProduct:function(id){
      if(cloud) return sb.from('products').delete().eq('id',id).then(chk);
      lset(LS_P,lget(LS_P,[]).filter(function(x){return x.id!==id;})); return P();
    },
    wipeProducts:function(){
      if(cloud) return sb.from('products').delete().neq('id','___never___').then(chk);
      lset(LS_P,[]); return P();
    },

    /* ---------------- CART (per user; guest cart stays local) ---------------- */
    getCart:function(userId){
      if(cloud&&userId) return sb.from('carts').select('items').eq('user_id',userId).maybeSingle().then(function(r){ if(r.error)throw r.error; return r.data?r.data.items:[]; });
      return P(lget(CART+(userId||'guest'),[]));
    },
    saveCart:function(userId,items){
      if(cloud&&userId) return sb.from('carts').upsert({user_id:userId,items:items,updated_at:new Date().toISOString()}).then(chk);
      lset(CART+(userId||'guest'),items); return P();
    },
    clearGuestCart:function(){ lset(CART+'guest',[]); return P(); },
    getGuestCart:function(){ return lget(CART+'guest',[]); },

    /* ---------------- CUSTOMERS (owner) ---------------- */
    listCustomers:function(){
      if(cloud) return sb.from('profiles').select('*').neq('role','owner').then(function(r){ if(r.error)throw r.error; return (r.data||[]).map(function(p){return {id:p.id,name:p.name,email:p.email,role:p.role,createdAt:p.created_at?new Date(p.created_at).getTime():Date.now()};}); });
      return P(lget(LS_U,[]).filter(function(u){return u.role!=='owner';}));
    },
    deleteCustomer:function(id){
      if(cloud) return sb.from('profiles').delete().eq('id',id).then(chk);
      lset(LS_U,lget(LS_U,[]).filter(function(u){return u.id!==id;})); return P();
    },

    /* ---------------- AUTH (cloud only) ---------------- */
    signUp:function(name,email,pw){
      return sb.auth.signUp({email:email,password:pw,options:{data:{name:name}}}).then(function(r){ if(r.error)return {ok:false,error:r.error.message}; return {ok:true,session:!!r.data.session}; });
    },
    signIn:function(email,pw){
      return sb.auth.signInWithPassword({email:email,password:pw}).then(function(r){ if(r.error)return {ok:false,error:r.error.message}; return {ok:true}; });
    },
    signOut:function(){ return sb.auth.signOut().then(function(){return true;}); },
    getUser:function(){ return sb.auth.getUser().then(function(r){ return (r.data&&r.data.user)||null; }); },
    getProfile:function(id){ return sb.from('profiles').select('*').eq('id',id).maybeSingle().then(function(r){ return r.data||null; }); },
    updateProfileName:function(id,name){ return sb.from('profiles').update({name:name}).eq('id',id).then(chk); },
    updatePassword:function(pw){ return sb.auth.updateUser({password:pw}).then(chk); },
    onAuth:function(cb){ if(cloud) sb.auth.onAuthStateChange(function(_e,session){ cb(session); }); }
  };
})();

var SEED=[
  {id:'p1',name:'Washing Machine Drain Pump',category:'washing-machine',brand:'Universal',partNumber:'WMP-2840',description:'High-flow drain pump compatible with most front-loading washing machines. Quiet operation, 30W motor, easy clip-in fitting.',image:'',showPrice:true,price:24,offerPrice:16.5,inStock:true,createdAt:Date.now()-90000},
  {id:'p2',name:'Refrigerator Thermostat',category:'refrigerator',brand:'CoolTech',partNumber:'RT-K59',description:'Adjustable temperature control thermostat for single and double-door refrigerators. Direct replacement, wide compatibility.',image:'',showPrice:true,price:14.5,offerPrice:null,inStock:true,createdAt:Date.now()-80000},
  {id:'p3',name:'AC Fan Capacitor 35µF',category:'air-conditioner',brand:'DuraStart',partNumber:'CAP-35F',description:'Dual-run capacitor 35+5 µF, 440V. Restores cooling performance on split and window units. Includes mounting bracket.',image:'',showPrice:true,price:12,offerPrice:8.75,inStock:true,createdAt:Date.now()-70000},
  {id:'p4',name:'Vacuum Cleaner HEPA Filter',category:'vacuum-cleaner',brand:'PureAir',partNumber:'VF-H13',description:'Washable HEPA-13 filter capturing 99.9% of fine dust and allergens. Fits most canister and upright vacuums.',image:'',showPrice:true,price:9.5,offerPrice:null,inStock:true,createdAt:Date.now()-60000},
  {id:'p5',name:'Oven Heating Element 2000W',category:'oven',brand:'HeatPro',partNumber:'OHE-2K',description:'Lower bake heating element, 2000W stainless steel. Even heat distribution, corrosion resistant terminals.',image:'',showPrice:false,price:null,offerPrice:null,inStock:true,createdAt:Date.now()-50000},
  {id:'p6',name:'Washing Machine Door Seal',category:'washing-machine',brand:'SealTight',partNumber:'DS-FL60',description:'Rubber door boot gasket for front-load washers. Flexible, mould-resistant, leak-proof seal with drain hole.',image:'',showPrice:true,price:38,offerPrice:29,inStock:true,createdAt:Date.now()-40000},

];

/* ---------- state (in-memory caches; persisted via AWDB) ---------- */
var products=[], settings, cart=[], cachedUser=null, cachedCustomers=[], _resolveReady;

function computeLocalUser(){
  var s=localSession(); if(!s){cachedUser=null;return;}
  if(s.id==='owner'){cachedUser=ownerUser();return;}
  var us=localUsers(); for(var i=0;i<us.length;i++)if(us[i].id===s.id){cachedUser=us[i];return;} cachedUser=null;
}

function setCloudUser(u){

    var name=(prof&&prof.name)||(u.user_metadata&&u.user_metadata.name)||(u.email||'').split('@')[0];

/* ============================================================ TOAST + MODAL */
function toast(msg,isErr){
  var root=$('#toast'); if(!root){root=document.createElement('div');root.id='toast';document.body.appendChild(root);}
  var el=document.createElement('div');
  el.className='toast'+(isErr?' err':'');
  el.innerHTML=(isErr?I.info:I.check)+'<span>'+esc(msg)+'</span>';
  root.appendChild(el);
  setTimeout(function(){el.style.opacity='0';el.style.transform='translateY(10px)';setTimeout(function(){el.remove();},300);},2800);
}
function openModal(html){ var r=$('#modalRoot'); if(!r){r=document.createElement('div');r.id='modalRoot';document.body.appendChild(r);} r.innerHTML='<div class="modal-bg" data-act="modal-bg"><div class="modal">'+html+'</div></div>'; }
function closeModal(){ var r=$('#modalRoot'); if(r)r.innerHTML=''; }

/* ============================================================ CART OPS */
function addToCart(id,qty){
  var p=getProduct(id); if(!p)return; qty=qty||1;
  var it=findCart(id); if(it)it.qty+=qty; else cart.push({id:id,qty:qty});
  updateCartCount(); saveCartNow(); toast(p.name+' added to cart');
}
function setQty(id,qty){ var it=findCart(id); if(it)it.qty=Math.max(1,qty); updateCartCount(); saveCartNow(); }
function removeFromCart(id){ cart=cart.filter(function(i){return i.id!==id;}); updateCartCount(); saveCartNow(); }
function clearCart(){ cart=[]; updateCartCount(); saveCartNow(); }
function updateCartCount(){
  var n=cartQty(), el=$('#cartCount');
  if(el){ if(n>0){el.textContent=n;el.classList.remove('hidden');}else{el.classList.add('hidden');} }
  if(typeof AW.onCartChange==='function')AW.onCartChange();
}

/* ============================================================ WHATSAPP */
function singleMessage(p,qty){
  qty=qty||1;
  var L=['Hello '+settings.shopName+'! 👋','','I would like to order this item:','','• '+p.name+(p.brand?' — '+p.brand:'')];
  if(p.partNumber)L.push('  Part #: '+p.partNumber);
  L.push('  Qty: '+qty);
  var e=effPrice(p);
  if(p.showPrice&&e!=null)L.push('  Price: '+fmt(e)+(qty>1?' each  (= '+fmt(e*qty)+')':'')); else L.push('  Price: on request');
  L.push('  Link: '+productUrl(p.id));
  L.push('','Is it available? Thank you.');
  return L.join('\n');
}
function cartMessage(){
  var L=['Hello '+settings.shopName+'! 👋','','I would like to order the following:',''];
  var total=0,hasAsk=false,n=0;
  cart.forEach(function(it){
    var p=getProduct(it.id); if(!p)return; n++;
    L.push(n+'. '+p.name+(p.brand?' — '+p.brand:''));
    if(p.partNumber)L.push('   Part #: '+p.partNumber);
    L.push('   Qty: '+it.qty);
    var e=effPrice(p);
    if(p.showPrice&&e!=null){var lt=e*it.qty;total+=lt;L.push('   Price: '+fmt(e)+' each  (= '+fmt(lt)+')');}
    else{hasAsk=true;L.push('   Price: on request');}
    L.push('   Link: '+productUrl(p.id)); L.push('');
  });
  if(total>0)L.push('Estimated total: '+fmt(total)+(hasAsk?'  (+ items priced on request)':''));
  L.push('','Please confirm availability and the final price. Thank you!');
  return L.join('\n');
}
function phones(){ return (settings.phones||[]).filter(function(p){return p&&p.number;}); }
function phoneDigits(str){ return String(str||'').replace(/[^0-9]/g,''); }
function primaryWaLink(text){ var ps=phones(); return ps.length?waLink(phoneDigits(ps[0].number),text):'#'; }
function waChoose(title,message){
  var ps=phones();
  if(!ps.length){toast('No contact number set',true);return;}
  if(ps.length===1){ window.open(waLink(phoneDigits(ps[0].number),message),'_blank'); return; }
  var rows=ps.map(function(p){ return '<a class="num-opt" href="'+waLink(phoneDigits(p.number),message)+'" target="_blank" rel="noopener" data-act="modal-close">'+I.wa+'<span><b>'+esc(p.number)+'</b>'+(p.label?'<small>'+esc(p.label)+'</small>':'')+'</span></a>'; }).join('');
  openModal('<h3>'+esc(title)+'</h3><p>Choose a number to message on WhatsApp.</p><div class="num-list">'+rows+'</div><div class="modal-actions" style="margin-top:6px"><button class="btn btn-ghost btn-sm" data-act="modal-close">Cancel</button></div>');
}
function orderSingle(id,qty){ var p=getProduct(id); if(p)waChoose('Order on WhatsApp',singleMessage(p,qty)); }
function orderCart(){ if(!cart.length){toast('Your cart is empty',true);return;} waChoose('Order on WhatsApp',cartMessage()); }

function bookMaintenance(cat){
  var L=['Hello '+settings.shopName+' Maintenance team! 🔧','',
    'I would like to book a maintenance / repair visit'+(cat?(' for my '+catLabel(cat).toLowerCase().replace(/s$/,'')):'')+'.','',
    'Appliance: '+(cat?catLabel(cat):'________'),'Brand / model: ________','Problem: ________','Preferred date & time: ________','','Thank you!'];

/* ============================================================ PRODUCT CARD (shared) */
function productCard(p){
  var offer=isOffer(p), pct=discountPct(p), e=effPrice(p), priceHtml;
  if(!p.showPrice)priceHtml='<span class="price-ask">Contact for price</span>';
  else if(offer)priceHtml='<span class="price-now">'+fmt(e)+'</span><span class="price-was">'+fmt(p.price)+'</span>';
  else priceHtml='<span class="price-now">'+fmt(p.price)+'</span>';
  return '<article class="pcard">'
    +'<a href="#/product?id='+p.id+'" class="imgwrap vfcorner" aria-label="'+esc(p.name)+'">'
      +(offer?'<span class="badge-offer">-'+pct+'%</span>':'')
      +(!p.inStock?'<span class="badge-oos">Out of stock</span>':'')
      +'<img src="'+imgSrc(p)+'" alt="'+esc(p.name)+'" loading="lazy"/></a>'
    +'<div class="pbody"><span class="pcat">'+esc(catLabel(p.category))+'</span>'
      +'<h3><a href="#/product?id='+p.id+'">'+esc(p.name)+'</a></h3>'
      +(p.partNumber?'<span class="ppart">Part #'+esc(p.partNumber)+'</span>':'')
      +'<div class="priceline">'+priceHtml+'</div>'
      +'<div class="pacts"><button class="btn btn-wa" data-act="order-single" data-id="'+p.id+'">'+I.wa+'Order</button>'
        +'<button class="btn btn-outline iconbtn-add" data-act="add-cart" data-id="'+p.id+'" title="Add to cart" aria-label="Add to cart">'+I.plus+'</button></div>'
    +'</div></article>';
}

/* ============================================================ MENU + REVEAL */
function openMenu(){var m=$('#mobileMenu');if(m)m.classList.add('open');}
function closeMenu(){var m=$('#mobileMenu');if(m)m.classList.remove('open');}
var io;
function bindReveal(){
  if(!('IntersectionObserver' in window)){document.querySelectorAll('.reveal').forEach(function(el){el.classList.add('in');});return;}
  if(io)io.disconnect();
  io=new IntersectionObserver(function(en){en.forEach(function(e){if(e.isIntersecting){e.target.classList.add('in');io.unobserve(e.target);}});},{threshold:.12});
  document.querySelectorAll('.reveal').forEach(function(el){io.observe(el);});
}

/* ============================================================ ACCOUNTS / AUTH */
function normEmail(e){return String(e||'').trim().toLowerCase();}
function isLoggedIn(){return !!currentUser();}
function isOwner(){var u=currentUser();return !!u&&u.role==='owner';}
function afterAuthCommon(){ updateCartCount(); refreshChrome(); if(isOwner())refreshCustomers(); return null; }
function mergeGuestThenLoadCart(){
  var u=currentUser(), guest=AWDB.getGuestCart();
  return AWDB.getCart(u?u.id:null).then(function(items){
    items=items||[];
    if(u&&guest&&guest.length){
      guest.forEach(function(gi){var ex=null;items.forEach(function(x){if(x.id===gi.id)ex=x;});if(ex)ex.qty+=gi.qty;else items.push({id:gi.id,qty:gi.qty});});
      cart=items; return AWDB.saveCart(u.id,cart).then(function(){return AWDB.clearGuestCart();});
    }
    cart=items; return null;
  });
}
function afterAuthCloud(){ return AWDB.getUser().then(setCloudUser).then(mergeGuestThenLoadCart).then(afterAuthCommon); }
function afterAuthLocal(){ return mergeGuestThenLoadCart().then(afterAuthCommon); }
function login(email,pw){
  email=normEmail(email);
  if(AWDB.isCloud()){
    return AWDB.signIn(email,pw).then(function(r){ if(!r.ok)return r; return afterAuthCloud().then(function(){return {ok:true,role:cachedUser?cachedUser.role:'customer'};}); });
  }
  if(email===normEmail(settings.ownerEmail)&&String(pw)===String(settings.adminPassword)){ AWDB.localAuth.setSession({id:'owner'}); computeLocalUser(); return afterAuthLocal().then(function(){return {ok:true,role:'owner'};}); }
  var us=localUsers(),u=null; for(var i=0;i<us.length;i++)if(normEmail(us[i].email)===email)u=us[i];

/* image resize/upload */
function handleImagePick(file,cb){
  if(!file)return;
  var reader=new FileReader();
  reader.onload=function(ev){
    var img=new Image();
    img.onload=function(){
      var max=900,w=img.width,h=img.height;
      if(w>max||h>max){if(w>h){h=Math.round(h*max/w);w=max;}else{w=Math.round(w*max/h);h=max;}}
      var c=document.createElement('canvas');c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);
      cb(c.toDataURL('image/jpeg',0.82));
    };
    img.src=ev.target.result;
  };
  reader.readAsDataURL(file);
}

function closestAttr(el,attr){ while(el&&el!==document){ if(el.getAttribute&&el.getAttribute(attr)!=null)return el; el=el.parentNode; } return null; }

  var dd=$('#catDD'); if(dd&&dd.classList.contains('open')&&!dd.contains(e.target))dd.classList.remove('open');

  switch(act){
    case 'dd-toggle': e.preventDefault(); $('#catDD').classList.toggle('open'); break;

    case 'menu-close': closeMenu(); break;
    case 'modal-bg': if(e.target===t)closeModal(); break;

    case 'add-cart': addToCart(id); break;

AW.pages['shop']=function(){
  var I=AW.I, app=AW.$('#app'); if(!app)return;
  var params=new URLSearchParams(AW._routeQuery());
  var cat=params.get('cat')||'', q=(params.get('q')||'').trim(), offersOnly=params.get('offers')==='1';

  var list=AW.listedProducts();
  if(offersOnly)list=list.filter(AW.isOffer);
  if(cat)list=list.filter(function(p){return p.category===cat;});
  if(q){var ql=q.toLowerCase();list=list.filter(function(p){
    return (p.name||'').toLowerCase().indexOf(ql)>=0||(p.partNumber||'').toLowerCase().indexOf(ql)>=0||(p.brand||'').toLowerCase().indexOf(ql)>=0||AW.catLabel(p.category).toLowerCase().indexOf(ql)>=0;
  });}
  list.sort(function(a,b){return (b.createdAt||0)-(a.createdAt||0);});

  var title=offersOnly?'Current offers':cat?AW.catLabel(cat):q?('Results for “'+q+'”'):'All spare parts';

  var vis=AW.visibleCategories();
  var pills='<a class="fpill'+(!cat&&!offersOnly?' active':'')+'" href="#/shop'+(q?('?q='+encodeURIComponent(q)):'')+'">All</a>'
    +'<a class="fpill'+(offersOnly?' active':'')+'" href="#/shop?offers=1">🔥 Offers</a>'
    +vis.map(function(c){return '<a class="fpill'+(cat===c.key?' active':'')+'" href="#/shop?cat='+c.key+(q?('&q='+encodeURIComponent(q)):'')+'">'+c.label+'</a>';}).join('');

  var body=list.length
    ? '<div class="grid">'+list.map(AW.productCard).join('')+'</div>'
    : '<div class="empty"><div class="ei">'+I.search+'</div><h3>No parts found</h3><p class="muted">We couldn’t find a match'+(q?(' for “'+AW.esc(q)+'”'):'')+'. Try another search, or ask us directly on WhatsApp — we may have it in stock.</p><div style="margin-top:18px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap"><a class="btn btn-outline" href="#/shop">View all parts</a><button class="btn btn-wa" data-act="contact-wa">'+I.wa+'Ask on WhatsApp</button></div></div>';

  app.innerHTML='<div class="page"><div class="wrap">'
    +'<div class="crumbs"><a href="#/">Home</a> / '+AW.esc(title)+'</div>'
    +'<div class="shop-head"><h1>'+AW.esc(title)+'</h1><span class="shop-count">'+list.length+' item'+(list.length===1?'':'s')+'</span></div>'
    +'<div class="filters">'+pills+'</div>'+body
  +'</div></div>';
};

/* quantity + order actions for this page */
document.addEventListener('click',function(e){
  var t=e.target.closest?e.target.closest('[data-act]'):null; if(!t)return;
  var act=t.getAttribute('data-act'), id=t.getAttribute('data-id'), q=AW.$('#pdQty');
  if(act==='pd-inc'&&q)q.value=Math.max(1,(parseInt(q.value,10)||1)+1);

  else if(act==='pd-add')AW.addToCart(id,Math.max(1,parseInt((q||{}).value,10)||1));

});

AW.pages['cart']=function(){
  render();

    var I=AW.I, app=AW.$('#app'); if(!app)return;

    if(!cart.length){
      app.innerHTML='<div class="page"><div class="wrap"><div class="crumbs"><a href="#/">Home</a> / Cart</div><div class="empty"><div class="ei">'+I.cart+'</div><h3>Your cart is empty</h3><p class="muted">Add the parts you need, then send the whole list to us on WhatsApp in one tap.</p><div style="margin-top:18px"><a class="btn btn-primary" href="#/shop">Browse parts '+I.arrow+'</a></div></div></div></div>';
      return;
    }
    var rows='',total=0,hasAsk=false,count=0;
    cart.forEach(function(it){
      var p=AW.getProduct(it.id); if(!p)return; count+=it.qty;
      var e=AW.effPrice(p), lineHtml;
      if(p.showPrice&&e!=null){var lt=e*it.qty;total+=lt;lineHtml='<div class="cprice">'+AW.fmt(lt)+' <small>('+AW.fmt(e)+' each)</small></div>';}
      else{hasAsk=true;lineHtml='<div class="cprice" style="color:var(--steel)">Price on request</div>';}
      rows+='<div class="citem"><a class="cimg" href="#/product?id='+p.id+'"><img src="'+AW.imgSrc(p)+'" alt="'+AW.esc(p.name)+'"/></a>'
        +'<div><h4><a href="#/product?id='+p.id+'">'+AW.esc(p.name)+'</a></h4>'+(p.partNumber?'<div class="cpart">Part #'+AW.esc(p.partNumber)+'</div>':'')+lineHtml+'</div>'
        +'<div class="cctl"><div class="qty-sm"><button data-act="cart-dec" data-id="'+p.id+'">–</button><input type="text" inputmode="numeric" value="'+it.qty+'" data-act="cart-qty" data-id="'+p.id+'"/><button data-act="cart-inc" data-id="'+p.id+'">+</button></div><button class="remove-x" data-act="cart-remove" data-id="'+p.id+'">'+I.trash+'Remove</button></div></div>';
    });
    app.innerHTML='<div class="page"><div class="wrap"><div class="crumbs"><a href="#/">Home</a> / Cart</div>'
      +'<div class="shop-head"><h1>Your cart</h1><button class="btn btn-ghost btn-sm" data-act="cart-clear">Clear cart</button></div>'
      +'<div class="cart-grid"><div class="cart-items">'+rows+'</div>'
        +'<div class="cart-sum"><h3>Order summary</h3>'
          +'<div class="sumrow"><span>Items</span><span>'+count+'</span></div>'
          +'<div class="sumrow"><span>Priced items subtotal</span><span>'+(total>0?AW.fmt(total):'—')+'</span></div>'
          +'<div class="sumrow total"><span>Estimated total</span><span>'+(total>0?AW.fmt(total):'On request')+'</span></div>'
          +'<div class="sum-note">'+I.info+'<span>'+(hasAsk?'Some items are priced on request. ':'')+'We confirm final price and availability on WhatsApp before you pay.</span></div>'
          +(AW.isLoggedIn()?'':'<div class="sum-note">'+I.info+'<span><a href="#/account" style="color:var(--steel);font-weight:700">Log in or sign up</a> to save this cart to your account.</span></div>')
          +'<button class="btn btn-wa btn-block" data-act="cart-checkout" style="padding:15px">'+I.wa+'Order all on WhatsApp</button>'
          +'<a class="btn btn-outline btn-block" href="#/shop" style="margin-top:10px">Continue shopping</a>'
        +'</div></div>'
    +'</div></div>';
  }
};

/* cart actions */
document.addEventListener('click',function(e){
  var t=e.target.closest?e.target.closest('[data-act]'):null; if(!t)return;
  var act=t.getAttribute('data-act'), id=t.getAttribute('data-id');
  if(act==='cart-inc'){var it=AW.findCart(id);if(it)AW.setQty(id,it.qty+1);}
  else if(act==='cart-dec'){var it2=AW.findCart(id);if(it2)AW.setQty(id,it2.qty-1);}
  else if(act==='cart-remove')AW.removeFromCart(id);
  else if(act==='cart-clear')AW.clearCart();
  else if(act==='cart-checkout')AW.orderCart();
});
document.addEventListener('change',function(e){
  var t=e.target.closest?e.target.closest('[data-act]'):null; if(!t)return;
  if(t.getAttribute('data-act')==='cart-qty'){var q=parseInt(t.value,10);if(isNaN(q)||q<1)q=1;AW.setQty(t.getAttribute('data-id'),q);}
});

  function ownerBody(){

  /* ---------------- products ---------------- */

      +'<div class="stat"><div class="sv">'+products.length+'</div><div class="sl">Products</div></div>'
      +'<div class="stat"><div class="sv">'+(products.length-hidden)+'</div><div class="sl">Listed</div></div>'
      +'<div class="stat"><div class="sv">'+hidden+'</div><div class="sl">Hidden</div></div>'
      +'<div class="stat a"><div class="sv">'+offers+'</div><div class="sl">On offer</div></div>'
    +'</div>';
    if(!products.length)return stats+'<div class="empty"><div class="ei">'+I.box+'</div><h3>No products yet</h3><p class="muted">Add your first spare part to start selling.</p><div style="margin-top:16px"><button class="btn btn-accent" data-act="admin-tab" data-tab="add">'+I.plus+' Add product</button></div></div>';
    var rows='<div class="atable"><div class="arow ahdr"><span></span><span>Product</span><span class="acol-cat">Category</span><span class="acol-price">Price</span><span style="text-align:right">Actions</span></div>';

      else if(AW.isOffer(p))priceCell='<b>'+AW.fmt(p.offerPrice)+'</b><div class="off">-'+AW.discountPct(p)+'% · was '+AW.fmt(p.price)+'</div>';

        +'<div class="aname"><b>'+AW.esc(p.name)+(isHidden?'<span class="hidden-badge">Hidden</span>':'')+'</b><small>'+(p.partNumber?'#'+AW.esc(p.partNumber)+' · ':'')+(p.inStock?'In stock':'Out of stock')+'</small></div>'

  function updateDiscountPreview(){
    var box=AW.$('#discountPreview'); if(!box)return;

  /* ============================ EVENTS ============================ */
  document.addEventListener('click',function(e){
    var t=e.target.closest?e.target.closest('[data-act]'):null; if(!t)return;
    var act=t.getAttribute('data-act'), id=t.getAttribute('data-id');
    switch(act){
      case 'auth-tab': state.authTab=t.getAttribute('data-tab'); render(); break;
      case 'acct-logout': AW.logout().then(function(){ state.tab='products'; state.editId=null; state.authTab='login'; render(); AW.toast('Logged out'); }); break;
      case 'acct-order': AW.orderCart(); break;
      case 'admin-tab': state.tab=t.getAttribute('data-tab'); if(state.tab!=='add')state.editId=null; render(); if(state.tab==='customers')AW.refreshCustomers().then(function(){ if(state.tab==='customers')render(); }); break;
      case 'admin-edit': state.editId=id; state.tab='add'; render(); break;
      case 'admin-toggle-visible': { var p=AW.getProduct(id); if(p){AW.setProductVisible(id,p.visible===false); AW.toast(p.visible===false?'Item hidden from shop':'Item shown in shop'); render();} break; }
      case 'admin-qr': AW.showQR(id); break;
      case 'admin-delete': confirmDelete(id); break;
      case 'confirm-delete-yes': AW.deleteProductById(t.getAttribute('data-id')); AW.closeModal(); render(); AW.toast('Product deleted'); break;
      case 'delete-customer': confirmDeleteCustomer(id); break;
      case 'confirm-delcust-yes': AW.deleteUser(t.getAttribute('data-id')).then(function(){ AW.closeModal(); render(); AW.toast('Account removed'); }); break;
      case 'feat-mode': setFeatMode(t.getAttribute('data-mode')); break;
      case 'img-clear': { var h=AW.$('#imageData'); if(h)h.value=''; var w=AW.$('#imgPreviewWrap'); if(w)w.innerHTML=''; var fi=AW.$('#imgInput'); if(fi)fi.value=''; break; }
      case 'feat-img-clear': { var h2=AW.$('#featImageData'); if(h2)h2.value=''; var w2=AW.$('#featImgPreviewWrap'); if(w2)w2.innerHTML=''; var fi2=AW.$('#featImgInput'); if(fi2)fi2.value=''; break; }
      case 'export-data': AW.exportData(); break;
      case 'print-all-qr': AW.printAllLabels(); break;
      case 'wipe-data': confirmWipe(); break;
      case 'confirm-wipe-yes': AW.wipeProducts(); AW.closeModal(); render(); AW.toast('All products deleted'); break;
    }
  });
  document.addEventListener('submit',function(e){
    var f=e.target.closest?e.target.closest('[data-act]'):null; if(!f||f.tagName!=='FORM')return;
    var act=f.getAttribute('data-act');
    if(act==='auth-login'){ e.preventDefault(); var d=new FormData(f); AW.login(d.get('email'),d.get('password')).then(function(r){ if(r.ok){render();AW.toast(r.role==='owner'?'Welcome back':'Logged in');}else AW.toast(r.error||'Login failed',true); }); }
    else if(act==='auth-signup'){ e.preventDefault(); var d2=new FormData(f); AW.signup(d2.get('name'),d2.get('email'),d2.get('password')).then(function(r){ if(r.ok){ if(r.needsConfirm){ state.authTab='login'; render(); AW.toast('Check your email to confirm your account, then log in.'); } else { render(); AW.toast('Account created — welcome!'); } } else AW.toast(r.error||'Could not sign up',true); }); }
    else if(act==='save-profile'){ e.preventDefault(); var d3=new FormData(f); AW.updateProfile({name:d3.get('name'),password:d3.get('password')}).then(function(r){ if(r.ok){render();AW.toast('Details saved');}else AW.toast(r.error||'Could not save',true); }); }
    else if(act==='admin-save'){ e.preventDefault(); saveProduct(f); }
    else if(act==='save-settings'){ e.preventDefault(); saveSettings(f); }
    else if(act==='save-featured'){ e.preventDefault(); saveFeatured(f); }
    else if(act==='save-categories'){ e.preventDefault(); saveCategories(f); }
  });
  document.addEventListener('change',function(e){
    var t=e.target.closest?e.target.closest('[data-act]'):null; if(!t)return;
    var act=t.getAttribute('data-act');
    if(act==='img-pick'){ AW.handleImagePick(t.files&&t.files[0],function(data){ var h=AW.$('#imageData'); if(h)h.value=data; var w=AW.$('#imgPreviewWrap'); if(w)w.innerHTML=imgPreview(data,false); }); }
    else if(act==='feat-img-pick'){ AW.handleImagePick(t.files&&t.files[0],function(data){ var h=AW.$('#featImageData'); if(h)h.value=data; var w=AW.$('#featImgPreviewWrap'); if(w)w.innerHTML=imgPreview(data,true); }); }
    else if(act==='import-data'){ AW.importData(t.files&&t.files[0],function(ok){ if(ok){state.tab='products';state.editId=null;render();} }); }
    else if(act==='toggle-price'){ var pf=AW.$('#priceFields'); if(pf)pf.classList.toggle('hidden',!t.checked); }
  });
  document.addEventListener('input',function(e){
    var t=e.target.closest?e.target.closest('[data-act]'):null; if(!t)return;
    if(t.getAttribute('data-act')==='calc-discount')updateDiscountPreview();
  });

  function setFeatMode(mode){
    var hid=AW.$('#featMode'); if(hid)hid.value=mode;
    var pg=AW.$('#featProductGroup'), cg=AW.$('#featCustomGroup');
    if(pg)pg.classList.toggle('hidden',mode!=='product');
    if(cg)cg.classList.toggle('hidden',mode!=='custom');
    document.querySelectorAll('.mode-opt').forEach(function(o){o.classList.toggle('active',o.getAttribute('data-mode')===mode);});
  }

  /* save handlers */
  function saveProduct(form){
    var fd=new FormData(form);
    var name=String(fd.get('name')||'').trim(); if(!name){AW.toast('Please enter a product name',true);return;}
    var showPrice=fd.get('showPrice')==='on';
    var price=fd.get('price'); price=(price===''||price==null)?null:parseFloat(price);
    var offer=fd.get('offerPrice'); offer=(offer===''||offer==null)?null:parseFloat(offer);
    if(!showPrice){price=null;offer=null;}
    if(showPrice&&offer!=null&&price!=null&&offer>=price){AW.toast('Offer price must be lower than the price',true);return;}
    var obj={name:name,category:fd.get('category'),brand:String(fd.get('brand')||'').trim(),partNumber:String(fd.get('partNumber')||'').trim(),description:String(fd.get('description')||'').trim(),image:fd.get('image')||'',showPrice:showPrice,price:isNaN(price)?null:price,offerPrice:isNaN(offer)?null:offer,inStock:fd.get('inStock')==='on',visible:fd.get('visible')==='on'};
    var editId=fd.get('id'); AW.saveProductObj(obj,editId); AW.toast(editId?'Product updated':'Product added');
    state.tab='products'; state.editId=null; render();
  }
  function saveSettings(form){
    var fd=new FormData(form), patch={};
    ['shopName','siteUrl','about','address','currency','adminPassword','ownerName','ownerEmail'].forEach(function(k){patch[k]=String(fd.get(k)||'').trim();});
    var phones=[];
    String(fd.get('phones')||'').split('\n').forEach(function(line){ line=line.trim(); if(!line)return; var label='',number=line, i=line.indexOf('|'); if(i>=0){label=line.slice(0,i).trim();number=line.slice(i+1).trim();} if(number)phones.push({label:label,number:number}); });
    patch.phones=phones.length?phones:AW.settings.phones;
    var dec=parseInt(fd.get('decimals'),10); patch.decimals=isNaN(dec)?2:Math.max(0,Math.min(3,dec));
    if(!patch.adminPassword)patch.adminPassword='awali-admin';
    if(!patch.ownerEmail)patch.ownerEmail='owner@awalispareparts.com';
    AW.saveSettingsObj(patch); AW.toast('Settings saved'); render();
  }
  function saveFeatured(form){
    var fd=new FormData(form); var mode=fd.get('mode')||'product';
    var badge = mode==='custom' ? String(fd.get('badgeCustom')||'').trim() : String(fd.get('badge')||'').trim();
    var f={enabled:fd.get('enabled')==='on',mode:mode,productId:fd.get('productId')||AW.settings.featured.productId,image:fd.get('image')||'',title:String(fd.get('title')||'').trim(),subtitle:String(fd.get('subtitle')||'').trim(),badge:badge,ctaText:String(fd.get('ctaText')||'').trim()||'Shop now',ctaLink:String(fd.get('ctaLink')||'').trim()||'#/shop?offers=1'};
    AW.setFeatured(f); AW.toast('Featured banner saved'); render();
  }
  function saveCategories(form){
    var fd=new FormData(form), hidden=[];
    AW.CATEGORIES.forEach(function(c){ if(fd.get('cat_'+c.key)!=='on')hidden.push(c.key); });
    AW.setHiddenCats(hidden); AW.toast('Categories updated'); render();
  }

  function confirmDelete(id){ var p=AW.getProduct(id); if(!p)return; AW.openModal('<h3>Delete product?</h3><p>“'+AW.esc(p.name)+'” will be permanently removed. To keep it but remove it from the shop, hide it instead.</p><div class="modal-actions"><button class="btn btn-ghost btn-sm" data-act="modal-close">Cancel</button><button class="btn btn-danger btn-sm" data-act="confirm-delete-yes" data-id="'+id+'">'+I.trash+' Delete</button></div>'); }
  function confirmWipe(){ AW.openModal('<h3>Delete all products?</h3><p>This removes every product from your shop. Export a backup first if you might need them.</p><div class="modal-actions"><button class="btn btn-ghost btn-sm" data-act="modal-close">Cancel</button><button class="btn btn-danger btn-sm" data-act="confirm-wipe-yes">Delete all</button></div>'); }
  function confirmDeleteCustomer(id){ AW.openModal('<h3>Remove account?</h3><p>This deletes the customer account and its saved cart. This can’t be undone.</p><div class="modal-actions"><button class="btn btn-ghost btn-sm" data-act="modal-close">Cancel</button><button class="btn btn-danger btn-sm" data-act="confirm-delcust-yes" data-id="'+id+'">'+I.trash+' Remove</button></div>'); }
};


/* ===== single-file router ===== */
;(function(){
  var AW=window.AW;
  AW._routeQuery=function(){var h=String(location.hash||'').slice(1);var i=h.indexOf('?');return i>=0?h.slice(i):'';};
  var MAP={'/':'home','':'home','/shop':'shop','/product':'product','/cart':'cart','/maintenance':'maintenance','/account':'account','/admin':'account'};
  function routeName(){var h=String(location.hash||'').slice(1)||'/';var path=h.split('?')[0]||'/';return MAP[path]||'home';}
  function renderRoute(){AW.onCartChange=null;var fn=(AW.pages&&AW.pages[routeName()])||(AW.pages&&AW.pages.home);try{fn&&fn();}catch(e){if(window.console)console.error(e);}try{AW.reveal();}catch(_){}try{window.scrollTo(0,0);}catch(__){}}
  window.AW_PAGE=renderRoute;
  window.addEventListener('hashchange',renderRoute);
})();
</script>
</body>
</html>
